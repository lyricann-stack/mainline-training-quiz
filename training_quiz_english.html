clear communication ('behind you', 'hot', 'corner'), supporting colleagues during rush periods, and maintaining shared areas — all critical to a safe and efficient kitchen."}]}, {"id": "T12", "title": "Employee Relations & Customer Service", "questions": [{"q": "What is the primary legislation governing employment conditions in Australia?", "opts": ["Employment Contract Act", "Fair Work Act 2009", "Worker Protection Act", "National Employment Act"], "ans": 1, "exp": "The Fair Work Act 2009 is Australia's primary legislation governing employment conditions, including minimum wages, leave entitlements, and protections from unfair dismissal."}, {"q": "What is the National Employment Standards (NES)?", "opts": ["A set of voluntary best-practice guidelines for employers", "10 minimum employment entitlements that apply to all employees in Australia", "Standards set by individual employers", "State-based employment rules only"], "ans": 1, "exp": "The National Employment Standards (NES) are 10 minimum entitlements that apply to all national system employees in Australia, including maximum hours, leave, and flexible working arrangements."}, {"q": "An employee believes they have been unfairly dismissed. What is the time limit for applying to the Fair Work Commission?", "opts": ["7 days", "21 days", "30 days", "60 days"], "ans": 1, "exp": "An unfair dismissal application must be lodged with the Fair Work Commission within 21 days of the dismissal taking effect."}, {"q": "What is the 'service recovery' technique in customer service?", "opts": ["Offering a discount when asked by the customer", "A process of acknowledging, apologising for, and resolving a service failure — turning a negative experience into a positive one", "Asking the customer to return another day", "Providing a written complaint form"], "ans": 1, "exp": "Service recovery is the process of turning a dissatisfied customer into a satisfied one through: acknowledging the problem, apologising sincerely, taking action, and following up."}, {"q": "What does 'active listening' involve in a customer service context?", "opts": ["Only making eye contact with the customer", "Fully concentrating on what the customer is saying, asking clarifying questions, and paraphrasing to confirm understanding", "Nodding and smiling", "Letting the customer speak without interruption only"], "ans": 1, "exp": "Active listening means fully engaging with the customer: maintaining eye contact, not interrupting, asking questions to clarify needs, and summarising to confirm understanding."}, {"q": "An employee is asked by their supervisor to do something they believe is unethical. What should they do?", "opts": ["Follow the instruction without question — the supervisor is responsible", "Raise the concern through the appropriate internal channel (e.g., HR or a more senior manager)", "Immediately resign", "Ignore it and do what they think is right"], "ans": 1, "exp": "Employees should raise ethical concerns through appropriate internal channels. Most organisations have a speak-up or grievance procedure. This protects both the employee and the organisation."}, {"q": "What is the purpose of a performance review?", "opts": ["To identify employees for dismissal", "To provide feedback on performance, recognise achievements, set goals, and plan development", "Only to determine pay increases", "Only to document poor performance"], "ans": 1, "exp": "Performance reviews provide a structured opportunity to discuss performance, acknowledge strengths, address development areas, and set goals for the future — benefiting both the employee and organisation."}, {"q": "What is 'cultural awareness' in the workplace?", "opts": ["Only knowing about different types of food", "Understanding and respecting the cultural backgrounds, values, and practices of colleagues and customers", "Being able to speak multiple languages", "Only applicable in international workplaces"], "ans": 1, "exp": "Cultural awareness means being sensitive to cultural differences in communication styles, values, and practices. It is essential for respectful and effective working relationships in diverse workplaces."}, {"q": "A customer complains about their experience at a high volume — how should you respond?", "opts": ["Match their volume and explain what happened", "Stay calm, acknowledge their concern, apologise, and move to a quieter area to resolve the issue", "Ask them to lower their voice before you respond", "Immediately call the manager without speaking to the customer"], "ans": 1, "exp": "When dealing with an upset customer, stay calm, acknowledge their feelings, apologise, and move the conversation to a quieter location to resolve it professionally."}, {"q": "What is the purpose of an employment contract?", "opts": ["Only to specify the employee's salary", "To document the terms and conditions of employment agreed between the employer and employee", "Only required for full-time employees", "To document only what the employee must do"], "ans": 1, "exp": "An employment contract documents all agreed terms: role, responsibilities, pay, hours, leave entitlements, and other conditions. It protects both the employer and the employee."}, {"q": "What is the difference between a Modern Award and an Enterprise Agreement?", "opts": ["They are the same thing", "A Modern Award sets minimum industry standards; an Enterprise Agreement is negotiated between a specific employer and their employees — it must not leave employees worse off than the Award", "A Modern Award applies only to casual staff; an Enterprise Agreement applies to permanents", "Enterprise Agreements override all other legislation"], "ans": 1, "exp": "Modern Awards set minimum industry-wide standards; Enterprise Agreements are negotiated at the individual employer level and must ensure employees are overall better off than under the Award (BOOT test)."}, {"q": "Under Australian law, what is the employer's obligation regarding workplace grievances?", "opts": ["Grievances only need to be addressed if lodged in writing", "Employers must have a process to address grievances promptly, fairly, and confidentially", "Employers can choose whether to respond to grievances", "Only formal complaints to Fair Work Commission need to be addressed"], "ans": 1, "exp": "Employers have a legal obligation to address workplace grievances promptly, fairly, and confidentially. Failing to do so can expose the employer to unfair dismissal or adverse action claims."}, {"q": "What is the 'customer journey' in hospitality?", "opts": ["The physical route a customer takes through the venue", "The complete sequence of interactions a customer has with a business — from first contact to post-visit follow-up", "Only the dining experience itself", "The process of taking a customer's order"], "ans": 1, "exp": "The customer journey encompasses all touchpoints: discovery, booking, arrival, service, dining, payment, and post-visit. Understanding it helps identify opportunities to improve the overall experience."}, {"q": "What does 'upselling' mean in a hospitality context?", "opts": ["Pressuring customers to buy the most expensive items", "Professionally suggesting higher-value options or add-ons that enhance the customer's experience", "Adding items to the bill without asking", "Only applicable to alcohol sales"], "ans": 1, "exp": "Upselling means professionally recommending premium options or complementary items (e.g., 'Would you like to upgrade to a premium wine?'). When done well, it enhances the customer experience and increases revenue."}, {"q": "How should confidential employee information be handled?", "opts": ["Share it only with trusted colleagues", "Stored securely, accessible only to authorised persons, and never discussed without a legitimate need", "Keep it in a shared office folder", "Only the manager needs to know — share with them freely"], "ans": 1, "exp": "Employee personal information (pay, medical, disciplinary records) must be stored securely and accessed only by authorised persons. Under Australian privacy law, mishandling employee records can result in significant penalties."}]}, {"id": "T13", "title": "Village Rules & Site Regulations", "questions": [{"q": "Why are Village Rules important on a mine site?", "opts": ["Only to manage accommodation logistics", "To ensure the safety, wellbeing, and mutual respect of all residents and staff living and working on site", "Only applicable to permanent residents", "To comply with government regulations only"], "ans": 1, "exp": "Village Rules create a safe, respectful, and functional living environment for everyone on site. They address safety, noise, shared facilities, and behavioural standards."}, {"q": "What is the noise curfew policy in most mine site villages?", "opts": ["No restrictions", "Quiet hours typically begin at 10pm — noise must be kept to a minimum to respect those on different shifts", "Curfew only applies to outdoor areas", "Curfew only applies on weekdays"], "ans": 1, "exp": "Mine site villages accommodate workers on different shift rotations. Quiet hours (typically from 10pm) are essential to ensure workers can rest regardless of their shift schedule."}, {"q": "Is alcohol permitted in mine site villages?", "opts": ["Always permitted without restriction", "It depends on site-specific rules — some sites have dry site policies or designated areas and consumption limits", "Completely prohibited on all mine sites", "Only permitted for managers"], "ans": 1, "exp": "Alcohol policies vary by site. Many mine sites operate dry site or restricted alcohol policies due to safety and wellbeing considerations. All residents must comply with the site-specific policy."}, {"q": "What should a resident do if they find damage to shared facilities?", "opts": ["Ignore it — it's not their responsibility", "Report it to the Village Manager or maintenance team immediately", "Fix it themselves if possible", "Only report if the damage is significant"], "ans": 1, "exp": "Any damage to shared facilities must be reported promptly to the Village Manager or maintenance team. Early reporting prevents safety hazards and more costly repairs."}, {"q": "Can residents have visitors stay overnight in their room?", "opts": ["Yes, without restriction", "Only with prior approval from the Village Manager and in accordance with site visitor policy", "Visitors are never permitted on site", "Only on weekends"], "ans": 1, "exp": "Overnight visitors require prior authorisation in line with site visitor management policy. Unauthorised visitors pose security and safety risks on mine sites."}, {"q": "What behaviour is not acceptable in shared areas such as the dining room and recreational facilities?", "opts": ["Eating a meal quickly", "Loud, aggressive, or disrespectful behaviour that disturbs or intimidates others", "Using the facilities outside peak hours", "Bringing personal items to the area"], "ans": 1, "exp": "Shared areas must be safe and welcoming for everyone. Aggressive, disrespectful, or intimidating behaviour violates village rules and can lead to removal from site."}, {"q": "What is the correct process when checking in to the village for the first time?", "opts": ["Go directly to your allocated room", "Report to the Village Manager or reception — complete check-in paperwork and receive a site induction", "Ask a colleague to show you around", "Contact your site supervisor only"], "ans": 1, "exp": "All new arrivals must complete a formal check-in process and site induction, which covers emergency procedures, village rules, facilities, and safety information."}, {"q": "What should you do in the event of a medical emergency at the village?", "opts": ["Drive the person to the nearest hospital yourself", "Call 000, notify the Village Manager, and follow the site's emergency response plan", "Wait to see if the person recovers before calling for help", "Only contact the site nurse during business hours"], "ans": 1, "exp": "In a medical emergency, call 000 immediately and notify the Village Manager. Follow the site emergency response plan and keep the person as comfortable as possible until help arrives."}, {"q": "How should residents handle disputes or conflicts with other residents?", "opts": ["Resolve it physically if necessary", "Address it calmly through direct communication or report it to the Village Manager for mediation", "Complain on social media", "Ignore it completely"], "ans": 1, "exp": "Disputes should first be addressed through calm, direct communication. If unresolved, the Village Manager can facilitate mediation. Aggressive or retaliatory behaviour is a breach of village rules."}, {"q": "What is the policy regarding illegal drugs on mine site villages?", "opts": ["Tolerated if used only in private rooms", "Strictly prohibited — possession or use may result in immediate removal from site and termination of employment", "Only prohibited in shared areas", "Permitted if prescribed by a doctor"], "ans": 1, "exp": "Illegal drugs are strictly prohibited on all mine sites. Most sites also have mandatory drug and alcohol testing programs. Breaches can result in immediate site removal and employment termination."}, {"q": "What should you do if you receive an emergency phone call while in the dining room?", "opts": ["Answer it at full volume at your seat", "Step outside or to a designated area to take the call, respecting other diners", "Ignore it and call back later", "Only step away if it's a work-related call"], "ans": 1, "exp": "In shared areas like the dining room, phone calls should be taken in a designated area or outside to respect other residents and maintain a comfortable dining environment."}, {"q": "Whose responsibility is it to keep allocated rooms clean and tidy?", "opts": ["Housekeeping only", "The resident — rooms must be kept in an acceptable standard of cleanliness", "The Village Manager", "Only required during the final inspection"], "ans": 1, "exp": "Residents are responsible for maintaining their allocated room in an acceptable condition. Housekeeping provides regular services but residents are expected to maintain basic cleanliness standards."}, {"q": "What is the protocol for using laundry facilities in the village?", "opts": ["Use them at any time without restriction", "Follow the posted schedule, remove clothes promptly, and leave the facilities clean for others", "Only available for permanent residents", "Reserve machines in advance — casual use is not permitted"], "ans": 1, "exp": "Laundry facilities are shared resources. Residents should follow any scheduling system, remove clothes promptly once the cycle is complete, and leave machines clean for the next person."}, {"q": "What should you do if you discover a safety hazard in the village (e.g., a broken step)?", "opts": ["Fix it yourself", "Walk past and report it when it is convenient", "Report it immediately to the Village Manager or maintenance team and avoid the area", "Take a photo and post it online"], "ans": 2, "exp": "Any safety hazard must be reported immediately. Avoid the affected area to prevent others from being injured, and ensure the Village Manager or maintenance team is informed promptly."}, {"q": "What is the expectation regarding internet and device use in shared areas?", "opts": ["Use devices at any volume", "Use devices respectfully — headphones must be worn for audio content, and volume must not disturb others", "Devices are not permitted in shared areas", "Unlimited use with no restrictions"], "ans": 1, "exp": "Devices should be used considerately in shared areas. Audio content must be played through headphones to respect others who are eating, relaxing, or working."}]}, {"id": "T14", "title": "Basic Life Support (BLS) – HLTAID010", "questions": [{"q": "What is the correct compression rate for CPR?", "opts": ["60–80 per minute", "80–100 per minute", "100–120 per minute", "120–140 per minute"], "ans": 2, "exp": "The Australian and international standard CPR compression rate is 100–120 compressions per minute — this is the rate that best maintains blood circulation during cardiac arrest."}, {"q": "What does BLS stand for?", "opts": ["Basic Life Systems", "Basic Life Support", "Body Life Safety", "Biological Life Stabilisation"], "ans": 1, "exp": "BLS stands for Basic Life Support — the foundational level of emergency care including CPR and AED use, covered under the HLTAID010 certification."}, {"q": "Where should hands be positioned for chest compressions on an adult?", "opts": ["On the upper chest, just below the collarbone", "In the centre of the chest — on the lower half of the sternum", "On the left side of the chest", "Below the sternum on the abdomen"], "ans": 1, "exp": "For adult CPR, place the heel of one hand on the centre of the chest (lower half of the sternum), with the other hand on top, interlocked fingers, and arms straight."}, {"q": "If a person is breathing but unconscious, what position should they be placed in?", "opts": ["Flat on their back", "The recovery position (on their side)", "Seated upright", "Face down"], "ans": 1, "exp": "An unconscious but breathing person should be placed in the recovery position (on their side). This keeps the airway open and allows fluids to drain, reducing choking risk."}, {"q": "How do you check if an adult is unconscious?", "opts": ["Shake vigorously and shout their name", "Tap the shoulders firmly and shout 'Can you hear me? Are you OK?'", "Check their pulse immediately", "Look for breathing only"], "ans": 1, "exp": "To assess responsiveness: tap the shoulders firmly and shout 'Can you hear me? Are you OK?' This is the first step in the Response check of DRSABCD."}, {"q": "In hands-only CPR, what should be done?", "opts": ["Only perform rescue breaths without compressions", "Give continuous chest compressions at 100–120 per minute without rescue breaths", "Alternate between compressions and breaths at 15:2", "Only use an AED without CPR"], "ans": 1, "exp": "Hands-only CPR (compression-only) is effective when the rescuer is unable or unwilling to provide rescue breaths. Continuous compressions at 100–120 per minute maintain blood flow."}, {"q": "When using an AED, what is the correct sequence of actions?", "opts": ["Continue CPR → Attach AED → Follow voice prompts → Resume CPR after shock", "Turn on AED → Attach pads → Follow voice prompts (analyse and shock if advised) → Resume CPR immediately after shock", "Shock first → Attach pads → Begin CPR", "Attach pads → Turn on AED → Check pulse → Shock"], "ans": 1, "exp": "AED sequence: Turn on → Attach pads (as shown in diagram) → Follow voice prompts → Deliver shock if advised → Resume CPR immediately after the shock."}, {"q": "For how long should CPR continue?", "opts": ["Until the person shows signs of life, professional help takes over, or the rescuer is too exhausted to continue", "For exactly 5 minutes", "Until the patient regains consciousness", "For 2 minutes only"], "ans": 0, "exp": "CPR should continue until: the patient shows signs of life (breathing, movement), professional emergency services take over, or the rescuer is physically unable to continue."}, {"q": "What should be done immediately before starting CPR?", "opts": ["Check for a pulse for at least 30 seconds", "Ensure the scene is safe, call 000, and confirm the person is unresponsive and not breathing normally", "Begin rescue breaths", "Check the person's medical history"], "ans": 1, "exp": "Before CPR: ensure scene safety, call 000 (or have someone else call), confirm unresponsiveness (DRSABCD), confirm absence of normal breathing — then start CPR."}, {"q": "What is the purpose of 'chest recoil' during CPR?", "opts": ["To maximise compression depth", "To allow the heart to fill with blood between compressions", "To prevent rib fractures", "To maintain the correct compression rate"], "ans": 1, "exp": "Full chest recoil between compressions allows the heart to refill with blood, which is then pumped forward with the next compression. Incomplete recoil reduces blood flow."}, {"q": "What is the recommended action when an AED says 'no shock advised'?", "opts": ["Stop CPR — the patient is improving", "Resume CPR immediately and follow prompts", "Check for a pulse", "Turn the AED off and continue without it"], "ans": 1, "exp": "If the AED says 'no shock advised', resume CPR immediately. This means the heart rhythm detected does not require defibrillation — but CPR is still needed to maintain circulation."}, {"q": "What is the correct way to open the airway before giving rescue breaths?", "opts": ["Push the chin forward", "Head tilt–chin lift (place one hand on the forehead, tilt the head back, and use the fingers of the other hand to lift the chin)", "Extend the neck as far as possible", "Turn the head to one side"], "ans": 1, "exp": "The head tilt–chin lift technique opens the airway by extending the neck and lifting the tongue from the back of the throat, creating a clear passage for rescue breaths."}, {"q": "Under which circumstance might you NOT give rescue breaths?", "opts": ["When the patient is a child", "When you are not trained, do not have a face shield, or feel uncomfortable doing so — in which case hands-only CPR should be performed", "When more than one rescuer is present", "When an AED is available"], "ans": 1, "exp": "Hands-only CPR is recommended if the rescuer is untrained, lacks a face shield, or is uncomfortable with rescue breaths. Continuous compressions still significantly improve survival chances."}, {"q": "What is the recommended chest compression depth for an infant?", "opts": ["1–2 cm", "About one-third of the chest depth (approximately 4 cm)", "5–6 cm", "The same as for adults"], "ans": 1, "exp": "For infants, compressions should be approximately one-third of chest depth (about 4 cm) using two fingers placed on the centre of the chest just below the nipple line."}, {"q": "What should you do if a patient vomits during CPR?", "opts": ["Continue CPR — vomit is not a concern", "Stop CPR, turn the patient onto their side to clear the airway, clean the mouth, then resume CPR", "Perform deeper compressions to push the vomit out", "Only stop if instructed by emergency services"], "ans": 1, "exp": "If a patient vomits during CPR, turn them onto their side to clear the airway, clean the mouth if possible, then resume CPR. Aspiration of vomit can cause serious harm."}]}, {"id": "T15", "title": "Manual Handling", "questions": [{"q": "What is 'manual handling' in a workplace context?", "opts": ["Only tasks involving heavy lifting", "Any activity that requires physical effort to move, carry, hold, push, pull, or restrain objects or people", "Only tasks performed without mechanical assistance", "Only tasks that cause immediate injury"], "ans": 1, "exp": "Manual handling includes any task requiring physical effort to move or support objects or people: lifting, carrying, pushing, pulling, holding, or restraining."}, {"q": "What is the correct technique for lifting a heavy object from the floor?", "opts": ["Bend at the waist and use your back muscles", "Stand close to the load, bend your knees (not waist), keep your back straight, and lift using your leg muscles", "Lift quickly to use momentum", "Twist your body while lifting for better reach"], "ans": 1, "exp": "Safe lifting: stand close to the load, feet shoulder-width apart, bend your knees (not your back), keep the load close to your body, and lift smoothly using your leg muscles."}, {"q": "What is the maximum weight one person should attempt to lift alone in most workplace guidelines?", "opts": ["10 kg", "16 kg", "25 kg", "There is no official limit — it depends on the individual"], "ans": 2, "exp": "Australian guidelines generally recommend that one person should not lift more than 16–25 kg (depending on the guideline and context). For heavier loads, team lifting or mechanical aids should be used."}, {"q": "What body part is most commonly injured from poor manual handling technique?", "opts": ["Hands and wrists", "Lower back", "Knees", "Shoulders"], "ans": 1, "exp": "The lower back is the most frequently injured body part from poor manual handling. Lower back injuries can be chronic, debilitating, and are a leading cause of workers' compensation claims."}, {"q": "What is a 'musculoskeletal disorder' (MSD)?", "opts": ["A bone fracture caused by a fall", "An injury or disorder of muscles, tendons, ligaments, or spinal discs caused by repetitive or forceful movements", "A skin condition caused by chemical exposure", "An illness caused by a virus"], "ans": 1, "exp": "Musculoskeletal disorders (MSDs) include injuries to muscles, tendons, nerves, and joints caused by repetitive movement, awkward postures, or excessive force during manual handling tasks."}, {"q": "When should team lifting be used?", "opts": ["Always — even for small loads", "When a load is too heavy, bulky, or awkward for one person to handle safely", "Only in warehouses", "Only when a supervisor is present"], "ans": 1, "exp": "Team lifting should be used when a load exceeds safe single-person limits, is awkwardly shaped, or when one person cannot maintain a safe posture throughout the task."}, {"q": "What is the hierarchy of controls for manual handling risks?", "opts": ["PPE → Training → Engineering → Substitution → Elimination", "Elimination → Substitution → Engineering controls → Administrative controls → PPE", "Training → PPE → Engineering → Elimination", "Administrative controls → Engineering → PPE → Substitution"], "ans": 1, "exp": "The Hierarchy of Controls for manual handling (most to least effective): Elimination → Substitution → Engineering controls (e.g., trolleys) → Administrative controls (e.g., job rotation) → PPE."}, {"q": "What should you do before performing a manual handling task?", "opts": ["Begin immediately to avoid delays", "Assess the task — consider the load, environment, and your own physical condition before lifting", "Ask a colleague to watch in case you need help", "Ensure you are wearing gloves"], "ans": 1, "exp": "Before any manual handling task, assess the load (weight, size, stability), the environment (space, floor condition, distance), and your own condition (fitness, injuries, fatigue)."}, {"q": "What is the safest way to carry a heavy box over a distance?", "opts": ["Hold it at arm's length to see where you are going", "Hold it close to your body at waist height — clear the path and ensure you can see over the load", "Carry it above your head", "Drag it along the ground"], "ans": 1, "exp": "Hold heavy loads close to your body at waist height to reduce strain on your back. Ensure you can see the path ahead, clear any obstacles before starting, and ask for assistance if needed."}, {"q": "What risk does pushing rather than pulling a load present?", "opts": ["Pushing is always safer than pulling", "Pushing can cause lower back strain if excessive force is required; pulling puts even greater strain on the back and shoulders", "There is no difference between pushing and pulling", "Pulling is always safer than pushing"], "ans": 1, "exp": "Generally, pushing is safer than pulling as it uses larger muscle groups. However, both can cause injury if excessive force is required. Use mechanical aids (trolleys) whenever possible."}, {"q": "What is the correct technique when turning while carrying a load?", "opts": ["Twist your upper body while keeping your feet still", "Move your feet to turn your whole body — avoid twisting the spine while carrying a load", "Lean to one side to change direction", "There is no specific technique required"], "ans": 1, "exp": "When turning with a load, move your feet to reposition your whole body rather than twisting your spine. Twisting while carrying a load is a primary cause of back injuries."}, {"q": "What does 'ergonomics' refer to in a workplace context?", "opts": ["The science of energy efficiency in the workplace", "The science of designing work tasks, tools, and environments to fit the physical capabilities of workers, reducing injury risk", "The study of economic efficiency in manufacturing", "A type of manual handling equipment"], "ans": 1, "exp": "Ergonomics is the science of designing work to fit the worker — adjusting tasks, workstations, and tools to reduce physical stress and the risk of musculoskeletal injury."}, {"q": "Which of the following is a risk factor for manual handling injuries?", "opts": ["Taking regular breaks", "Repetitive movements, heavy loads, awkward postures, and insufficient rest", "Using mechanical lifting aids", "Working in a well-lit environment"], "ans": 1, "exp": "Key risk factors for manual handling injuries include: repetitive movements, heavy or awkward loads, sustained awkward postures, forceful exertion, and insufficient recovery time."}, {"q": "What should you do if you feel back pain during a manual handling task?", "opts": ["Push through it — the task must be completed", "Stop immediately, set the load down safely, and report the pain to your supervisor", "Continue if the pain is mild", "Apply a heat pack and continue working"], "ans": 1, "exp": "Any pain during a manual handling task is a warning sign of potential injury. Stop, set the load down safely, and report the symptom to your supervisor immediately."}, {"q": "What mechanical aid is most useful for moving heavy loads on a flat surface?", "opts": ["A rope and pulley system", "A flat-bed trolley or hand truck", "A forklift", "A conveyor belt"], "ans": 1, "exp": "A flat-bed trolley or hand truck is the most practical and widely available mechanical aid for moving heavy loads on flat surfaces in hospitality and village environments."}]}, {"id": "T16", "title": "Anti-Discrimination & Equal Opportunity", "questions": [{"q": "Which Australian legislation prohibits workplace discrimination?", "opts": ["Fair Work Act 2009", "Age Discrimination Act, Disability Discrimination Act, Racial Discrimination Act, Sex Discrimination Act, and relevant state legislation", "Work Health and Safety Act", "National Employment Standards"], "ans": 1, "exp": "Workplace discrimination is covered by multiple federal laws including the Age Discrimination Act, Disability Discrimination Act, Racial Discrimination Act, and Sex Discrimination Act, as well as state legislation."}, {"q": "What is 'direct discrimination'?", "opts": ["Treating someone unfairly by accident", "Treating a person less favourably than another person in similar circumstances because of a protected attribute (e.g., age, gender, race)", "Treating everyone the same regardless of their needs", "Only applies to hiring decisions"], "ans": 1, "exp": "Direct discrimination occurs when a person is treated less favourably than someone else in similar circumstances because of a protected characteristic such as age, gender, race, or disability."}, {"q": "What is 'indirect discrimination'?", "opts": ["Intentional discrimination against a specific person", "A policy or practice that appears neutral but disproportionately disadvantages people with a particular protected attribute", "Only applies to written policies", "Discrimination that occurs outside working hours"], "ans": 1, "exp": "Indirect discrimination occurs when a seemingly neutral rule, policy, or practice has a disproportionate negative impact on people with a protected characteristic (e.g., a height requirement that disadvantages women)."}, {"q": "What is 'sexual harassment' in the workplace?", "opts": ["Any physical contact between colleagues", "Unwelcome conduct of a sexual nature that a reasonable person would find offensive, humiliating, or intimidating", "Only physical acts of a sexual nature", "Any comment about a person's appearance"], "ans": 1, "exp": "Sexual harassment includes any unwelcome behaviour of a sexual nature — verbal (comments, jokes), non-verbal (gestures, staring), or physical — that a reasonable person would find offensive or intimidating."}, {"q": "Which of the following is a protected attribute under Australian discrimination law?", "opts": ["Work performance", "Race, sex, age, disability, pregnancy, religion, sexual orientation, and others", "Salary level", "Length of service"], "ans": 1, "exp": "Protected attributes under Australian law include: race, sex, age, disability, pregnancy/breastfeeding, religion, sexual orientation, marital status, family responsibilities, and more."}, {"q": "What is the employer's obligation to prevent workplace discrimination?", "opts": ["Only to have an anti-discrimination policy in writing", "To take all reasonable steps to prevent discrimination, harassment, and victimisation from occurring — not just respond after the fact", "Only to investigate complaints when received", "To ensure all employees are the same"], "ans": 1, "exp": "Employers have a positive duty to take all reasonable steps to eliminate discrimination and harassment. This includes training, clear policies, complaint procedures, and a culture of respect."}, {"q": "A colleague makes an offensive racial joke — what should you do?", "opts": ["Laugh along to avoid conflict", "Clearly state that the joke is offensive and report it to the supervisor or HR", "Ignore it — it was just a joke", "Tell only close colleagues about the incident"], "ans": 1, "exp": "Racial jokes constitute racial harassment. You should address it directly if you feel safe to do so, and report it to the supervisor or HR. Ignoring it condones the behaviour."}, {"q": "What does 'reasonable adjustment' for a person with a disability mean?", "opts": ["Giving them easier tasks only", "Modifying work arrangements, equipment, or processes to enable a person with a disability to perform their role — as long as it does not cause unjustifiable hardship", "Only providing wheelchair access", "Paying them a different wage"], "ans": 1, "exp": "Reasonable adjustment involves modifying the work environment or tasks to enable a person with a disability to participate fully. Employers are legally required to do this unless it causes unjustifiable hardship."}, {"q": "What is 'victimisation' in the context of anti-discrimination law?", "opts": ["Being treated unfairly once", "Treating someone less favourably because they made or supported a discrimination complaint", "Only applies to the original complainant", "A type of bullying behaviour"], "ans": 1, "exp": "Victimisation occurs when someone is treated unfavourably because they made, assisted, or are associated with a discrimination complaint. It is unlawful under anti-discrimination legislation."}, {"q": "An employee with a disability requests a modified workstation — how should the employer respond?", "opts": ["Refuse if it is too expensive", "Consider and implement reasonable adjustments, assessing the cost and impact — only refuse if it creates unjustifiable hardship", "Always grant the request without question", "Ask the employee to provide medical proof first, then decide"], "ans": 1, "exp": "Employers must consider and implement reasonable adjustments unless they would cause unjustifiable hardship. Cost and practical impact are considered, but refusal must be genuinely justified."}, {"q": "What is the Equal Opportunity Commission responsible for in Australia?", "opts": ["Setting minimum wages", "Receiving, investigating, and conciliating discrimination and harassment complaints — and providing education on rights and responsibilities", "Conducting workplace safety inspections", "Managing industrial relations"], "ans": 1, "exp": "Anti-discrimination commissions (state and federal) receive and investigate complaints, facilitate conciliation between parties, and provide education and guidance on discrimination law."}, {"q": "Can positive discrimination (affirmative action) be lawful under Australian law?", "opts": ["No — all discrimination is unlawful", "Yes — specific measures to assist disadvantaged groups or achieve equal opportunity are generally lawful", "Only in government organisations", "Only when approved by the Fair Work Commission"], "ans": 1, "exp": "Positive discrimination (or special measures/affirmative action) to assist disadvantaged groups — such as targeted employment programmes for Indigenous Australians — is generally lawful under Australian anti-discrimination legislation."}, {"q": "What is the difference between 'harassment' and 'bullying'?", "opts": ["They are identical", "Harassment is based on a protected attribute; bullying is repeated, unreasonable behaviour that creates a risk to health and safety — not necessarily based on a protected attribute", "Bullying is illegal; harassment is not", "Only harassment has legal consequences"], "ans": 1, "exp": "Harassment relates to conduct linked to a protected attribute (e.g., racial, sexual). Bullying is repeated, unreasonable behaviour that poses a health and safety risk — it does not need to be linked to a protected attribute."}, {"q": "A job advertisement states 'must be under 35 years old' — is this lawful?", "opts": ["Yes — employers can set any age requirements", "No — this constitutes unlawful age discrimination unless there is a genuine occupational requirement that justifies it", "Only lawful for physical jobs", "Only unlawful if a person complains"], "ans": 1, "exp": "Setting age limits in job advertisements is generally unlawful age discrimination in Australia. Exceptions exist only where age is a genuine occupational requirement (e.g., alcohol service age limits)."}, {"q": "What is the appropriate first step when an employee experiences or witnesses discrimination?", "opts": ["Immediately resign", "Document the incident and report it to the supervisor, HR, or the equal opportunity commission", "Post about it on social media", "Confront the perpetrator publicly"], "ans": 1, "exp": "Documenting the incident (date, time, what happened, witnesses) and reporting it through appropriate internal channels (supervisor, HR) is the correct first step. External complaints to commissions are also an option."}]}, {"id": "T17", "title": "Workplace Bullying Prevention", "questions": [{"q": "What is the legal definition of workplace bullying in Australia?", "opts": ["Any aggressive behaviour at work", "Repeated, unreasonable behaviour directed at a worker or group that creates a risk to health and safety", "A one-off incident of rude behaviour", "Only physical threatening behaviour"], "ans": 1, "exp": "Under the Fair Work Act, workplace bullying is repeated, unreasonable behaviour directed at a worker (or group) that creates a risk to health and safety. A single incident is not bullying under this definition."}, {"q": "Which of the following is an example of workplace bullying?", "opts": ["A supervisor giving constructive feedback about performance", "Repeatedly excluding a colleague from work-related information or meetings without reason", "Asking an employee to improve their work output", "A one-off heated argument"], "ans": 1, "exp": "Repeatedly excluding a colleague from work communications or meetings without reason is a form of bullying (exclusion/social isolation). Managing performance or a one-off disagreement is not bullying."}, {"q": "What distinguishes reasonable management action from bullying?", "opts": ["Reasonable management always involves positive feedback only", "Reasonable management is conducted lawfully, fairly, and constructively — even if the employee disagrees with it. Bullying is unreasonable, targeted, and creates health risks", "Any feedback given privately is reasonable management", "Any repeated instruction is bullying"], "ans": 1, "exp": "Reasonable management action (performance management, disciplinary action, directing work) is lawful even if the employee finds it uncomfortable. Bullying goes beyond reasonable management — it is unreasonable, targeted, and harmful."}, {"q": "What are the potential consequences of workplace bullying on the target?", "opts": ["Improved performance under pressure", "Anxiety, depression, reduced work performance, physical health impacts, and in severe cases, psychological harm requiring professional treatment", "Increased resilience", "No significant impact"], "ans": 1, "exp": "Workplace bullying can have severe mental and physical health consequences: anxiety, depression, insomnia, reduced performance, and in serious cases, PTSD or long-term psychological harm."}, {"q": "If you witness workplace bullying, what is the correct response?", "opts": ["Stay silent — it's not your business", "Do not participate, support the target, and report the behaviour to the supervisor or HR", "Tell the bully to stop in a public confrontation", "Wait to see if it continues before taking action"], "ans": 1, "exp": "If you witness bullying: don't participate or encourage it, offer support to the target, and report the behaviour to a supervisor or HR. Silence can be perceived as condoning the behaviour."}, {"q": "What is cyberbullying in the workplace?", "opts": ["Using company computers for personal use", "Using digital means (email, messaging, social media) to bully, harass, or threaten a colleague", "Only applies outside working hours", "Only involves anonymous messages"], "ans": 1, "exp": "Cyberbullying involves using digital channels (email, messaging apps, social media) to bully, exclude, harass, or threaten a colleague. It is equally serious as face-to-face bullying and has the same legal implications."}, {"q": "What should an employee do if they believe they are being bullied at work?", "opts": ["Retaliate to show they are not afraid", "Keep a record of incidents, speak to a trusted person, and report through the company's grievance procedure or directly to the Fair Work Commission if internal options are exhausted", "Change jobs immediately", "Only tell close friends"], "ans": 1, "exp": "If bullied: document each incident (date, time, what happened, witnesses), try to resolve directly if safe, use internal grievance procedures, or apply to the Fair Work Commission for an anti-bullying order."}, {"q": "Is a manager who assigns excessive workloads without justification engaging in bullying?", "opts": ["No — managers can assign any amount of work", "Potentially yes — assigning excessive and unreasonable workloads repeatedly without justification can constitute bullying", "Only if the work is impossible to complete", "Only if the employee objects formally"], "ans": 1, "exp": "Repeatedly assigning an unreasonable or excessive workload that creates a health risk — without justification — can constitute bullying. The key question is whether the behaviour is unreasonable and repeated."}, {"q": "What is a 'Stop Bullying Order' from the Fair Work Commission?", "opts": ["A criminal conviction for bullying", "A legal order from the Fair Work Commission requiring the bullying to stop and setting out conditions to prevent its recurrence", "A written warning issued by an employer", "An internal HR document"], "ans": 1, "exp": "A Stop Bullying Order is a binding order issued by the Fair Work Commission (upon application by the bullied worker) that requires the bullying to cease and sets conditions to prevent recurrence."}, {"q": "Can a manager be held personally liable for workplace bullying?", "opts": ["No — only the organisation is liable", "Yes — individual managers can face personal liability for their bullying behaviour under WHS legislation and anti-bullying provisions", "Only in criminal cases", "Only if they are a director"], "ans": 1, "exp": "Managers can be personally liable for bullying behaviour under WHS legislation (as a PCBU or officer) and may face Fair Work Commission proceedings. This is in addition to the organisation's liability."}, {"q": "What early warning signs of bullying should supervisors watch for in a team?", "opts": ["Increased productivity", "Unexplained absences, changes in behaviour, social withdrawal, or complaints about working relationships", "Staff requesting more responsibilities", "New team members settling in slowly"], "ans": 1, "exp": "Early warning signs of bullying include: unexplained absenteeism, changes in behaviour or mood, social withdrawal, reduced performance, and complaints about working relationships or specific individuals."}, {"q": "What is the organisation's responsibility to prevent workplace bullying?", "opts": ["Only to investigate complaints after they occur", "To implement a proactive bullying prevention policy, provide training, investigate complaints promptly, and create a culture of respect", "Only to discipline the bully after the fact", "To reassign the target to a different team"], "ans": 1, "exp": "Organisations have a WHS duty of care to proactively prevent bullying: by having clear policies, providing training, encouraging reporting, and investigating promptly and confidentially."}, {"q": "What is the difference between conflict and bullying?", "opts": ["They are the same thing", "Conflict involves a mutual disagreement; bullying is one-sided, repeated, and creates a power imbalance that poses a health risk", "Conflict is always lawful; bullying is always criminal", "Conflict only occurs between equals; bullying only between a manager and subordinate"], "ans": 1, "exp": "Conflict is a mutual dispute between people with differing views — both parties may be equally engaged. Bullying is one-sided, repeated, creates a power imbalance, and creates health and safety risks."}, {"q": "Why is confidentiality important when investigating a bullying complaint?", "opts": ["To protect the organisation's reputation only", "To protect all parties involved, encourage reporting, ensure a fair process, and prevent victimisation", "Only to comply with privacy legislation", "Confidentiality is not important in bullying investigations"], "ans": 1, "exp": "Confidentiality in bullying investigations protects the complainant from victimisation, ensures the respondent receives a fair process, and encourages other workers to come forward."}, {"q": "What is an effective first step to address a colleague's behaviour that you believe crosses the line into bullying?", "opts": ["Immediately escalate to the Fair Work Commission", "If safe to do so, calmly and clearly tell the person that their behaviour is unacceptable, using specific examples", "Post about it on social media to raise awareness", "Arrange a group confrontation with the bully"], "ans": 1, "exp": "If safe to do so, directly and calmly telling the person that their behaviour is unacceptable (with specific examples) can be effective, as they may not be aware of the impact. Document the conversation."}]}, {"id": "T18", "title": "Personal Hygiene & Uniform Standards", "questions": [{"q": "Why is maintaining personal hygiene critical for food handlers?", "opts": ["Only for appearance and professionalism", "To prevent the transfer of pathogens from the body to food, which can cause foodborne illness in customers", "Only required when handling ready-to-eat food", "To comply with uniform standards only"], "ans": 1, "exp": "Food handlers can transfer bacteria, viruses, and other pathogens from their body (hands, hair, skin) to food. High personal hygiene standards are a fundamental food safety requirement."}, {"q": "When must food handlers wash their hands?", "opts": ["Only at the start of the shift", "After using the toilet, after handling raw meat, after touching hair or face, after handling waste, after handling money, and before handling food", "Only when visibly dirty", "Every two hours regardless of activity"], "ans": 1, "exp": "Hand washing is required at all critical food safety moments: after using the toilet, after handling raw food, after touching non-food surfaces, after handling waste or money, and before handling food."}, {"q": "How should long hair be managed in a food handling environment?", "opts": ["Tied back loosely", "Tied back and fully covered with a hair net or hat to prevent hair falling into food", "Long hair does not need to be tied back", "Only needs to be tied back when working with desserts"], "ans": 1, "exp": "Long hair must be tied back and covered with a hair net or hat. Hair in food is a significant contamination risk and a common source of customer complaints."}, {"q": "What type of jewellery is typically permitted for food handlers?", "opts": ["All jewellery is prohibited", "A plain wedding band and stud earrings (where company policy allows) — no dangling jewellery or watches", "Any jewellery covered by gloves", "Jewellery restrictions only apply in the kitchen"], "ans": 1, "exp": "Most food safety guidelines permit only a plain wedding band and small stud earrings. Dangling jewellery can fall into food or become a catch hazard in the kitchen."}, {"q": "Why are artificial nails and nail polish not recommended for food handlers?", "opts": ["Only for appearance reasons", "They can harbour bacteria, break off into food, or prevent effective hand washing and sanitising", "Only a concern in commercial kitchens", "Only prohibited when not wearing gloves"], "ans": 1, "exp": "Artificial nails and nail polish can break or chip off into food, and they make it difficult to thoroughly clean and sanitise hands, creating a food safety risk."}, {"q": "What should you do if you have a cut or wound on your hand before starting a food handling task?", "opts": ["Continue working — the wound is on the outside of the hand", "Cover it with a brightly coloured (blue) waterproof bandage and wear a single-use glove over it", "Apply a standard bandage and continue without gloves", "Request a day off"], "ans": 1, "exp": "Wounds must be covered with a brightly coloured (usually blue, so it can be spotted if it falls into food) waterproof bandage, worn under a single-use glove during food handling."}, {"q": "How should the work uniform be maintained?", "opts": ["Wear it until it needs visible washing", "Clean and well-pressed before each shift — replace if damaged or stained", "Only wash if visibly soiled", "Personal clothing can be worn if the uniform is unavailable"], "ans": 1, "exp": "A clean, well-maintained uniform projects professionalism and hygiene standards. It must be washed after every shift, especially in food environments where contamination risk is high."}, {"q": "Why should outdoor footwear not be worn in food preparation areas?", "opts": ["It is only a preference, not a requirement", "Outdoor footwear can bring in contaminants, bacteria, and foreign matter from outside into food preparation areas", "Only required in kitchen areas, not dining rooms", "Only required if the footwear is visibly dirty"], "ans": 1, "exp": "Outdoor footwear can transfer soil, chemicals, animal waste, and other contaminants into food preparation areas. Separate, dedicated work footwear must be worn in these areas."}, {"q": "When should single-use gloves be changed?", "opts": ["Every 4 hours", "After handling raw meat, before switching tasks, if torn, after touching non-food surfaces, or after touching your face", "Only when visibly soiled", "Only when moving between raw and cooked food"], "ans": 1, "exp": "Single-use gloves must be changed when switching between tasks (especially raw to cooked food), after handling non-food surfaces, after touching your face, or if they become torn or contaminated."}, {"q": "Is it acceptable to wear the work uniform while travelling to and from work on public transport?", "opts": ["Yes — it shows professionalism", "No — uniforms worn outside the workplace can pick up external contaminants and must be changed at work", "Only acceptable for short trips", "Only acceptable if gloves are not worn with the uniform"], "ans": 1, "exp": "Work uniforms, especially for food handlers, should be put on and taken off at the workplace. Wearing a uniform on public transport exposes it to external contaminants."}, {"q": "What is the purpose of wearing a hat or hair covering when handling food?", "opts": ["Only for the visual appeal of the uniform", "To prevent hair, dandruff, and other scalp debris from falling into food — a common contamination source", "Only required for staff with long hair", "Only required in dessert preparation areas"], "ans": 1, "exp": "Hair coverings prevent hair, dandruff, and skin debris from contaminating food. Hair in food is one of the most common causes of food contamination complaints."}, {"q": "A staff member has a contagious illness (e.g., cold, flu) — can they work in a food handling role?", "opts": ["Yes, with extra hand washing", "No — they must stay home until they are no longer contagious, particularly if they have vomiting or diarrhoea", "Yes if they wear a mask", "Only if they work in a non-food area"], "ans": 1, "exp": "Staff with contagious illnesses — especially gastrointestinal symptoms (vomiting, diarrhoea) — must not work in food handling roles. This is a legal requirement under Australian food safety law."}, {"q": "What should a food handler do if they accidentally sneeze near food?", "opts": ["Cover their mouth and continue working", "Discard the potentially contaminated food, wash hands thoroughly, and follow the contamination response protocol", "Only discard food if they sneezed directly onto it", "Apply hand sanitiser and continue"], "ans": 1, "exp": "If a food handler sneezes near food, the potentially affected food must be discarded. The handler must wash hands thoroughly before resuming food handling tasks."}, {"q": "What is the correct procedure for handwashing in a food handling environment?", "opts": ["Rinse hands under water for 5 seconds", "Wet hands → apply soap → scrub for 20 seconds (including between fingers, thumbs, and wrists) → rinse → dry with a single-use paper towel", "Apply hand sanitiser only — no soap needed", "Wash with cold water only"], "ans": 1, "exp": "Correct handwashing: wet hands, apply soap, scrub vigorously for at least 20 seconds (all surfaces including between fingers and wrists), rinse thoroughly, dry with a disposable paper towel."}, {"q": "Why is it important that the uniform fits correctly and is in good repair?", "opts": ["Only for appearance", "Loose clothing can become caught in equipment; damaged clothing may contaminate food; a well-fitting uniform also supports professional presentation", "Only important in front-of-house roles", "The condition of the uniform has no impact on safety"], "ans": 1, "exp": "A well-fitting, intact uniform prevents clothing from being caught in kitchen equipment (a safety risk), reduces the risk of clothing fibres contaminating food, and maintains professional standards."}]}, {"id": "T19", "title": "Cash Handling Procedures", "questions": [{"q": "What is the purpose of counting cash when opening a cash register (float)?", "opts": ["To make sure there is enough change", "To verify the float amount matches the recorded starting balance before beginning trading", "Only to check for counterfeit notes", "To report the amount to the supervisor"], "ans": 1, "exp": "Counting the float at the start of each shift verifies the opening balance is correct and establishes a baseline for end-of-day reconciliation. Any discrepancy must be reported immediately."}, {"q": "A customer pays with a $50 note — what is the correct procedure?", "opts": ["Put it in the drawer immediately", "Count the change back to the customer, verify the note before placing it in the register, and call out the denomination", "Only accept small notes to avoid errors", "Ask the customer if they have smaller change"], "ans": 1, "exp": "When receiving large notes: verify the note (check for counterfeits), state the denomination received, provide the correct change counted back to the customer, then place the note in the register."}, {"q": "What should you do if you suspect you have received a counterfeit note?", "opts": ["Return it to the customer without comment", "Decline to accept it, retain the note if the customer leaves it, and report it to the supervisor and police", "Accept it and report it at end of shift", "Test it with a counterfeit detection pen only"], "ans": 1, "exp": "If a counterfeit note is suspected: do not return it to the customer, retain the note, do not fingerprint it unnecessarily, and report it to your supervisor and the police immediately."}, {"q": "Why should cash registers never be left open unattended?", "opts": ["It shortens the life of the register mechanism", "An open, unattended register creates an opportunity for theft or unauthorised access to cash", "Only a concern if customers are nearby", "Only required for registers over $500"], "ans": 1, "exp": "An open and unattended cash register is a significant security risk. Always close the register immediately after each transaction and never leave it unattended while open."}, {"q": "What is the correct procedure for handling a cash-up (end-of-day count)?", "opts": ["Count cash by yourself quickly at end of shift", "Count cash in the presence of another authorised staff member, record the total, compare it to POS records, and report any discrepancy", "Only count large denominations", "Hand the register to the manager without counting"], "ans": 1, "exp": "Cash-up must be conducted by two authorised staff members for accountability. The count must be recorded and reconciled against the POS system. Discrepancies must be reported and investigated."}, {"q": "What should you do if there is a discrepancy between the cash count and the POS system?", "opts": ["Adjust the record to match the cash", "Report the discrepancy to the supervisor immediately — do not adjust records or continue trading without authorisation", "Check again and if still different, leave it", "Take the difference out of your own pay"], "ans": 1, "exp": "Cash discrepancies must be reported immediately. Records must never be altered to cover discrepancies. All discrepancies are investigated — both under and over counts must be reported."}, {"q": "What are the correct steps when processing a cash refund?", "opts": ["Give the refund directly from the register without documentation", "Follow the company refund policy — get supervisor authorisation, record the refund in the POS system, and issue a receipt", "Only process refunds at the end of the shift", "Only managers can process refunds"], "ans": 1, "exp": "Cash refunds must follow proper procedure: supervisor authorisation (if required), documentation in the POS system, and a receipt issued to the customer. This creates an audit trail."}, {"q": "When should cash be transferred to the safe?", "opts": ["Only at closing time", "At regular intervals throughout the day (as per company policy) to minimise the amount of cash in the register at any one time", "Only when the register is full", "When requested by the manager only"], "ans": 1, "exp": "Regular cash drops to the safe throughout the day reduce the risk of theft. The amount kept in the register should be kept to the minimum required for making change."}, {"q": "What is the security purpose of two-person cash handling for large amounts?", "opts": ["To count faster", "To provide mutual accountability and deter theft — both parties must agree on the count", "Only for compliance documentation", "To reduce the time spent counting"], "ans": 1, "exp": "Two-person cash handling creates mutual accountability. If both people count and sign off on the same amount, it significantly reduces the risk of error or theft and protects both employees."}, {"q": "A customer leaves the correct cash on the counter without waiting for a receipt — what should you do?", "opts": ["Process the transaction and keep the cash separately", "Process the transaction correctly through the POS system and store the cash in the register as normal", "Leave the cash on the counter until the customer returns", "Add the cash to the float only"], "ans": 1, "exp": "Every cash transaction must be processed through the POS system, regardless of the circumstances. Cash left on the counter must be properly receipted and recorded."}, {"q": "Why is it important to always provide a receipt for cash transactions?", "opts": ["It is only required for large transactions", "It creates a record for the customer and the business — supporting reconciliation and providing evidence of the transaction", "Only required if the customer requests one", "Only for tax purposes"], "ans": 1, "exp": "Receipts serve as evidence of a transaction, support accurate reconciliation, and provide customers with proof of purchase. They are important for resolving disputes."}, {"q": "What should be done if you make an error in processing a cash transaction?", "opts": ["Try to fix it yourself by adjusting the drawer", "Notify the supervisor immediately and follow the void/correction procedure in the POS system", "Correct it at end of day reconciliation", "Ignore minor errors"], "ans": 1, "exp": "Transaction errors must be corrected through the proper void/correction procedure in the POS system, with supervisor notification. Self-correction without documentation creates audit discrepancies."}, {"q": "What is the purpose of the cash handling policy?", "opts": ["To make cash handling more complicated", "To protect the business and employees from errors, theft, and fraud through clear, consistent procedures", "Only to meet audit requirements", "Only to protect the business from customer disputes"], "ans": 1, "exp": "A cash handling policy protects the business from financial loss and ensures employees are protected by having clear, documented procedures that can be verified and audited."}, {"q": "When is it appropriate to share your cash register login with a colleague?", "opts": ["When they are busy and need to process a quick sale", "Never — each employee must use only their own login for accountability and audit trail purposes", "When a manager is present", "In cases of emergency only"], "ans": 1, "exp": "Cash register logins must never be shared. Each transaction must be linked to the individual who processed it for accountability. Shared logins prevent investigation of discrepancies."}, {"q": "What does 'cash register reconciliation' involve?", "opts": ["Cleaning the register", "Comparing the actual cash in the register against the POS sales records to identify any discrepancies", "Counting only the coins in the register", "Replacing the cash in the register with fresh notes"], "ans": 1, "exp": "Reconciliation involves comparing the physical cash count against the POS system records for the same period. Any difference (over or short) must be recorded and investigated."}]}, {"id": "T20", "title": "Energy Awareness Training", "questions": [{"q": "Why is energy efficiency important on a mine site?", "opts": ["Only for cost reduction", "To reduce operational costs, lower environmental impact, meet regulatory requirements, and ensure sustainable resource use", "Only to comply with government regulations", "Only relevant to the maintenance team"], "ans": 1, "exp": "Energy efficiency on mine sites reduces costs, lowers carbon emissions, reduces reliance on fossil fuels, and demonstrates environmental responsibility — relevant to all staff."}, {"q": "Which of the following is a simple energy-saving action for kitchen staff?", "opts": ["Leaving oven doors open to heat the kitchen in winter", "Turning off equipment when not in use and not pre-heating ovens unnecessarily", "Running dishwashers with partial loads to save time", "Leaving refrigerator doors open while restocking"], "ans": 1, "exp": "Turning off equipment when not in use and avoiding unnecessary pre-heating are easy, impactful energy-saving habits that all kitchen staff can practise."}, {"q": "What does 'energy intensity' mean?", "opts": ["The maximum power output of an electrical appliance", "The amount of energy consumed per unit of output or activity (e.g., energy used per meal produced)", "The voltage level required by equipment", "The number of appliances in use at one time"], "ans": 1, "exp": "Energy intensity measures how much energy is used to produce a given amount of output. Reducing energy intensity while maintaining output is a key efficiency goal."}, {"q": "What should you do if you notice energy waste (e.g., lights left on in unused areas)?", "opts": ["Ignore it — it's the energy company's responsibility", "Switch off the lights and report it to the supervisor to identify and address the root cause", "Take a photo and report it to management next week", "Only address it if asked by the site manager"], "ans": 1, "exp": "All staff have a role in energy management. Reporting waste enables systemic improvements. Individual actions like turning off unused lights have a cumulative impact on energy use."}, {"q": "What is the benefit of using LED lighting compared to traditional incandescent bulbs?", "opts": ["LEDs produce more heat, which is useful in cold areas", "LEDs use significantly less energy (up to 80% less) and last much longer than incandescent bulbs", "Incandescent bulbs produce better quality light", "There is no practical difference"], "ans": 1, "exp": "LED lights use up to 80% less energy than incandescent bulbs and last up to 25 times longer, making them significantly more cost-effective and environmentally friendly."}, {"q": "What is the purpose of an energy audit?", "opts": ["To check electricity billing accuracy only", "To systematically assess energy consumption across a facility, identify waste, and recommend improvements", "Only required every 10 years", "Only conducted by external consultants"], "ans": 1, "exp": "An energy audit identifies how and where energy is being used across a facility, pinpoints inefficiencies, and recommends actions to reduce consumption and costs."}, {"q": "What does 'standby power' (or phantom load) refer to?", "opts": ["The maximum power a device uses when fully operational", "The electricity consumed by devices that are switched off but remain plugged in and drawing power", "Power used during peak hours only", "The backup power supply for the site"], "ans": 1, "exp": "Standby power (phantom load) is the electricity consumed by devices in standby or sleep mode. It can account for 5–10% of total energy use. Switching off at the power point eliminates it."}, {"q": "What is the most energy-efficient temperature setting for a commercial refrigerator?", "opts": ["As cold as possible to ensure food safety", "0°C–4°C — the minimum safe food storage temperature without unnecessary over-cooling", "–5°C to ensure all bacteria are killed", "5°C–10°C to reduce energy consumption"], "ans": 1, "exp": "Setting refrigerators to the minimum safe temperature (0°C–4°C) prevents unnecessary over-cooling, which wastes significant energy while still maintaining food safety standards."}, {"q": "What is the greenhouse effect in simple terms?", "opts": ["The effect of glass on plant growth in greenhouses", "The warming of the Earth's surface due to greenhouse gases trapping heat in the atmosphere", "The cooling effect of air conditioning on the environment", "The impact of industrial waste on water quality"], "ans": 1, "exp": "The greenhouse effect occurs when greenhouse gases (CO₂, methane, etc.) trap heat in the Earth's atmosphere, causing global temperatures to rise. Burning fossil fuels increases greenhouse gas emissions."}, {"q": "Which everyday workplace behaviour contributes most directly to reducing energy consumption?", "opts": ["Using more modern appliances", "Turning off lights, computers, and equipment when leaving a room or finishing a task", "Working fewer hours", "Using higher-quality materials"], "ans": 1, "exp": "The simplest and most impactful energy-saving behaviour is consistently switching off lights, screens, and equipment when not in use. This costs nothing and can significantly reduce energy bills."}, {"q": "What does 'carbon footprint' mean in the context of a workplace?", "opts": ["The amount of waste produced by the workplace", "The total greenhouse gas emissions (directly and indirectly) caused by the activities of the workplace", "The physical size of the workplace", "The number of employees commuting by car"], "ans": 1, "exp": "A carbon footprint is the total amount of greenhouse gases generated by an organisation's activities, including energy use, travel, waste, and supply chain impacts."}, {"q": "What is the purpose of a Building Management System (BMS) in an energy context?", "opts": ["To manage employee scheduling", "To monitor and control building systems (HVAC, lighting, etc.) to optimise energy use and reduce waste", "To track building maintenance costs only", "To control access to the building"], "ans": 1, "exp": "A Building Management System (BMS) automates the control of heating, ventilation, air conditioning, and lighting to optimise energy use, ensuring systems only run when and where needed."}, {"q": "Why is proper equipment maintenance important for energy efficiency?", "opts": ["Only to extend equipment lifespan", "Poorly maintained equipment works harder, uses more energy, and is less reliable — regular maintenance keeps equipment running at peak efficiency", "Maintenance reduces energy use only for large industrial equipment", "Only relevant to refrigeration equipment"], "ans": 1, "exp": "Well-maintained equipment operates more efficiently. For example: clean refrigerator coils, unblocked air vents, and properly sealed oven doors all reduce energy consumption significantly."}, {"q": "What is the difference between renewable and non-renewable energy?", "opts": ["Renewable energy is cheaper; non-renewable is more reliable", "Renewable energy comes from naturally replenishing sources (solar, wind, hydro); non-renewable comes from finite sources (coal, gas, oil) that will eventually run out", "Non-renewable energy is greener", "There is no practical difference in energy output"], "ans": 1, "exp": "Renewable energy sources (solar, wind, hydro, geothermal) are naturally replenished and have low or zero emissions. Non-renewable sources (coal, gas, oil) are finite and produce greenhouse gas emissions."}, {"q": "What role do employees play in achieving a site's energy reduction targets?", "opts": ["None — energy management is the responsibility of the engineering team", "A critical role — individual energy-saving behaviours collectively have a significant impact on the site's overall energy consumption", "Only to report faults in equipment", "Only relevant to staff in maintenance roles"], "ans": 1, "exp": "Employees at all levels contribute to energy efficiency through daily habits: turning off equipment, reporting leaks or faults, following energy procedures, and supporting energy initiatives. Individual actions add up."}]}];


function renderHome(){
  const grid = document.getElementById('moduleGrid');
  grid.innerHTML = '';
  quizData.forEach(m => {
    const tag = m._result ? (m._result === 'pass'
      ? '<span class="answered-tag tag-pass">✓ Passed</span>'
      : '<span class="answered-tag tag-fail">✗ Failed</span>') : '';
    const card = document.createElement('div');
    card.className = 'mod-card';
    card.innerHTML = `<div class="mod-id">${m.id}${tag}</div><div class="mod-name">${m.title}</div><div class="mod-count">15 questions</div>`;
    card.onclick = () => startQuiz(m.id);
    grid.appendChild(card);
  });
}

function startQuiz(id){
  currentModule = quizData.find(m => m.id === id);
  answers = {};
  score = 0;
  answered = 0;
  document.getElementById('quizTitle').textContent = currentModule.id + ' — ' + currentModule.title;
  document.getElementById('scoreNow').textContent = '0';
  document.getElementById('scoreOf').textContent = currentModule.questions.length;
  document.getElementById('answeredCount').textContent = '0';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('submitBtn').style.display = 'none';
  renderQuestions();
  document.getElementById('home').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  window.scrollTo(0,0);
}

function renderQuestions(){
  const list = document.getElementById('questionList');
  list.innerHTML = '';
  currentModule.questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qcard-' + qi;
    const opts = q.opts.map((o, oi) =>
      `<button class="opt-btn" id="opt-${qi}-${oi}" onclick="selectAnswer(${qi},${oi})">${String.fromCharCode(65+oi)}. ${o}</button>`
    ).join('');
    card.innerHTML = `
      <div class="q-num">Q${qi+1} / ${currentModule.questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts">${opts}</div>
      <div class="explanation" id="exp-${qi}">💡 ${q.exp}</div>`;
    list.appendChild(card);
  });
}

function selectAnswer(qi, oi){
  if(answers[qi] !== undefined) return;
  const q = currentModule.questions[qi];
  answers[qi] = oi;
  answered++;
  const correct = oi === q.ans;
  if(correct) score++;
  document.getElementById('scoreNow').textContent = score;
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('progressBar').style.width = (answered/currentModule.questions.length*100)+'%';
  const total = currentModule.questions.length;
  for(let i=0;i<q.opts.length;i++){
    const btn = document.getElementById(`opt-${qi}-${i}`);
    btn.disabled = true;
    if(i===q.ans) btn.classList.add('reveal');
    if(i===oi && !correct) btn.classList.add('wrong');
    if(i===oi && correct) btn.classList.add('correct');
  }
  document.getElementById(`exp-${qi}`).classList.add('show');
  if(answered === total){
    document.getElementById('submitBtn').style.display = 'inline-block';
    document.getElementById('submitBtn').scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function showResult(){
  const total = currentModule.questions.length;
  const pass = score >= PASS;
  currentModule._result = pass ? 'pass' : 'fail';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('resultIcon').textContent = pass ? '🎉' : '📚';
  document.getElementById('resultTitle').textContent = pass ? 'Congratulations — Passed!' : 'Not Passed — Keep Trying!';
  document.getElementById('resultScore').textContent = score + ' / ' + total;
  document.getElementById('resultScore').className = 'result-score ' + (pass ? 'result-pass' : 'result-fail');
  document.getElementById('resultMsg').textContent = pass
    ? `You scored ${score}/${total} (${Math.round(score/total*100)}%) — well done! You have passed this module.`
    : `You scored ${score}/${total} (${Math.round(score/total*100)}%) — you need at least ${PASS}/15 (87%) to pass. Please review the material and try again.`;
  window.scrollTo(0,0);
}

function retryQuiz(){ startQuiz(currentModule.id); }
function goHome(){
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  renderHome();
  window.scrollTo(0,0);
}

renderHome();
</script>
