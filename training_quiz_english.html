<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainline Service Staff Training Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
header{background:linear-gradient(135deg,#1a365d,#2b6cb0);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:16px}
header h1{font-size:1.4rem;font-weight:700}
header p{font-size:.85rem;opacity:.85;margin-top:2px}
.logo{font-size:2rem}
#home{padding:24px}
.home-title{font-size:1.2rem;font-weight:600;color:#2d3748;margin-bottom:6px}
.home-sub{font-size:.9rem;color:#718096;margin-bottom:20px}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.mod-card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;border:2px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .2s}
.mod-card:hover{border-color:#3182ce;transform:translateY(-2px);box-shadow:0 4px 12px rgba(49,130,206,.2)}
.mod-card .mod-id{font-size:.75rem;font-weight:700;color:#3182ce;letter-spacing:.05em;margin-bottom:6px}
.mod-card .mod-name{font-size:.9rem;font-weight:600;color:#2d3748;line-height:1.4}
.mod-card .mod-count{font-size:.75rem;color:#a0aec0;margin-top:8px}
#quiz{display:none;padding:24px;max-width:860px;margin:0 auto}
.quiz-header{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.quiz-header h2{font-size:1.1rem;font-weight:700;color:#2d3748}
.back-btn{background:#e2e8f0;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;color:#4a5568;font-weight:600}
.back-btn:hover{background:#cbd5e0}
.score-bar{background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.score-label{font-size:.85rem;color:#718096}
.score-num{font-size:1.4rem;font-weight:700;color:#2d3748}
.progress-wrap{flex:1;background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#38a169,#48bb78);border-radius:99px;transition:width .4s}
.q-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.q-num{font-size:.75rem;font-weight:700;color:#718096;letter-spacing:.06em;margin-bottom:8px}
.q-text{font-size:.95rem;font-weight:600;color:#2d3748;line-height:1.6;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{background:#f7fafc;border:2px solid #e2e8f0;border-radius:8px;padding:10px 14px;text-align:left;cursor:pointer;font-size:.88rem;color:#4a5568;transition:all .18s;line-height:1.5}
.opt-btn:hover:not([disabled]){background:#ebf8ff;border-color:#90cdf4;color:#2b6cb0}
.opt-btn[disabled]{cursor:default}
.opt-btn.correct{background:#f0fff4;border-color:#38a169;color:#276749;font-weight:700}
.opt-btn.wrong{background:#fff5f5;border-color:#fc8181;color:#c53030}
.opt-btn.reveal{background:#f0fff4;border-color:#38a169;color:#276749;font-weight:700}
.explanation{margin-top:12px;padding:12px 14px;background:#fffbeb;border-left:4px solid #f6ad55;border-radius:0 8px 8px 0;font-size:.85rem;color:#744210;line-height:1.6;display:none}
.explanation.show{display:block}
#result{display:none;padding:24px;max-width:500px;margin:0 auto;text-align:center}
.result-card{background:#fff;border-radius:16px;padding:32px 24px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.result-icon{font-size:4rem;margin-bottom:16px}
.result-title{font-size:1.5rem;font-weight:700;margin-bottom:8px}
.result-score{font-size:3rem;font-weight:800;margin:16px 0}
.result-pass{color:#38a169}
.result-fail{color:#e53e3e}
.result-msg{font-size:.95rem;color:#718096;line-height:1.6;margin-bottom:24px}
.result-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:#3182ce;color:#fff;border:none;padding:12px 24px;border-radius:10px;cursor:pointer;font-size:.95rem;font-weight:600}
.btn-primary:hover{background:#2b6cb0}
.btn-secondary{background:#e2e8f0;color:#4a5568;border:none;padding:12px 24px;border-radius:10px;cursor:pointer;font-size:.95rem;font-weight:600}
.btn-secondary:hover{background:#cbd5e0}
.answered-tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:99px;margin-left:8px;font-weight:600}
.tag-pass{background:#c6f6d5;color:#276749}
.tag-fail{background:#fed7d7;color:#c53030}
@media(max-width:600px){.module-grid{grid-template-columns:1fr 1fr}.quiz-header{flex-direction:column;gap:10px;align-items:flex-start}}
</style>
</head>
<body>
<header>
  <div class="logo">🎓</div>
  <div>
    <h1>Mainline Service Staff Training Quiz System</h1>
    <p>Pass Mark: 13/15 (87%) — Select a module below to begin</p>
  </div>
</header>

<div id="home">
  <div class="home-title">Select a Training Module</div>
  <div class="home-sub">Click on a module below to start the quiz. Each quiz has 15 questions. Score 13 or above to pass.</div>
  <div class="module-grid" id="moduleGrid"></div>
</div>

<div id="quiz">
  <div class="quiz-header">
    <h2 id="quizTitle"></h2>
    <button class="back-btn" onclick="goHome()">← Back to Modules</button>
  </div>
  <div class="score-bar">
    <div>
      <div class="score-label">Current Score</div>
      <div class="score-num"><span id="scoreNow">0</span> / <span id="scoreOf">15</span></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div>
      <div class="score-label">Answered</div>
      <div class="score-num"><span id="answeredCount">0</span>/15</div>
    </div>
  </div>
  <div id="questionList"></div>
  <div style="text-align:center;margin-top:20px">
    <button class="btn-primary" id="submitBtn" onclick="showResult()" style="display:none">View Final Result</button>
  </div>
</div>

<div id="result">
  <div class="result-card">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-btns">
      <button class="btn-primary" onclick="retryQuiz()">Retry</button>
      <button class="btn-secondary" onclick="goHome()">Home</button>
    </div>
  </div>
</div>

<script>
const PASS = 13;
let currentModule = null;
let answers = {};
let score = 0;
let answered = 0;

const quizData = [{"id": "T01", "title": "Computer & POS System Operation", "questions": [{"q": "What does POS stand for?", "opts": ["Purchase Order System", "Point of Sale", "Product Operating System", "Point of Service"], "ans": 1, "exp": "POS stands for Point of Sale — the core system used in the hospitality industry to manage sales transactions."}, {"q": "What should you do after each use of the POS system?", "opts": ["Restart the system to prevent damage", "Save all customer order forms", "Log out to prevent unauthorised access", "Clear all entered orders"], "ans": 2, "exp": "Logging out after every use is a basic step to protect company financial security and prevent unauthorised operation."}, {"q": "What is the most appropriate action when the POS system breaks down?", "opts": ["Restart the device immediately", "Stop providing any service to customers", "Switch to manual recording and immediately notify the supervisor", "Explain the fault to customers and ask them to wait"], "ans": 2, "exp": "When a system failure occurs, switch to manual recording to ensure uninterrupted service and notify your supervisor to handle the technical issue."}, {"q": "How should login passwords for work computers be handled?", "opts": ["Write the password next to the POS for easy access", "Share with trusted colleagues to improve efficiency", "Each employee has their own — keep it confidential and do not share", "Change monthly and notify all staff"], "ans": 2, "exp": "Passwords are personal authentication tools. Sharing passwords prevents accountability tracking and violates information security principles."}, {"q": "What is the most appropriate response when a customer's credit card is declined?", "opts": ["Loudly announce that the card has been declined", "Try swiping the card multiple times", "Contact the bank directly", "Quietly inform the customer and offer alternative payment methods"], "ans": 3, "exp": "Respecting customer privacy, handling the situation discreetly, and offering alternatives demonstrates professional service."}, {"q": "What is the purpose of End-of-Day Reconciliation?", "opts": ["To clean the POS touchscreen", "To compare actual cash received against system records for the day", "To close all package pickups", "To back up all customer information"], "ans": 1, "exp": "End-of-day reconciliation ensures accurate accounts. Any discrepancies can be investigated promptly — it is a fundamental financial management requirement."}, {"q": "Is downloading personal software onto work computers permitted?", "opts": ["Yes, as long as you don't open it", "Yes, as long as you delete it after installing", "No — only company-approved software is permitted", "It depends on the situation"], "ans": 2, "exp": "Unauthorised software may introduce viruses, create security vulnerabilities, or violate company IT policy — it is not permitted under any circumstances."}, {"q": "What is the primary function of an inventory management system in the hospitality industry?", "opts": ["Recording employee attendance", "Tracking stock levels, reducing waste, and automatically triggering orders", "Managing customer reservation data", "Creating employee training records"], "ans": 1, "exp": "Inventory management systems help restaurants control ingredient costs, ensure adequate stock, and reduce expired waste."}, {"q": "You discover a suspicious fraudulent transaction in the system — what should you do?", "opts": ["Delete the transaction to avoid trouble", "Check with the customer first before deciding", "Wait until month-end reconciliation to deal with it", "Report it to your supervisor immediately"], "ans": 3, "exp": "Suspicious transactions must be reported immediately. Deleting them yourself may constitute a criminal offence and eliminates the chance to track fraud."}, {"q": "What does EFTPOS stand for?", "opts": ["Electronic Financial Transfer Processing Operating System", "Emergency Financial Transfer Point Of Service", "Electronic Funds Transfer at Point Of Sale", "Efficient Fast Transaction Processing System"], "ans": 2, "exp": "EFTPOS = Electronic Funds Transfer at Point Of Sale — electronic fund transfer at the point of sale."}, {"q": "How often should digital records be backed up?", "opts": ["Weekly", "Monthly", "Daily or as per company policy", "Only when the system is nearly full"], "ans": 2, "exp": "Regular backups (ideally daily) prevent data loss from system failures — this is a basic IT management requirement."}, {"q": "How should customer personal information (such as email addresses) be handled?", "opts": ["May be shared with all staff present", "Stored securely and not shared with third parties without authorisation", "Can be shared for practical purposes", "Only used for marketing purposes"], "ans": 1, "exp": "Under Australian privacy law, personal data must be stored securely and not shared without customer consent. Violations may result in fines."}, {"q": "How do most cloud POS systems operate when disconnected from the internet?", "opts": ["They stop working entirely", "They delete all unsaved data", "They switch to offline mode and sync automatically when connectivity is restored", "They automatically contact IT support"], "ans": 2, "exp": "Modern cloud POS systems are designed with offline mode to ensure service continuity, syncing data automatically when connectivity is restored."}, {"q": "Why must incorrect transactions be properly voided?", "opts": ["It is just a policy with no practical impact", "To maintain accurate financial records and prevent discrepancies", "To avoid slowing down the system", "To improve customer satisfaction"], "ans": 1, "exp": "Properly voiding incorrect transactions ensures accurate financial records, prevents reconciliation discrepancies, and is an internal audit requirement."}, {"q": "A customer is unhappy about waiting times — how should you handle this?", "opts": ["Tell the customer the wait time is normal", "Sincerely apologise, provide an estimated wait time or alternative options", "Ask the customer to go elsewhere", "Ignore it — the customer has already come in"], "ans": 1, "exp": "Proactively apologising, providing information, and offering alternatives is an effective way to resolve customer dissatisfaction and demonstrates professional service."}]}, {"id": "T02", "title": "Food Safety Training", "questions": [{"q": "What is the 'temperature danger zone' for food safety in Australia?", "opts": ["0°C – 5°C", "5°C – 60°C", "10°C – 70°C", "0°C – 60°C"], "ans": 1, "exp": "5°C to 60°C is the temperature range in which bacteria multiply rapidly. Food should not remain in this range longer than necessary."}, {"q": "Under the '2-hour/4-hour rule', what must you do with food that has been in the danger zone for more than 4 hours?", "opts": ["Refrigerate it immediately", "Continue to use it", "Discard it", "Reheat and use it"], "ans": 2, "exp": "After 4 hours, bacteria may have multiplied extensively. Reheating cannot eliminate toxins — the food must be discarded."}, {"q": "What does FIFO stand for?", "opts": ["First In, Last Out", "First In, First Out", "Use the fastest-expiring item first", "Use the cheapest item first"], "ans": 1, "exp": "FIFO = First In, First Out — ensuring that items received earlier are used first to prevent expiry."}, {"q": "After handling raw chicken, a chef is about to prepare a salad — what must they do first?", "opts": ["Change their apron", "Simply change gloves", "Wash hands and change the chopping board and knife", "Spray sanitiser on their hands"], "ans": 2, "exp": "Raw chicken contains pathogens like Salmonella. Hands must be washed and all utensils changed to prevent cross-contamination."}, {"q": "Which of the following behaviours violates food safety regulations?", "opts": ["Storing raw food on lower shelves and cooked food on upper shelves when refrigerating", "Using different coloured chopping boards for different food types", "Placing cooked food next to raw meat with no cover", "Recording food temperatures and filing records"], "ans": 2, "exp": "Placing cooked food next to uncovered raw meat causes direct cross-contamination — a serious breach of food safety regulations."}, {"q": "An employee has symptoms of vomiting and diarrhoea — what should they do?", "opts": ["Wear a mask and continue working", "Continue working after washing hands frequently", "Notify the supervisor immediately and do not handle food", "It's fine as long as they don't have a fever"], "ans": 2, "exp": "Vomiting and diarrhoea are typical symptoms of norovirus, which spreads easily through food. Australian food regulations prohibit affected persons from handling food."}, {"q": "How long is a Food Safety Supervisor (FSS) certificate valid?", "opts": ["1 year", "3 years", "5 years", "Permanently valid"], "ans": 2, "exp": "Under Australian state food regulations, a Food Safety Supervisor certificate is valid for 5 years and must be renewed upon expiry."}, {"q": "How long should proper handwashing take?", "opts": ["5 seconds", "10 seconds", "20 seconds", "60 seconds"], "ans": 2, "exp": "The WHO and Australian food regulations recommend handwashing for at least 20 seconds to effectively remove pathogens."}, {"q": "You notice the cool room temperature reads 8°C (above the 5°C standard) — what should you do?", "opts": ["Continue using it and report after your shift", "Notify your supervisor immediately and assess the safety of food stored inside", "Simply adjust the temperature setting yourself", "Move all food to room temperature"], "ans": 1, "exp": "An above-standard cool room temperature is a food safety emergency — report it immediately and assess whether food needs to be discarded."}, {"q": "Which of the following food storage practices is correct?", "opts": ["Raw meat stored above ready-to-eat food", "Cooked/ready-to-eat food stored above raw meat", "Raw and cooked food stored on the same tray", "Position doesn't matter as long as containers have lids"], "ans": 1, "exp": "If raw meat juices drip onto cooked food, cross-contamination occurs. Cooked/ready-to-eat food must always be stored on higher shelves."}, {"q": "What does Australian Food Safety Standard 3.2.2 primarily cover?", "opts": ["Limits on the use of food additives", "Food packaging material standards", "Food safety practices and employee training requirements", "Food import standards"], "ans": 2, "exp": "Standard 3.2.2 sets out obligations for food businesses including employee training, temperature control, and record keeping."}, {"q": "In which of the following situations must food be discarded immediately?", "opts": ["Food stored under refrigeration for more than 2 days", "Food that has been in the temperature danger zone for a cumulative total of more than 4 hours", "Food with a slight change in appearance but normal smell", "Food that has been open for more than 1 hour"], "ans": 1, "exp": "4 cumulative hours in the danger zone is the clear threshold under Australian food safety regulations — the food must be discarded with no exceptions."}, {"q": "What is the most common cause of cross-contamination?", "opts": ["Uneven food heating", "Using the same knife or chopping board for different foods without washing", "Storing food for too long", "Excessive kitchen temperature"], "ans": 1, "exp": "Shared utensils are the primary cause of cross-contamination. A colour-coded system should be used, and all utensils must be cleaned and sanitised after each use."}, {"q": "Under Australian law, how long must training records be kept for food industry employees?", "opts": ["1 year", "2 years", "5 years", "10 years"], "ans": 2, "exp": "Under WHS regulations and food safety requirements, training records must be retained for at least 5 years for regulatory inspection."}, {"q": "A customer complains about finding a foreign object in their food — what should you do?", "opts": ["Tell the customer it's impossible", "Remove the food immediately, sincerely apologise, and notify the supervisor to record the incident", "Suggest the customer return next time for compensation", "Tell the customer it is a normal ingredient"], "ans": 1, "exp": "Food complaints must be addressed immediately, recorded, and reported — this is a dual requirement of food safety management and customer service."}]}, {"id": "T03", "title": "Allergen Awareness Training", "questions": [{"q": "Which of the following is NOT one of Australia's 14 major allergens?", "opts": ["Peanuts", "Buckwheat", "Garlic", "Cashews"], "ans": 2, "exp": "Garlic is not among the 14 major allergens. The 14 include: peanuts, tree nuts, milk, wheat, fish, shellfish, eggs, soybeans, buckwheat, sesame, mustard, lupin, sulphur dioxide, and sulphites."}, {"q": "A customer says they are allergic to dairy. A menu item is unclear about whether it contains dairy — what should you do?", "opts": ["Tell the customer it probably doesn't contain dairy", "Check the latest ingredient information or confirm with the chef — do not serve until confirmed", "Suggest the customer order something else", "Tell the customer all dishes may contain dairy"], "ans": 1, "exp": "In any case of uncertainty about allergens, you must confirm before serving — never guess."}, {"q": "What is anaphylaxis?", "opts": ["A mild skin reaction", "Chest tightness and itching that usually resolves within a few hours", "A potentially fatal systemic allergic reaction that can cause airway constriction and a sudden drop in blood pressure", "A localised reaction caused by a common bacterial infection"], "ans": 2, "exp": "Anaphylaxis is a medical emergency that can be life-threatening within minutes — call 000 immediately and use an EpiPen."}, {"q": "A customer shows signs of anaphylaxis (flushed face, throat tightness, difficulty breathing) — what must you do immediately?", "opts": ["Give the customer water and observe for two minutes", "Buy antihistamines for the customer", "Call 000 and use the EpiPen (if the customer has one)", "Ask the customer to go to hospital themselves"], "ans": 2, "exp": "Anaphylaxis is an emergency — call 000 immediately. If the customer has an EpiPen, assist them in using it right away."}, {"q": "Which organisation oversees allergen labelling in Australia?", "opts": ["WorkSafe Australia", "Fair Work Commission", "Food Standards Australia New Zealand (FSANZ)", "OLGR"], "ans": 2, "exp": "FSANZ is responsible for establishing food safety standards for Australia and New Zealand, including mandatory allergen labelling requirements."}, {"q": "A chef uses cookware contaminated with peanut sauce without washing it on other food — this is called what?", "opts": ["Safe — high heat destroys allergens", "Cross-contact, which may trigger an allergic reaction in an allergic customer", "Allergens can be removed by wiping with a dry cloth", "A minor risk that non-allergic customers don't need to worry about"], "ans": 1, "exp": "Allergens cannot be destroyed by cooking heat. Cross-contact via utensils is one of the main pathways for triggering allergic reactions."}, {"q": "What is the main difference between a food intolerance and a food allergy?", "opts": ["Intolerances are more dangerous", "Intolerances have a slower reaction time", "Allergies involve the immune system and can cause anaphylaxis; intolerances do not involve the immune system", "They are exactly the same"], "ans": 2, "exp": "Food allergies involve the immune system (IgE response) and can be fatal; food intolerances typically cause only digestive discomfort and do not involve the immune system."}, {"q": "What is the most important step before preparing a meal for an allergic customer?", "opts": ["Using colour-coded utensils is sufficient", "Ask the customer to try a small portion first", "Thoroughly clean and replace all utensils and change gloves", "Just retrieve ingredients from a dedicated allergen-free area"], "ans": 2, "exp": "Before preparing a meal for an allergic customer, all contact surfaces must be thoroughly cleaned, gloves changed, and clean utensils used to prevent cross-contact."}, {"q": "Which of the following food ingredients contains gluten?", "opts": ["Rice flour", "Cornstarch", "Wheat flour (plain flour)", "Tapioca starch"], "ans": 2, "exp": "Gluten is found in grains such as wheat, barley, and rye. Rice flour, cornstarch, and tapioca starch are all gluten-free."}, {"q": "A server is taking a Japanese food order and the customer mentions they are allergic to prawns — what should the server do immediately?", "opts": ["Tell the customer the chef will adjust the ingredients", "Tell the customer a mild prawn allergy should be fine", "Notify the chef and supervisor and mark an allergy alert on the order", "Suggest the customer order something else"], "ans": 2, "exp": "Allergy information must be communicated to the kitchen immediately and clearly marked on the order to ensure every step takes appropriate precautions."}, {"q": "Is it correct to ask a customer 'How severe is your allergy?'", "opts": ["Yes — the severity determines how we handle it", "No — our handling should not differ based on severity", "Not necessary — it's enough that the customer has informed us", "No — we should not ask customers for any allergy details"], "ans": 0, "exp": "Understanding the severity of an allergy helps with meal preparation, but regardless of severity, all allergies must be taken seriously and never dismissed."}, {"q": "Why is it important to record a customer's allergy requirements?", "opts": ["To help the chef remember", "So that in the event of an allergic incident, responsibility can be traced and procedures improved", "To meet legal requirements for order record-keeping", "To provide faster service when the customer visits next time"], "ans": 1, "exp": "Written records are an important tool for accountability and process improvement, as well as a legal compliance requirement."}, {"q": "Which of the following food ingredients contains lactose?", "opts": ["Vegan butter", "Soy milk", "Cow's milk, cheese, butter", "Olive oil"], "ans": 2, "exp": "Lactose is found in dairy products such as cow's milk, cheese, and butter. Soy milk, vegan butter, and olive oil are lactose-free."}, {"q": "A guest with a nut allergy orders a dish. You are unsure if it contains nuts — what is your first action?", "opts": ["Serve it and monitor the customer", "Check the allergen matrix or ask the chef before serving", "Remove any visible nuts from the dish", "Suggest the customer take an antihistamine before eating"], "ans": 1, "exp": "You must always confirm with the kitchen using the allergen information sheet before serving any dish to a customer with a declared nut allergy."}, {"q": "What is an 'allergen matrix' (or allergen register)?", "opts": ["A list of customers with known allergies", "A document showing which allergens are present in each menu item", "A cleaning schedule for allergen-free zones", "A training record for allergen-aware staff"], "ans": 1, "exp": "An allergen matrix is a reference document that lists all allergens contained in each menu item. It is a critical tool for safely serving customers with food allergies."}]}, {"id": "T04", "title": "Kitchen & Dining Room Procedures", "questions": [{"q": "What is the standard temperature for a commercial refrigerator?", "opts": ["Below 0°C", "0°C – 4°C", "5°C – 10°C", "10°C – 15°C"], "ans": 1, "exp": "Commercial refrigerators should be maintained at 0°C–4°C to slow bacterial growth and comply with food safety regulations."}, {"q": "What is the main purpose of the mise en place principle in kitchen work?", "opts": ["To set up workstation ingredients and tools before service begins to improve efficiency", "To ensure all dishes use the same ingredients", "To reduce the number of kitchen staff required", "To standardise the presentation of dishes"], "ans": 0, "exp": "'Mise en place' (French for 'everything in its place') means preparing all ingredients and tools before service, which is the key to an efficient kitchen operation."}, {"q": "When the dining room is busy and a table cannot be cleared in time, what is the correct approach?", "opts": ["Ask the customer to clean the table themselves", "Apologise to the new customer and prioritise clearing the table", "Lead the new customer to another table", "Wait until all tables have been cleared before accepting new customers"], "ans": 1, "exp": "In the service industry, apologising and prioritising table clearance is a professional approach that demonstrates respect for the customer's dining experience."}, {"q": "What is HACCP?", "opts": ["A type of kitchen equipment", "A Hazard Analysis and Critical Control Points system used to prevent food safety issues", "A kitchen layout design standard", "A kitchen cleaning schedule"], "ans": 1, "exp": "HACCP (Hazard Analysis and Critical Control Points) is a systematic method used in the food industry to identify and control food safety hazards."}, {"q": "How should a dining room staff member handle a customer complaint about food quality?", "opts": ["Tell the customer the kitchen staff are responsible", "Sincerely apologise, remove the dish, and notify the supervisor or kitchen", "Offer a discount and ask the customer to continue eating", "Ask the customer to make a formal complaint"], "ans": 1, "exp": "Promptly handling food quality complaints, apologising sincerely, and involving the supervisor is the professional standard for customer service."}, {"q": "When should kitchen staff wash their hands?", "opts": ["Only when entering the kitchen", "After handling raw meat, after using the toilet, after handling waste, and before handling food", "Once per hour", "Only before handling cooked food"], "ans": 1, "exp": "Hand washing at critical control points prevents cross-contamination. Key times include: after handling raw meat, using the toilet, handling waste, and before food preparation."}, {"q": "Which colour chopping board should be used for raw poultry?", "opts": ["Green", "Red", "Yellow", "Blue"], "ans": 2, "exp": "Under the Australian standard colour-coding system: yellow = raw poultry, red = raw red meat, green = fruit & vegetables, blue = raw seafood, white = dairy/bakery, brown = cooked meat."}, {"q": "What is the safe minimum internal temperature for cooking poultry?", "opts": ["60°C", "65°C", "74°C", "85°C"], "ans": 2, "exp": "Poultry must reach an internal temperature of at least 74°C to kill harmful pathogens such as Salmonella and Campylobacter."}, {"q": "What should be done when a customer has a special dietary requirement?", "opts": ["Ignore it if the kitchen is too busy", "Inform the kitchen immediately and mark it clearly on the order", "Ask the customer to choose from dishes that are already available", "Let the kitchen decide how to handle it"], "ans": 1, "exp": "Special dietary requirements must be communicated to the kitchen immediately and clearly marked on the order to ensure every preparation step complies with requirements."}, {"q": "What does the 'two-plate carry' technique refer to?", "opts": ["Carrying two plates in each hand (four total)", "Carrying two plates safely in one hand using the correct hand position", "Using a tray to carry two plates", "A technique for carrying heavy pots"], "ans": 1, "exp": "The two-plate carry is a fundamental serving technique where two plates are safely balanced in one hand, improving service efficiency while preventing accidents."}, {"q": "When does the dining room staff's responsibility for customer service end?", "opts": ["When the customer's order has been placed", "When the food is delivered to the table", "When the customer pays and leaves", "When all dishes have been cleared"], "ans": 2, "exp": "The service cycle is not complete until the customer has paid, expressed satisfaction with the experience, and left the premises — maintaining quality throughout is critical."}, {"q": "Why is it important to label leftover food clearly?", "opts": ["To look professional", "To ensure food is used in the correct order and within safe time limits", "Just a recommendation — not required", "Only required for food containing allergens"], "ans": 1, "exp": "Clear labelling (date prepared, contents, use-by time) is a legal food safety requirement in Australia to prevent food being kept beyond safe limits."}, {"q": "What is the correct way to thaw frozen food?", "opts": ["Leave it on the kitchen bench at room temperature", "Place it in running hot water", "Thaw in the refrigerator or use a microwave with immediate cooking", "Leave it outside the kitchen"], "ans": 2, "exp": "Thawing in the refrigerator or microwave (with immediate cooking) are the only safe methods. Room temperature thawing allows bacterial growth in the outer layers."}, {"q": "When is a food handler required to report illness to their supervisor?", "opts": ["Only when symptoms appear at work", "Before starting work if they have symptoms of vomiting, diarrhoea, jaundice, or a sore throat", "Only after a doctor confirms an illness", "It is optional — staff can decide themselves"], "ans": 1, "exp": "Under Australian food safety regulations, food handlers must report any symptoms of vomiting, diarrhoea, jaundice, or sore throat before starting work."}, {"q": "A customer asks for a 'well-done' steak — to what internal temperature should it be cooked?", "opts": ["60°C", "65°C", "70°C", "77°C or above"], "ans": 3, "exp": "A well-done steak should reach an internal temperature of 77°C or above to ensure all parts of the meat are fully cooked."}]}, {"id": "T05", "title": "Workplace Health & Safety (WHS)", "questions": [{"q": "In Australia, the primary legislation governing Workplace Health & Safety is called what?", "opts": ["Fair Work Act", "Work Health and Safety Act (WHS Act)", "Occupational Health and Safety Act", "Employment Safety Standards Act"], "ans": 1, "exp": "The Work Health and Safety (WHS) Act is the core legislation governing occupational health and safety in Australia, protecting workers and others in the workplace."}, {"q": "What is a PCBU?", "opts": ["Personal Coordinator of Business Units", "Person Conducting a Business or Undertaking", "Primary Controller of Business Utilities", "Physical Control of Business Uniformity"], "ans": 1, "exp": "PCBU (Person Conducting a Business or Undertaking) is a key term in the WHS Act. PCBUs have a primary duty of care to ensure the safety of workers and others."}, {"q": "Which of the following is the most effective risk control method in the Hierarchy of Controls?", "opts": ["Personal Protective Equipment (PPE)", "Administrative controls", "Substitution", "Elimination"], "ans": 3, "exp": "Elimination — completely removing the hazard — is at the top of the Hierarchy of Controls and is the most effective risk control method."}, {"q": "You notice a slippery wet floor in the dining room — what should you do?", "opts": ["Note it and report it to the supervisor at end of shift", "Place a warning sign and clean it up immediately", "Tell customers to be careful when passing", "Wait for the cleaner to come"], "ans": 1, "exp": "A wet floor is an immediate slip hazard. You must place a warning sign and address it at once — delays can lead to accidents."}, {"q": "What must workers do when they identify a workplace hazard?", "opts": ["Handle it themselves if possible", "Report it to the supervisor and record it in the hazard register", "Warn nearby colleagues only", "Wait for management to discover it"], "ans": 1, "exp": "All workplace hazards must be reported and recorded. The hazard register is an important tool for tracking and managing risks."}, {"q": "What is an SDS (Safety Data Sheet)?", "opts": ["An employee service record", "A document providing safety information about hazardous chemicals, including handling and emergency procedures", "A safety inspection checklist", "A chemical purchase order form"], "ans": 1, "exp": "An SDS (Safety Data Sheet) provides comprehensive information on the properties, hazards, handling, storage, and emergency procedures for hazardous chemicals."}, {"q": "In Australia, who has the right to refuse unsafe work?", "opts": ["Only supervisors and managers", "All workers", "Only permanent employees", "Only WHS representatives"], "ans": 1, "exp": "Under the WHS Act, all workers have the right to cease unsafe work without fear of reprisal. This right is a fundamental protection for workers."}, {"q": "What is the purpose of a Job Safety Analysis (JSA)?", "opts": ["Reviewing employee performance", "Identifying and assessing hazards and risks associated with a specific task before starting work", "Checking that staff understand their job responsibilities", "Evaluating the efficiency of the work process"], "ans": 1, "exp": "A JSA (Job Safety Analysis) systematically identifies potential hazards in each step of a task before work begins, allowing for the development of safe work procedures."}, {"q": "If a work-related injury occurs, how long does an employer generally have to report it to the relevant authority?", "opts": ["Immediately (within 1 hour)", "Within 24 hours", "Within 48 hours", "Within 7 days"], "ans": 0, "exp": "Under the WHS Act, serious workplace incidents (including serious injuries or dangerous incidents) must be reported immediately — this is a legal obligation."}, {"q": "What is the purpose of regular WHS inspections?", "opts": ["Only to satisfy regulatory requirements", "To identify existing and potential hazards and implement corrective actions", "Only to check that new employees understand safety procedures", "To create documentation"], "ans": 1, "exp": "Regular WHS inspections proactively identify hazards, take corrective action, and demonstrate an organisation's ongoing commitment to safety management."}, {"q": "Personal Protective Equipment (PPE) should be used as:", "opts": ["The first and primary line of defence", "A supplementary measure after eliminating or controlling hazards", "The only safety measure required", "An optional measure for each employee to decide on individually"], "ans": 1, "exp": "PPE is the last line of defence in the Hierarchy of Controls and should be used to supplement other control measures — it should not be the only protection."}, {"q": "What is a Risk Assessment Matrix?", "opts": ["A tool used to evaluate employee performance", "A method for assessing the likelihood and severity of a risk to determine priority for action", "A schedule for WHS training", "A list of workplace emergency contacts"], "ans": 1, "exp": "A risk assessment matrix evaluates the likelihood and severity of risks to prioritise control measures. It is a core tool in workplace safety management."}, {"q": "In the event of a workplace emergency, what is the first priority?", "opts": ["Protect company equipment and property", "Record and report the incident", "Ensure the safety of all personnel", "Contact emergency services"], "ans": 2, "exp": "In any emergency, the safety of all people present is the absolute first priority — equipment and property can always be replaced."}, {"q": "What is the primary responsibility of a WHS Representative (HSR)?", "opts": ["Managing daily operations for the company", "Representing workers in identifying and resolving WHS issues", "Conducting disciplinary action for employees who violate safety rules", "Approving all WHS-related purchases"], "ans": 1, "exp": "Health and Safety Representatives (HSRs) represent workers in identifying WHS issues and liaising with management to resolve them — they are an important part of workplace consultation."}, {"q": "Why should WHS incidents be documented and investigated?", "opts": ["Only to fulfil insurance requirements", "To identify root causes, prevent recurrence, and improve the overall safety management system", "Only to assign blame to responsible employees", "To meet management reporting requirements"], "ans": 1, "exp": "Incident investigation helps identify root causes and systemic issues, enabling preventive measures to be put in place to avoid similar incidents in the future."}]}, {"id": "T06", "title": "Safe Chemical Handling", "questions": [{"q": "Before using a cleaning chemical, what must you check?", "opts": ["Only the product label", "The Safety Data Sheet (SDS) and PPE requirements", "Ask a colleague how to use it", "Only the dilution ratio on the bottle"], "ans": 1, "exp": "Before using any chemical, the SDS must be read to understand its hazards, correct dilution ratio, required PPE, and emergency procedures."}, {"q": "What does GHS stand for in hazardous chemical classification?", "opts": ["General Hazard Standard", "Globally Harmonised System of Classification and Labelling of Chemicals", "Government Health and Safety", "General Handling Standards"], "ans": 1, "exp": "GHS (Globally Harmonised System) is the international standard for classifying and labelling hazardous chemicals, making hazard identification consistent worldwide."}, {"q": "What should you do if a cleaning chemical accidentally splashes into your eyes?", "opts": ["Rinse with water for 5 minutes and go back to work", "Flush immediately with clean water for at least 15–20 minutes and seek medical attention", "Apply eye drops and rest briefly", "Wipe gently with a cloth"], "ans": 1, "exp": "Chemical eye exposure is a medical emergency. Immediately flush with large amounts of water for at least 15–20 minutes and seek medical attention."}, {"q": "Which of the following is correct when storing cleaning chemicals?", "opts": ["Store all chemicals together for easy access", "Store in a locked, ventilated area away from food preparation areas", "Store near food to save walking time during cleaning", "Store wherever there is available space"], "ans": 1, "exp": "Chemicals must be stored in a locked, ventilated area away from food to prevent contamination and ensure non-authorised persons cannot access them."}, {"q": "What does a triangular orange GHS symbol with a flame indicate?", "opts": ["Toxic", "Flammable", "Corrosive", "Environmental hazard"], "ans": 1, "exp": "A flame symbol on GHS labels indicates the substance is flammable. It must be kept away from heat sources and open flames."}, {"q": "Can two different cleaning chemicals be mixed to increase effectiveness?", "opts": ["Yes, as long as they are both household products", "Only if they are the same brand", "No — chemicals must never be mixed unless specifically instructed by the manufacturer", "Yes, with supervisor approval"], "ans": 2, "exp": "Mixing chemicals can cause dangerous reactions, producing toxic gases or explosions. Never mix chemicals unless the manufacturer specifically states it is safe to do so."}, {"q": "What PPE is typically required when using strong cleaning agents?", "opts": ["Only apron", "Only gloves", "Gloves, safety goggles, and apron as a minimum", "PPE is not necessary for cleaning agents"], "ans": 2, "exp": "Strong cleaning agents can cause skin and eye damage. As a minimum, gloves, safety goggles, and an apron must be worn — always refer to the SDS for specific requirements."}, {"q": "What should you do with an empty chemical container?", "opts": ["Rinse and reuse for other liquids", "Dispose of according to the instructions on the SDS label", "Throw it in the regular rubbish bin", "Return it to the supplier regardless of type"], "ans": 1, "exp": "Chemical containers must be disposed of according to the SDS instructions. Improper disposal may harm the environment or cause safety hazards."}, {"q": "Why is it important to use chemicals at the correct dilution ratio?", "opts": ["To save money", "To ensure effectiveness and safety — too concentrated can be dangerous, too diluted may be ineffective", "To make the chemical last longer", "Only to meet manufacturer warranty requirements"], "ans": 1, "exp": "The correct dilution ratio ensures the chemical is both safe to use and effective. Over-concentration increases health risks; under-concentration reduces effectiveness."}, {"q": "Where should the SDS for a chemical be stored?", "opts": ["In the manager's office only", "In a readily accessible location where the chemical is used or stored", "Only on the company computer system", "Filed away — only needed in emergencies"], "ans": 1, "exp": "SDS documents must be readily accessible to workers in areas where chemicals are used or stored, particularly in emergency situations."}, {"q": "What does a skull and crossbones symbol on a chemical label indicate?", "opts": ["Corrosive", "Flammable", "Toxic — may cause serious health harm or death", "Environmentally hazardous"], "ans": 2, "exp": "The skull and crossbones (acute toxicity symbol) indicates the substance is highly toxic and can cause serious harm or death even in small amounts."}, {"q": "When preparing chemical solutions, what is the safest approach?", "opts": ["Add chemical to water (never water to chemical)", "Add water to chemical for better mixing", "Mix in a warm environment to speed up dissolution", "The order does not matter"], "ans": 0, "exp": "Always add chemical to water (not water to chemical). Adding water to a concentrated chemical can cause a violent exothermic reaction."}, {"q": "A worker accidentally inhales a strong chemical fume — what is the first response?", "opts": ["Drink water to help remove the chemical", "Move to fresh air immediately, and seek medical attention if symptoms persist", "Apply a damp cloth over the nose and mouth and continue working", "Lie down and rest for 30 minutes"], "ans": 1, "exp": "If fumes are inhaled, immediately move to fresh air. If symptoms such as dizziness, difficulty breathing, or chest pain persist, seek medical attention."}, {"q": "How often should chemical handling training be reviewed?", "opts": ["Only when a new chemical is introduced", "At least annually or when procedures change", "Every 5 years", "Only after an incident occurs"], "ans": 1, "exp": "Chemical handling training should be reviewed at least annually or when procedures, products, or regulations change to ensure all staff remain up to date."}, {"q": "What is the purpose of secondary containment for chemicals?", "opts": ["To provide additional packaging for transport", "To contain spills and prevent chemicals from spreading to drains or the environment", "To help identify the chemical", "To separate different types of chemicals"], "ans": 1, "exp": "Secondary containment (e.g., bunded pallets or drip trays) contains spills at source, preventing chemicals from entering drains, waterways, or other areas."}]}, {"id": "T07", "title": "First Aid – HLTAID011", "questions": [{"q": "What does DRSABCD stand for in the first aid emergency action plan?", "opts": ["Danger, Response, Send, Airway, Breathing, Circulation, Defibrillation", "Danger, Response, Send for help, Airway, Breathing, CPR, Defibrillation", "Direct, Respond, Save, Assess, Breathe, Compress, Defibrillate", "Diagnose, Respond, Stabilise, Assess, Breathe, Compress, Deploy"], "ans": 1, "exp": "DRSABCD is the standard Australian first aid emergency action plan: Danger, Response, Send for help, Airway, Breathing, CPR, Defibrillation."}, {"q": "In Australia, what number should you call in a medical emergency?", "opts": ["112", "111", "000", "999"], "ans": 2, "exp": "000 is Australia's emergency services number. For life-threatening situations, call 000 immediately. 112 also works on mobile phones."}, {"q": "A co-worker suddenly collapses and is unresponsive — what is your first action?", "opts": ["Begin CPR immediately", "Call 000 first", "Check for danger and assess responsiveness before taking further action", "Get a defibrillator (AED)"], "ans": 2, "exp": "Following DRSABCD, the first step is to check for Danger, then assess the person's Response — only then should you proceed to send for help and provide treatment."}, {"q": "What is the correct compression-to-breath ratio for adult CPR?", "opts": ["15:2", "30:2", "15:1", "30:1"], "ans": 1, "exp": "For adult CPR, the standard ratio is 30 chest compressions to 2 rescue breaths. Compressions should be at a rate of 100–120 per minute."}, {"q": "What depth should chest compressions be in adult CPR?", "opts": ["2–3 cm", "5–6 cm", "8–10 cm", "As deep as possible"], "ans": 1, "exp": "Adult chest compressions should be 5–6 cm deep to be effective. Compressions that are too shallow may not maintain adequate blood circulation."}, {"q": "What is the recovery position used for?", "opts": ["Helping an unconscious patient recover consciousness faster", "Placing a breathing but unconscious person in a safe position to keep the airway open and prevent choking", "Preventing a conscious patient from falling", "Conducting CPR more effectively"], "ans": 1, "exp": "The recovery position (on their side) keeps an unconscious breathing person's airway open and allows fluids to drain, reducing the risk of choking."}, {"q": "What is the correct first aid treatment for a minor burn?", "opts": ["Apply butter or oil to the burn", "Cool the burn under cool running water for at least 20 minutes", "Apply ice directly to the burn", "Apply a dry bandage immediately"], "ans": 1, "exp": "Cool the burn with cool running water for at least 20 minutes. Do not use ice, butter, oil, or any other substance, as these can worsen the injury."}, {"q": "What should you do if someone is having a seizure?", "opts": ["Restrain the person to prevent injury", "Put something in their mouth to prevent them biting their tongue", "Clear the surrounding area of hazards, place soft padding under their head, and do not restrain them", "Give them water"], "ans": 2, "exp": "During a seizure, protect the person by clearing hazards, cushioning their head, and not restraining them. Do not put anything in their mouth."}, {"q": "How should bleeding from a severe wound be controlled?", "opts": ["Remove any embedded objects to clean the wound", "Apply direct pressure with a clean cloth or bandage", "Apply a tourniquet above the wound immediately", "Elevate the wound only, without applying pressure"], "ans": 1, "exp": "Apply direct, firm pressure to the wound with a clean cloth or bandage. Do not remove embedded objects. Elevate the limb if possible."}, {"q": "What are the signs and symptoms of a heart attack?", "opts": ["Chest pain only", "Sudden severe headache and neck stiffness", "Chest pain or discomfort, shortness of breath, pain radiating to the arm or jaw, sweating, nausea", "Sudden loss of vision in one eye"], "ans": 2, "exp": "Heart attack symptoms include chest pain/tightness, shortness of breath, pain radiating to the arm, shoulder, or jaw, sweating, and nausea. Call 000 immediately."}, {"q": "What is anaphylaxis and how is it treated?", "opts": ["A mild allergic skin reaction — treat with antihistamines", "A severe, potentially life-threatening allergic reaction — treat with adrenaline (EpiPen) and call 000", "A moderate allergic reaction — treat with oral antihistamines and rest", "A temporary fainting episode — lay the person down"], "ans": 1, "exp": "Anaphylaxis is a severe, life-threatening allergic reaction. Use an EpiPen (adrenaline auto-injector) immediately and call 000. Lay the patient down; if breathing is difficult, allow them to sit up."}, {"q": "What is the purpose of an AED (Automated External Defibrillator)?", "opts": ["To stimulate breathing in a non-breathing patient", "To deliver an electric shock to restore normal heart rhythm in cardiac arrest", "To measure heart rate during CPR", "To inject medication into the body"], "ans": 1, "exp": "An AED delivers a controlled electric shock to restore normal heart rhythm in a patient in cardiac arrest. Early defibrillation significantly improves survival rates."}, {"q": "If someone is suspected of having a spinal injury, what should you do?", "opts": ["Move them to a safer area immediately", "Keep the person still and stabilise the head and neck — do not move unless there is immediate danger", "Help them stand to assess whether they can walk", "Perform CPR immediately"], "ans": 1, "exp": "A suspected spinal injury patient should not be moved unless absolutely necessary. Stabilise the head and neck and wait for professional medical assistance."}, {"q": "How long is a HLTAID011 (Provide First Aid) certificate valid?", "opts": ["1 year", "2 years", "3 years", "5 years"], "ans": 2, "exp": "HLTAID011 (Provide First Aid) is valid for 3 years. CPR (HLTAID009) requires annual renewal."}, {"q": "What is the 'chain of survival' in cardiac arrest?", "opts": ["Call 000 → Check pulse → Perform CPR → Provide pain relief", "Early recognition → Call 000 → Early CPR → Early defibrillation → Post-resuscitation care", "Assess the scene → Begin CPR → Transport to hospital → Monitor recovery", "Check breathing → Begin CPR → Apply AED → Call family"], "ans": 1, "exp": "The chain of survival — early recognition, calling 000, early CPR, early defibrillation, and post-resuscitation care — significantly improves the chance of survival from cardiac arrest."}]}, {"id": "T08", "title": "Fire Extinguishers & Emergency Response", "questions": [{"q": "What does the PASS technique for using a fire extinguisher stand for?", "opts": ["Pull, Aim, Squeeze, Sweep", "Push, Activate, Spray, Secure", "Prepare, Aim, Squeeze, Spray", "Pull, Apply, Squeeze, Spread"], "ans": 0, "exp": "PASS: Pull the pin → Aim at the base of the fire → Squeeze the handle → Sweep side to side across the base of the fire."}, {"q": "Which type of fire extinguisher is suitable for electrical fires?", "opts": ["Water (red)", "Foam (blue/cream)", "Carbon dioxide / CO₂ (black)", "Dry chemical powder (white/red)"], "ans": 2, "exp": "CO₂ extinguishers are safe for electrical fires because they are non-conductive. Water and foam conduct electricity and must never be used on electrical fires."}, {"q": "In the event of a fire alarm, what should staff do first?", "opts": ["Immediately start fighting the fire", "Complete the current task before leaving", "Initiate evacuation according to the Emergency Response Plan (ERP) — ensure all customers exit safely", "Call the fire brigade before evacuating"], "ans": 2, "exp": "When a fire alarm sounds, staff must follow the Emergency Response Plan immediately — ensure customers evacuate safely and do not waste time completing tasks."}, {"q": "Which type of fire extinguisher should NEVER be used on a cooking oil (Class F) fire?", "opts": ["Water extinguisher", "Wet chemical extinguisher", "CO₂ extinguisher", "Class F extinguisher"], "ans": 0, "exp": "Never use a water extinguisher on a cooking oil fire — the water will vaporise instantly and cause the hot oil to splatter violently, spreading the fire."}, {"q": "Where should the emergency muster point (assembly area) be?", "opts": ["At the front entrance of the building", "In the car park", "In a pre-designated open area away from the building, as indicated in the Emergency Response Plan", "In the nearest room"], "ans": 2, "exp": "The assembly area must be a pre-designated open space away from the building to allow emergency services clear access and to account for all personnel."}, {"q": "What does a 'Class A' fire involve?", "opts": ["Flammable liquids (petrol, oil)", "Ordinary combustible materials (wood, paper, fabric)", "Flammable gases", "Cooking oils and fats"], "ans": 1, "exp": "Class A fires involve ordinary combustible materials such as wood, paper, fabric, and cardboard. Water or foam extinguishers are appropriate for Class A fires."}, {"q": "Under what conditions is it safe for a trained person to use a fire extinguisher?", "opts": ["Any fire, regardless of size", "Small, contained fires where there is a safe escape route and the person is trained to do so", "Only after the fire brigade arrives on scene", "Only after all customers have been evacuated"], "ans": 1, "exp": "A fire extinguisher should only be used on small, contained fires. The user must have a clear escape route. If in doubt, evacuate — personal safety comes first."}, {"q": "What information should be included in an emergency evacuation plan?", "opts": ["Only the location of fire extinguishers", "Evacuation routes, assembly areas, staff responsibilities, and emergency contact numbers", "Only the contact number for the fire brigade", "Names of all staff members"], "ans": 1, "exp": "An effective Emergency Response Plan (ERP) must include evacuation routes, assembly points, staff roles and responsibilities, and emergency contact numbers."}, {"q": "How often should fire extinguishers be inspected?", "opts": ["Only after use", "At least every 6 months by a qualified technician, with monthly visual checks by staff", "Every 5 years", "Only when required by insurance"], "ans": 1, "exp": "Fire extinguishers must be serviced at least every 6 months by a qualified technician and visually inspected monthly by staff to ensure they are in working order."}, {"q": "What fire class do flammable liquids such as petrol and alcohol belong to?", "opts": ["Class A", "Class B", "Class C", "Class E"], "ans": 1, "exp": "Class B fires involve flammable liquids such as petrol, oil, and alcohol. CO₂ or dry chemical powder extinguishers are appropriate for Class B fires."}, {"q": "In the event of a gas leak, which action is INCORRECT?", "opts": ["Evacuate the building immediately", "Turn off the gas supply at the mains", "Turn on electrical switches to improve ventilation", "Call the gas company's emergency line"], "ans": 2, "exp": "Never use any electrical switches during a gas leak — they can create sparks that could ignite the gas, causing an explosion. Evacuate and turn off the supply first."}, {"q": "Why is it important to conduct fire evacuation drills?", "opts": ["Only to meet legal compliance requirements", "To ensure all staff can execute evacuation procedures quickly and calmly in a real emergency", "Only for new employees", "Only to check the evacuation route signage"], "ans": 1, "exp": "Regular drills build muscle memory, help staff respond calmly under pressure, and identify any weaknesses in evacuation procedures before a real emergency occurs."}, {"q": "What does the fire triangle represent?", "opts": ["The three phases of fire suppression", "The three elements required for fire to exist: fuel, oxygen, and heat", "The three stages of fire development", "The three types of fire extinguisher"], "ans": 1, "exp": "The fire triangle shows the three elements needed to sustain a fire: fuel, oxygen, and heat. Removing any one of these elements will extinguish the fire."}, {"q": "Who is responsible for checking that all employees have been accounted for at the assembly area?", "opts": ["Any available staff member", "The designated Fire Warden or Chief Warden", "The customer at the front of the line", "The maintenance team"], "ans": 1, "exp": "The Fire Warden (or Chief Warden) is responsible for conducting a headcount at the assembly area to confirm all staff and customers have been safely evacuated."}, {"q": "What is the main difference between a wet chemical extinguisher and other extinguisher types?", "opts": ["It can be used on electrical fires", "It is specifically designed for Class F fires (cooking oils and fats)", "It uses compressed air as the propellant", "It is the most powerful extinguisher type for all fires"], "ans": 1, "exp": "A wet chemical extinguisher is specifically designed for Class F fires (cooking oil/fat). It works by forming a foam blanket that smothers the fire and cools the oil."}]}, {"id": "T09", "title": "Cleaning Procedures", "questions": [{"q": "What is the difference between 'cleaning' and 'sanitising' in a food handling environment?", "opts": ["They are the same thing", "Cleaning removes visible dirt and grease; sanitising reduces microorganisms to a safe level", "Sanitising removes visible dirt; cleaning reduces bacteria", "Cleaning uses chemicals; sanitising uses water only"], "ans": 1, "exp": "Cleaning removes visible soil and grease; sanitising kills microorganisms to safe levels. Both steps are necessary — sanitising alone is not effective on dirty surfaces."}, {"q": "What is the correct order for the 6-step cleaning and sanitising process?", "opts": ["Rinse → Pre-scrape → Clean → Rinse again → Sanitise → Air dry", "Pre-scrape → Clean → Rinse → Sanitise → Air dry → Store", "Clean → Pre-scrape → Rinse → Sanitise → Air dry → Store", "Sanitise → Clean → Rinse → Pre-scrape → Air dry → Store"], "ans": 1, "exp": "The correct sequence is: Pre-scrape → Clean (with detergent) → Rinse → Sanitise → Air dry → Store. Skipping steps reduces effectiveness."}, {"q": "Why should cleaned surfaces be air dried rather than wiped dry with a cloth?", "opts": ["To save time", "Cloths can reintroduce bacteria onto a sanitised surface", "Air drying is faster", "Cloths can leave chemical residue"], "ans": 1, "exp": "Even a clean-looking cloth can harbour bacteria and recontaminate a sanitised surface. Air drying is the safest method to maintain sanitation."}, {"q": "What does a cleaning schedule ensure?", "opts": ["Only that the workplace looks tidy", "That all cleaning tasks are completed at the correct frequency by assigned staff", "Only that high-use areas are cleaned", "That only one person is responsible for all cleaning tasks"], "ans": 1, "exp": "A cleaning schedule ensures all areas are cleaned at appropriate frequencies by designated staff, maintaining consistent hygiene standards and ensuring accountability."}, {"q": "When cleaning a food contact surface, which sanitiser type is most commonly used in commercial kitchens?", "opts": ["Bleach (sodium hypochlorite) — diluted to the correct concentration", "Full-strength industrial cleaners", "Hot water alone", "Household detergent"], "ans": 0, "exp": "Food-grade bleach (sodium hypochlorite) diluted to the correct concentration (typically 100–200 ppm) is the most common sanitiser for food contact surfaces in commercial kitchens."}, {"q": "What should you do with mop water after cleaning?", "opts": ["Pour it down the kitchen sink", "Dispose of it in the designated utility/mop sink and clean the mop and bucket afterwards", "Leave it in the bucket for the next use", "Pour it down the toilet"], "ans": 1, "exp": "Dirty mop water must be disposed of in the utility/mop sink, and the mop and bucket must be cleaned and stored properly to prevent bacterial growth."}, {"q": "Which of the following areas requires the highest cleaning frequency in a hospitality venue?", "opts": ["Office areas", "Staff areas", "High-touch surfaces such as door handles, POS terminals, and counters", "External windows"], "ans": 2, "exp": "High-touch surfaces (door handles, POS terminals, countertops, taps) have the most contact with hands and must be cleaned and sanitised most frequently to prevent cross-contamination."}, {"q": "What type of cleaning product is typically used for descaling (removing mineral buildup)?", "opts": ["Bleach", "Acid-based cleaner (e.g., descaler)", "Alkaline-based cleaner (e.g., degreaser)", "Neutral detergent"], "ans": 1, "exp": "Acidic cleaners are effective at dissolving mineral deposits (limescale) from surfaces such as dishwashers, coffee machines, and taps."}, {"q": "What PPE should be worn when handling strong cleaning chemicals?", "opts": ["No PPE required", "Gloves only", "Gloves, safety goggles, and protective apron at minimum", "Only a face mask"], "ans": 2, "exp": "As a minimum, gloves, safety goggles, and a protective apron should be worn when handling strong cleaning chemicals. Always check the SDS for specific requirements."}, {"q": "What is the purpose of colour-coding cleaning equipment (e.g., mops, cloths, buckets)?", "opts": ["To make the workplace look tidy", "To prevent cross-contamination between different areas (e.g., toilets and kitchen)", "Only to make it easier to find equipment", "Only required for allergen management"], "ans": 1, "exp": "Colour-coded cleaning equipment prevents cross-contamination between areas. For example, red equipment for toilets must never be used in kitchen or food preparation areas."}, {"q": "How should cleaning equipment (mops, cloths, brushes) be stored after use?", "opts": ["Left wherever they were last used", "Cleaned, dried, and stored in a designated area — separate from food preparation areas", "Stored in the nearest cupboard", "Left in the bucket with water until needed again"], "ans": 1, "exp": "Cleaning equipment must be cleaned, dried, and stored in a dedicated area away from food zones. Damp storage encourages bacterial growth."}, {"q": "What does 'deep cleaning' involve that regular cleaning does not?", "opts": ["Using stronger chemicals", "Cleaning hard-to-reach areas, equipment interiors, and items not cleaned in daily routines", "Cleaning faster", "Only cleaning surfaces that are visibly dirty"], "ans": 1, "exp": "Deep cleaning addresses areas not covered by regular cleaning: behind equipment, inside ovens, grease traps, drainage systems, and high-level surfaces."}, {"q": "What is the risk of using too much detergent when cleaning?", "opts": ["There is no risk — more detergent means cleaner", "Chemical residue may contaminate food and surfaces, and rinsing becomes insufficient", "The surface will be too shiny", "The detergent will become less effective over time"], "ans": 1, "exp": "Excess detergent is difficult to rinse off completely, leaving chemical residue that can contaminate food, cause illness, or reduce the effectiveness of sanitisers."}, {"q": "Why should cleaning chemical concentrations always be measured accurately?", "opts": ["Only to manage costs", "Too weak reduces effectiveness; too strong is dangerous and wastes product", "To satisfy supplier contracts", "Only for auditing purposes"], "ans": 1, "exp": "Accurate dilution ensures chemicals are both safe and effective. Overly concentrated solutions pose health risks and can damage surfaces; too dilute solutions fail to sanitise properly."}, {"q": "In a commercial kitchen, how often should floor drains be cleaned?", "opts": ["Once a week", "Once a month", "Daily, as part of the end-of-day cleaning schedule", "Only when a blockage occurs"], "ans": 2, "exp": "Kitchen floor drains accumulate food waste, grease, and bacteria rapidly. Daily cleaning is required to prevent odours, pests, and bacterial growth."}]}, {"id": "T10", "title": "Responsible Service of Alcohol (RSA)", "questions": [{"q": "What does RSA stand for?", "opts": ["Regulated Service of Alcohol", "Responsible Service of Alcohol", "Restricted Sale of Alcohol", "Regulated Sale of Alcohol"], "ans": 1, "exp": "RSA stands for Responsible Service of Alcohol — a mandatory training and certification programme for staff involved in the sale or supply of alcohol."}, {"q": "At what blood alcohol concentration (BAC) is a person legally considered intoxicated and unable to drive in Australia (for full licence holders)?", "opts": ["0.03%", "0.05%", "0.08%", "0.10%"], "ans": 1, "exp": "In Australia, the legal driving limit is a BAC of 0.05% for full licence holders. Driving above this limit is a criminal offence."}, {"q": "Under RSA principles, to whom must alcohol NOT be sold or supplied?", "opts": ["Customers who are slightly loud", "Minors (under 18), intoxicated persons, and disorderly persons", "Customers who are by themselves", "Customers who have been there for more than 2 hours"], "ans": 1, "exp": "Under RSA law, alcohol must not be served to: minors (under 18), visibly intoxicated persons, or persons who are disorderly. Breaches can result in fines and loss of licence."}, {"q": "What are the visible signs of intoxication you should look for?", "opts": ["A happy mood", "Slurred speech, unsteady on their feet, bloodshot eyes, aggressive or inappropriate behaviour", "Ordering expensive drinks", "Being a regular customer"], "ans": 1, "exp": "Visible signs of intoxication include: slurred speech, unsteady gait, bloodshot eyes, loud or aggressive behaviour, and impaired coordination. All staff must be able to recognise these signs."}, {"q": "A customer shows signs of intoxication — how should you refuse further service?", "opts": ["Tell them loudly in front of others that they are drunk", "Privately, calmly, and respectfully inform them that further service cannot be provided — offer water and arrange transport", "Ask them to leave immediately", "Call security to remove them"], "ans": 1, "exp": "Refusal of service must be done professionally: calmly, privately, and respectfully. Offer alternatives such as water or food, and assist with arranging safe transport home."}, {"q": "In Australia, what is the minimum age to purchase or consume alcohol?", "opts": ["16 years old", "17 years old", "18 years old", "21 years old"], "ans": 2, "exp": "The legal drinking age in Australia is 18 years. Selling alcohol to anyone under 18 is a criminal offence with severe penalties for both the individual and the venue."}, {"q": "What forms of ID are accepted to verify a customer's age in Australia?", "opts": ["Any card with a photo", "Australian driver's licence, passport, or proof-of-age card", "Student ID card only", "Any government-issued document"], "ans": 1, "exp": "Accepted forms of ID include: Australian driver's licence, passport, and government-issued proof-of-age cards. Other forms of ID (such as student cards) are generally not accepted."}, {"q": "Why is it important to provide food and non-alcoholic beverages in venues that serve alcohol?", "opts": ["To increase total revenue", "Food slows alcohol absorption and water helps maintain hydration, reducing intoxication risk", "Only to satisfy licensing requirements", "Only to serve customers who don't drink"], "ans": 1, "exp": "Food slows the absorption of alcohol into the bloodstream, reducing the rate at which intoxication occurs. Offering food and non-alcoholic options is a key RSA harm minimisation strategy."}, {"q": "Who is legally responsible when alcohol is sold to an intoxicated person at a licensed venue?", "opts": ["The customer only", "The serving staff member and the venue/licensee", "The venue owner only", "No one — the customer is responsible for their own actions"], "ans": 1, "exp": "Both the serving staff member and the venue's licensee can face legal liability for serving alcohol to an intoxicated person. This is why RSA compliance is critical."}, {"q": "A customer appears to be purchasing alcohol for a group that includes a minor — what should you do?", "opts": ["Serve the adult customer only", "Refuse the entire transaction — this is considered supply to a minor", "Ask the minor to wait outside", "Confirm with the supervisor and then serve"], "ans": 1, "exp": "Supplying alcohol intended for a minor — even indirectly through another person — is illegal. The entire transaction must be refused."}, {"q": "What is the meaning of 'harm minimisation' in RSA?", "opts": ["Reducing the profit of alcohol sales", "Implementing strategies to reduce the negative effects of alcohol consumption on individuals and the community", "Limiting the number of drinks per customer", "Only serving light alcohol products"], "ans": 1, "exp": "Harm minimisation is a key principle of RSA — it involves strategies such as standard drink counting, promoting food and water, monitoring intoxication, and safe transport options."}, {"q": "What is a 'standard drink' in Australia?", "opts": ["Any full glass of wine", "An amount containing 10 grams of pure alcohol", "A full can of beer", "Whatever the venue chooses to serve"], "ans": 1, "exp": "In Australia, one standard drink contains 10 grams of pure alcohol. Knowing standard drink counts helps staff and customers monitor alcohol consumption."}, {"q": "Which body regulates liquor licensing in Queensland?", "opts": ["Safe Food Queensland", "Office of Liquor and Gaming Regulation (OLGR)", "Australian Food Standards Authority", "WorkSafe Queensland"], "ans": 1, "exp": "In Queensland, the Office of Liquor and Gaming Regulation (OLGR) is the regulatory body responsible for liquor licensing and RSA compliance."}, {"q": "What action should be taken if a customer becomes aggressive when refused service?", "opts": ["Continue arguing to explain the reason for refusal", "Stay calm, do not argue, and follow the venue's security and incident management protocol", "Give them one more drink to calm them down", "Physically remove them"], "ans": 1, "exp": "When a customer becomes aggressive, stay calm, do not escalate, and follow the venue's security protocol. Never use physical force unless in self-defence."}, {"q": "How should incidents of refused service be documented?", "opts": ["Only if the customer makes a formal complaint", "Record in the incident register: date, time, description of behaviour, action taken, and staff involved", "Verbally inform the supervisor only", "No documentation required"], "ans": 1, "exp": "All refusals of service must be recorded in the incident register. This protects the venue legally, supports staff, and creates a record for licence compliance purposes."}]}, {"id": "T11", "title": "Skills Application", "questions": [{"q": "What is the correct Pinch Grip technique for holding a chef's knife?", "opts": ["All five fingers wrapped around the handle", "Thumb and index finger pinching the blade just above the handle, remaining three fingers gripping the handle", "All fingers gripping the top of the blade", "Both hands on the knife for stability"], "ans": 1, "exp": "The Pinch Grip is the standard technique for holding a chef's knife: thumb and index finger pinch the blade near the bolster, providing the best control and safest operation."}, {"q": "What is the 'claw grip' used for when cutting food?", "opts": ["A technique to hold the knife more firmly", "A hand position where fingertips are curled in to protect fingers from the blade while guiding food", "A technique for cutting very hard vegetables", "Only used with a serrated knife"], "ans": 1, "exp": "The claw grip (fingers curled, knuckles guiding the blade) protects fingertips from cuts. It is the standard safety technique for all knife cutting work."}, {"q": "When carrying a knife in the kitchen, what is the correct practice?", "opts": ["Hold it up to make it visible to others", "Carry it by your side with the blade pointing down and announce your movement", "Keep it in your apron pocket for safety", "Only transport knives in a closed container"], "ans": 1, "exp": "When carrying a knife, hold it at your side with the blade pointing down. Announce your movement (e.g., 'behind you') to alert colleagues and prevent accidents."}, {"q": "What should you do if a knife falls from the bench?", "opts": ["Try to catch it — a quick reflex prevents it hitting the floor", "Step back and let it fall — never try to catch a falling knife", "Catch it by the blade to avoid damage to the tip", "Step forward to stop it falling"], "ans": 1, "exp": "Never attempt to catch a falling knife. Step back immediately and let it fall — injuries from attempting to catch a knife are far more severe than any damage to the knife."}, {"q": "What temperature should hot food be held at when using a bain-marie or hot holding equipment?", "opts": ["Above 60°C", "Above 50°C", "Above 45°C", "Any temperature above room temperature"], "ans": 0, "exp": "Hot food must be held at above 60°C to prevent bacterial growth. This is the minimum safe hot holding temperature under Australian food safety regulations."}, {"q": "What is the purpose of 'blanching' vegetables before freezing?", "opts": ["To add flavour", "To kill bacteria and deactivate enzymes that cause quality deterioration during freezing", "To reduce cooking time", "To remove pesticides"], "ans": 1, "exp": "Blanching involves briefly boiling and then rapidly cooling vegetables. It deactivates enzymes that cause colour, texture, and nutritional loss during frozen storage."}, {"q": "Which of the following describes the correct mise en place approach for a busy service?", "opts": ["Prepare everything just before each order comes in", "Set up all ingredients, equipment, and tools in the correct order before service begins", "Only prepare items that are difficult to make quickly", "Rely on the team to share preparation duties during service"], "ans": 1, "exp": "Effective mise en place means having all ingredients prepped, measured, and organised — along with all equipment ready — before service begins, ensuring smooth and efficient service."}, {"q": "What is a critical skill for preventing burns in a commercial kitchen?", "opts": ["Only using oven mitts when the oven is above 200°C", "Always assuming any pot, pan, or surface could be hot and using appropriate PPE", "Running cold water on burns immediately and continuing work", "Only using high-quality cookware"], "ans": 1, "exp": "Always assume surfaces and cookware are hot. Use dry oven mitts (wet mitts transfer heat rapidly), announce 'hot behind' when moving hot items, and ensure safe placement."}, {"q": "What is the correct process for plating a dish for presentation?", "opts": ["Speed is the only priority — presentation doesn't matter during a busy service", "Portion correctly, ensure the plate is clean, arrange components neatly, and wipe the rim", "Only the main protein needs to be placed carefully", "Always add garnish regardless of the dish"], "ans": 1, "exp": "Correct plating involves: accurate portioning, a clean plate, neat arrangement of components according to the recipe standard, and a wiped, clean rim. Presentation reflects kitchen standards."}, {"q": "When using a mandoline slicer, what protective equipment is essential?", "opts": ["Only a clean cloth", "Cut-resistant gloves", "Safety glasses", "An apron only"], "ans": 1, "exp": "Cut-resistant gloves are essential when using a mandoline slicer. The extremely sharp blade causes serious lacerations without this protection."}, {"q": "What does 'deglaze' mean in cooking?", "opts": ["Removing glaze from a dish", "Adding liquid (wine, stock, water) to a hot pan to lift caramelised food bits (fond) and create a sauce", "Applying a glaze coating to food", "Reducing a sauce by heating"], "ans": 1, "exp": "Deglazing involves adding liquid to a hot pan after cooking meat or vegetables. The liquid dissolves the caramelised fond (browned bits) on the base, adding flavour to a sauce."}, {"q": "What food safety risk does inadequate cooling of cooked food present?", "opts": ["Loss of flavour", "Bacterial growth in the temperature danger zone during slow cooling", "Dry texture", "Nutrient loss"], "ans": 1, "exp": "When cooked food cools slowly through the danger zone (60°C–5°C), bacteria can multiply rapidly. Food should be cooled from 60°C to 21°C within 2 hours, and to 5°C within 4 hours."}, {"q": "What is the purpose of resting meat after cooking?", "opts": ["To allow it to cool down to a safe serving temperature", "To allow juices to redistribute throughout the meat, improving tenderness and flavour", "It is only required for roast meat", "To allow the meat to finish cooking through residual heat only"], "ans": 1, "exp": "Resting allows meat fibres to relax and juices to redistribute evenly. Cutting too soon causes juices to run out, resulting in drier, less flavourful meat."}, {"q": "What does 'al dente' mean when cooking pasta?", "opts": ["Fully cooked until very soft", "Slightly firm to the bite — cooked through but with a slight resistance in the centre", "Half-cooked, still raw in the centre", "Cooked in a specific sauce"], "ans": 1, "exp": "'Al dente' (Italian for 'to the tooth') describes pasta that is fully cooked but still firm when bitten. It is the standard quality benchmark for pasta."}, {"q": "Which of the following is a key indicator of professional kitchen teamwork?", "opts": ["Completing your own tasks as quickly as possible", "Clear communication, supporting colleagues, and maintaining shared workstation cleanliness", "Only communicating with the Head Chef", "Focusing solely on your own station"], "ans": 1, "exp": "Effective kitchen teamwork requires
