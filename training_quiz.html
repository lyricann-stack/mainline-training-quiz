<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainline Service 員工培訓測驗</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
header{background:linear-gradient(135deg,#1a365d,#2b6cb0);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:16px}
header h1{font-size:1.4rem;font-weight:700}
header p{font-size:.85rem;opacity:.85;margin-top:2px}
.logo{font-size:2rem}
#home{padding:24px}
.home-title{font-size:1.2rem;font-weight:600;color:#2d3748;margin-bottom:6px}
.home-sub{font-size:.9rem;color:#718096;margin-bottom:20px}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.mod-card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;border:2px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .2s}
.mod-card:hover{border-color:#3182ce;transform:translateY(-2px);box-shadow:0 4px 12px rgba(49,130,206,.2)}
.mod-card .mod-id{font-size:.75rem;font-weight:700;color:#3182ce;letter-spacing:.05em;margin-bottom:6px}
.mod-card .mod-name{font-size:.9rem;font-weight:600;color:#2d3748;line-height:1.4}
.mod-card .mod-count{font-size:.75rem;color:#a0aec0;margin-top:8px}
#quiz{display:none;padding:24px;max-width:860px;margin:0 auto}
.quiz-header{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.quiz-header h2{font-size:1.1rem;font-weight:700;color:#2d3748}
.back-btn{background:#e2e8f0;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;color:#4a5568;font-weight:600}
.back-btn:hover{background:#cbd5e0}
.score-bar{background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.score-label{font-size:.85rem;color:#718096}
.score-num{font-size:1.4rem;font-weight:700;color:#2d3748}
.progress-wrap{flex:1;background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#38a169,#48bb78);border-radius:99px;transition:width .4s}
.q-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.q-num{font-size:.75rem;font-weight:700;color:#718096;letter-spacing:.06em;margin-bottom:8px}
.q-text{font-size:.95rem;font-weight:600;color:#2d3748;line-height:1.6;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{background:#f7fafc;border:2px solid #e2e8f0;border-radius:8px;padding:10px 14px;text-align:left;cursor:pointer;font-size:.88rem;color:#4a5568;transition:all .18s;line-height:1.5}
.opt-btn:hover:not([disabled]){background:#ebf8ff;border-color:#90cdf4;color:#2b6cb0}
.opt-btn[disabled]{cursor:default}
.opt-btn.correct{background:#f0fff4;border-color:#38a169;color:#276749;font-weight:700}
.opt-btn.wrong{background:#fff5f5;border-color:#fc8181;color:#c53030}
.opt-btn.reveal{background:#f0fff4;border-color:#38a169;color:#276749;font-weight:700}
.explanation{margin-top:12px;padding:12px 14px;background:#fffbeb;border-left:4px solid #f6ad55;border-radius:0 8px 8px 0;font-size:.85rem;color:#744210;line-height:1.6;display:none}
.explanation.show{display:block}
#result{display:none;padding:24px;max-width:500px;margin:0 auto;text-align:center}
.result-card{background:#fff;border-radius:16px;padding:32px 24px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.result-icon{font-size:4rem;margin-bottom:16px}
.result-title{font-size:1.5rem;font-weight:700;margin-bottom:8px}
.result-score{font-size:3rem;font-weight:800;margin:16px 0}
.result-pass{color:#38a169}
.result-fail{color:#e53e3e}
.result-msg{font-size:.95rem;color:#718096;line-height:1.6;margin-bottom:24px}
.result-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:#3182ce;color:#fff;border:none;padding:12px 24px;border-radius:10px;cursor:pointer;font-size:.95rem;font-weight:600}
.btn-primary:hover{background:#2b6cb0}
.btn-secondary{background:#e2e8f0;color:#4a5568;border:none;padding:12px 24px;border-radius:10px;cursor:pointer;font-size:.95rem;font-weight:600}
.btn-secondary:hover{background:#cbd5e0}
.answered-tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:99px;margin-left:8px;font-weight:600}
.tag-pass{background:#c6f6d5;color:#276749}
.tag-fail{background:#fed7d7;color:#c53030}
@media(max-width:600px){.module-grid{grid-template-columns:1fr 1fr}.quiz-header{flex-direction:column;gap:10px;align-items:flex-start}}
</style>
</head>
<body>
<header>
  <div class="logo">🎓</div>
  <div>
    <h1>Mainline Service 員工培訓測驗系統</h1>
    <p>Staff Training Quiz System — 通過標準 Pass Mark: 13/15（87%）</p>
  </div>
</header>

<div id="home">
  <div class="home-title">選擇培訓模組 Select a Training Module</div>
  <div class="home-sub">點擊下方模組開始測驗。每份測驗共 15 題，答對 13 題或以上即通過。</div>
  <div class="module-grid" id="moduleGrid"></div>
</div>

<div id="quiz">
  <div class="quiz-header">
    <h2 id="quizTitle"></h2>
    <button class="back-btn" onclick="goHome()">← 返回模組列表</button>
  </div>
  <div class="score-bar">
    <div>
      <div class="score-label">目前得分</div>
      <div class="score-num"><span id="scoreNow">0</span> / <span id="scoreOf">15</span></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div>
      <div class="score-label">已作答</div>
      <div class="score-num"><span id="answeredCount">0</span>/15</div>
    </div>
  </div>
  <div id="questionList"></div>
  <div style="text-align:center;margin-top:20px">
    <button class="btn-primary" id="submitBtn" onclick="showResult()" style="display:none">查看最終結果 View Results</button>
  </div>
</div>

<div id="result">
  <div class="result-card">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-btns">
      <button class="btn-primary" onclick="retryQuiz()">重新作答 Retry</button>
      <button class="btn-secondary" onclick="goHome()">返回選單 Home</button>
    </div>
  </div>
</div>

<script>
const PASS = 13;
let currentModule = null;
let answers = {};
let score = 0;
let answered = 0;

const quizData = [{"id": "T01", "title": "電腦系統操作", "questions": [{"q": "POS 系統的全名是？", "opts": ["Purchase Order System", "Point of Sale（銷售終端系統）", "Product Operating System", "Point of Service"], "ans": 1, "exp": "POS = Point of Sale，是餐飲業用於管理銷售交易的核心系統。"}, {"q": "每次使用 POS 系統後，應該做什麼？", "opts": ["重新啟動系統以防傷害", "存儲所有客訂形式版本", "登出，防止未經授權的人操作", "清除所有已輸入的訂單"], "ans": 2, "exp": "每次使用後登出是保護公司財務安全的基本步驟，防止他人未經授權操作。"}, {"q": "POS 系統發生故障時，最適合的處理方式是？", "opts": ["立即重啟設備", "停止對客人提供任何服務", "切換為手動記錄模式並立即通知主管", "向顧客解釋故障，請其等候"], "ans": 2, "exp": "系統故障時應切換為手動記錄，確保服務不中斷，並通知主管處理技術問題。"}, {"q": "工作電腦上的登入密碼應該怎麼處理？", "opts": ["將密碼寫在 POS 旁邊方便登入", "和信任的同事共用以提高效率", "各員工專屬，保密不共享", "每月更改一次對全體員工通知"], "ans": 2, "exp": "密碼是個人身份驗證工具，共用密碼會導致無法追蹤責任，違反資訊安全原則。"}, {"q": "顧客的信用卡被拒，最適合的應對方式是？", "opts": ["大聲告知顧客卡片被拒", "嘗試重刷卡片多次", "直接聯絡銀行查詢", "私下告知顧客，並提供其他付款方式"], "ans": 3, "exp": "尊重顧客隱私，私下低調處理，並提供替代方案，是專業的服務態度。"}, {"q": "日結對帳（End-of-Day Reconciliation）的目的是？", "opts": ["清洗 POS 觸控螢幕", "比對当天現金實際收款與系統記錄是否完全一致", "關閉所有套裝領取", "備份所有顧客資訊"], "ans": 1, "exp": "日結對帳確保帳目準確，發現差異可及時調查，是財務管理的基本要求。"}, {"q": "在工作電腦上下載個人軟體是否允許？", "opts": ["允許，只要不打開即可", "允許，只要安裝後就刪除", "不允許，只可使用公司批准的軟體", "視情況而定"], "ans": 2, "exp": "未授權軟體可能帶來病毒風險、安全漏洞，或違反公司IT政策，一律不允許。"}, {"q": "庫存管理系統在餐飲業中的主要功能是？", "opts": ["記錄員工出勤", "追蹤存貨水準，減少浪費，自動觸發訂購", "管理顧客訂位資料", "制作員工培訓記錄"], "ans": 1, "exp": "庫存管理系統幫助餐廳控制食材成本，確保食材充足，並減少過期浪費。"}, {"q": "發現系統中有疑似欺詐的交易記錄，應如何處理？", "opts": ["直接刪除該筆交易以避免麻煩", "先向顧客查詢再決定", "等月底對帳時再處理", "立即向主管報告"], "ans": 3, "exp": "可疑交易必須立即上報，自行刪除可能構成犯罪，且會失去追蹤欺詐的機會。"}, {"q": "EFTPOS 的全名是？", "opts": ["Electronic Financial Transfer Processing Operating System", "Emergency Financial Transfer Point Of Service", "Electronic Funds Transfer at Point Of Sale", "Efficient Fast Transaction Processing System"], "ans": 2, "exp": "EFTPOS = Electronic Funds Transfer at Point Of Sale，即銷售點電子資金轉帳。"}, {"q": "數位記錄應多久備份一次？", "opts": ["每週", "每月", "每日或依公司政策", "只在系統快滿時"], "ans": 2, "exp": "定期備份（最好每日）可防止系統故障導致的資料遺失，是IT管理的基本要求。"}, {"q": "顧客個人資料（如電子郵件）應如何處理？", "opts": ["可分享給在場所有工作人員", "安全儲存，不得在未經授權的情況下分享給第三方", "針對實用目的可以共享", "僅將用於行銷目的"], "ans": 1, "exp": "依澳洲隱私法，個人資料必須安全儲存，未經顧客同意不得分享，違者可面臨罰款。"}, {"q": "斷線時，大多數雲端 POS 系統會怎樣運作？", "opts": ["完全停止運作", "將未儲存的資料全部刪除", "切換至離線模式，網路恢復後自動同步", "自動聯絡 IT 支援"], "ans": 2, "exp": "現代雲端POS系統設計有離線模式，確保服務連續性，網路恢復後自動同步數據。"}, {"q": "為什麼必須正確取消（Void）錯誤的交易？", "opts": ["只是策略，沒有實際影響", "維護正確的財務記錄，避免漏洞", "避免系統變慢", "提高顧客滿意度"], "ans": 1, "exp": "正確取消錯誤交易確保財務記錄準確，防止對帳差異，也是內部審計的要求。"}, {"q": "顧客對排隊等候時間感到不滿，該如何處理？", "opts": ["告訴顧客這是正常時間", "誠懇對顧客表示歉意，提供預計等候時間或替代方案", "直接請顧客去其他地方", "忽略，顧客已經進門"], "ans": 1, "exp": "主動道歉、提供資訊和替代方案是化解顧客不滿的有效方法，展現專業服務態度。"}]}, {"id": "T02", "title": "食品安全培訓", "questions": [{"q": "澳洲食品安全「危險溫度區間」是哪個範圍？", "opts": ["0°C – 5°C", "5°C – 60°C", "10°C – 70°C", "0°C – 60°C"], "ans": 1, "exp": "5°C 至 60°C 是細菌快速繁殖的危險溫度區間，食物不應在此範圍內存放超過必要時間。"}, {"q": "根據「2小時/4小時規則」，食物在危險溫度下存放超過 4 小時應如何處理？", "opts": ["立即冷藏", "繼續使用", "丟棄", "重新加熱後使用"], "ans": 2, "exp": "超過 4 小時表示細菌可能已大量繁殖，加熱無法消除毒素，必須丟棄。"}, {"q": "FIFO 原則指的是？", "opts": ["先進後出", "先進先出", "最快用完的先用", "最便宜的先用"], "ans": 1, "exp": "FIFO = First In, First Out，確保較早入庫的食品先被使用，避免過期。"}, {"q": "廚師處理生雞肉後，接下來要準備沙拉，必須先做什麼？", "opts": ["換圍裙", "更換手套即可", "洗手並更換砧板和刀具", "在手上噴灑消毒劑"], "ans": 2, "exp": "生雞肉含沙門氏菌等病原體，必須洗手並更換所有接觸器具，防止交叉污染。"}, {"q": "以下哪種行為違反食品安全規定？", "opts": ["冷藏時生食放下層、熟食放上層", "用不同顏色砧板區分食材", "將熟食與生肉放在旁邊且無任何遮蓋", "記錄食品溫度並存檔"], "ans": 2, "exp": "熟食與生肉相鄰放置且無遮蓋，會造成直接交叉污染，嚴重違反食品安全規定。"}, {"q": "員工有嘔吐和腹瀉症狀，應該怎麼做？", "opts": ["戴口罩繼續上班", "勤洗手後繼續工作", "立即通知主管，不得接觸食物", "只要不是發燒就沒問題"], "ans": 2, "exp": "嘔吐與腹瀉是諾如病毒的典型症狀，極易透過食物傳播。澳洲食品法規定患者不得處理食品。"}, {"q": "Food Safety Supervisor（食品安全監督員）的認證有效期是幾年？", "opts": ["1 年", "3 年", "5 年", "永久有效"], "ans": 2, "exp": "根據澳洲各州食品法規，食品安全監督員認證有效期為 5 年，到期須更新。"}, {"q": "正確的洗手步驟應持續多長時間？", "opts": ["5 秒", "10 秒", "20 秒", "60 秒"], "ans": 2, "exp": "世界衛生組織及澳洲食品法規建議洗手時間至少 20 秒，才能有效去除病原體。"}, {"q": "你發現冷藏庫溫度顯示 8°C（超過 5°C 標準），你應該怎麼做？", "opts": ["繼續使用，等下班後再報告", "立即通知主管，評估庫內食品安全性", "自行調低設定溫度即可", "將所有食品移至室溫保存"], "ans": 1, "exp": "冷藏溫度超標是食品安全緊急情況，必須立即回報並評估食品是否需要丟棄。"}, {"q": "以下哪種食品儲存方式是正確的？", "opts": ["生肉放在熟食上方", "熟食放在生肉上方", "生熟食放在同一托盤", "只要容器有蓋，位置不重要"], "ans": 1, "exp": "生肉汁液若滴落在熟食上會造成交叉污染，因此熟食必須放在較高的位置。"}, {"q": "澳洲食品安全標準 Food Standards Code 3.2.2 主要規定什麼？", "opts": ["食品添加劑的使用限制", "食品包裝材料標準", "食品安全做法與員工培訓要求", "食品進口標準"], "ans": 2, "exp": "3.2.2 規定食品業者的食品安全管理義務，包括員工培訓、溫度控制及記錄保存。"}, {"q": "以下哪種情況下食物必須立即丟棄？", "opts": ["食品在冷藏溫度下存放超過 2 天", "食品在危險溫度區間累計超過 4 小時", "食品外觀稍有變化但氣味正常", "食品開封後超過 1 小時"], "ans": 1, "exp": "累計 4 小時是澳洲食品安全法規的明確界線，超過即須丟棄，無例外。"}, {"q": "交叉污染最常見的原因是？", "opts": ["食品加熱不均勻", "使用同一刀具或砧板處理不同食材（未清洗）", "食品儲存時間過久", "廚房溫度過高"], "ans": 1, "exp": "器具共用是交叉污染的首要原因，應使用顏色管理系統並在每次使用後清洗消毒。"}, {"q": "澳洲食品業者依法須將員工培訓記錄保存至少幾年？", "opts": ["1 年", "2 年", "5 年", "10 年"], "ans": 2, "exp": "根據 WHS 法規及食品安全要求，培訓記錄須保存至少 5 年，以備監管機構查核。"}, {"q": "顧客投訴食物中發現異物，你應該怎麼做？", "opts": ["告訴顧客這不可能發生", "立即移除食物、誠摯致歉，並通知主管記錄事件", "建議顧客下次光臨再補償", "告訴顧客那是正常食材成分"], "ans": 1, "exp": "食品投訴需立即處理、記錄並回報，這是食品安全管理及顧客服務的雙重要求。"}]}, {"id": "T03", "title": "過敏原培訓", "questions": [{"q": "以下哪一項不屬於澳洲 14 種主要過敏原？", "opts": ["花生", "蕎麥", "大蒜", "腰果"], "ans": 2, "exp": "14 種主要過敏原不包括大蒜。主要包括：花生、樹堅果、牛奶、小麥、魚、貝類、蛋、大豆、蕎麥、芝麻、芥末、羽扇豆、二氧化硫及亞硫酸鹽。"}, {"q": "顧客告知對乳製品過敏，菜單上有一道菜不確定是否含乳製品，你應該？", "opts": ["告訴顧客應該不含", "查閱最新成分資料或請廚師確認，確認前不提供", "建議顧客點其他菜", "說所有菜都可能含乳製品"], "ans": 1, "exp": "任何不確定過敏原的情況下，必須先確認再提供，不可猜測。"}, {"q": "過敏性休克（Anaphylaxis）是？", "opts": ["輕微的皮膚反應", "胸悶和瘙癢，通常在數小時內消退", "潛在致命的全身過敏反應，可導致氣管窄縮、血壓驟降", "一般細菌感染引起的局部反應"], "ans": 2, "exp": "過敏性休克是醫療緊急狀況，可在數分鐘內危及生命，需立即撥打 000 並使用 EpiPen。"}, {"q": "顧客出現過敏性休克症狀（臉部潮紅、喉嚨緊、呼吸困難），必須立即？", "opts": ["給顧客喝水觀察兩分鐘", "購買抗過敏藥給顧客", "撥打 000 並使用 EpiPen（若顧客隨身攜帶）", "請顧客自行前往醫院"], "ans": 2, "exp": "過敏性休克是緊急狀況，必須立即撥打 000。若顧客有 EpiPen，立即協助使用。"}, {"q": "過敏原標示由哪一機構監管？", "opts": ["WorkSafe Australia", "Fair Work Commission", "Food Standards Australia New Zealand（FSANZ）", "OLGR"], "ans": 2, "exp": "FSANZ 負責制定澳洲和紐西蘭的食品安全標準，包括強制性過敏原標示要求。"}, {"q": "廚師使用沾有花生醬汁的廚具未洗淨便用於其他食材，這是？", "opts": ["安全的，高溫會消滅過敏原", "交叉接觸，可能導致過敏顧客的過敏反應", "用乾布擦拭即可移除過敏原", "輕微的風險，非過敏顧客不必擔心"], "ans": 1, "exp": "過敏原無法被烹飪高溫消滅。器具交叉接觸是引發過敏反應的主要途徑之一。"}, {"q": "「食物不耐受」與「食物過敏」的主要區別是？", "opts": ["不耐受更危險", "不耐受反應更慢", "過敏涉及免疫系統，可能導致休克；不耐受不涉及免疫系統", "兩者完全相同"], "ans": 2, "exp": "食物過敏涉及免疫系統（IgE反應），可能致命；食物不耐受通常只引起消化不適，不涉及免疫系統。"}, {"q": "為過敏顧客備餐前，最重要的步驟是？", "opts": ["用顏色器具即可", "請顧客先試小份量", "徹底清洗更換所有器具並更換手套", "從專屬過敏原區域取出食材就可以"], "ans": 2, "exp": "為過敏顧客備餐前必須徹底清潔所有接觸面，更換手套，使用乾淨器具，防止交叉接觸。"}, {"q": "以下哪種食品成分含有麩質（Gluten）？", "opts": ["米粉", "玉米澱粉", "小麥粉（低筋麵粉）", "樹薯粉"], "ans": 2, "exp": "麩質存在於小麥、大麥、裸麥等穀物中。米粉、玉米澱粉、樹薯粉均不含麩質。"}, {"q": "服務員正在接受日式點餐，顧客告知有蝦子過敏，服務員應立即做什麼？", "opts": ["告訴顧客廚師會調整成分", "告訴顧客輕微的蝦子過敏應該沒問題", "通知廚師和主管，在點單上標記過敏警示", "建議顧客點其他菜"], "ans": 2, "exp": "過敏資訊必須立即通知廚房，並在點單上清楚標記，確保每個環節都能採取相應措施。"}, {"q": "問顧客「你的過敏嚴不嚴重？」是正確做法嗎？", "opts": ["是的，過敏嚴重程度決定我們的處理方式", "不對，我們應的處理方式不應因嚴重程度而有所不同", "不需要，只要顧客告知了就行", "不對，不應詢問顧客任何過敏細節"], "ans": 0, "exp": "了解過敏嚴重程度有助於備餐，但無論輕重，所有過敏均應認真對待，不可輕視。"}, {"q": "為什麼必須記錄顧客的過敏需求？", "opts": ["方便廚師記憶", "一旦發生過敏事故，可追蹤責任並改善程序", "滿足法律對點單記錄的要求", "方便下次顧客光臨時更快服務"], "ans": 1, "exp": "書面記錄是追責和改善流程的重要工具，也是法律合規的要求。"}, {"q": "以下哪種食品成分含有乳糖（Lactose）？", "opts": ["豆素奶油", "豆漿", "牛奶、起司、奶油", "橄欖油"], "ans": 2, "exp": "乳糖存在於所有乳製品中，包括牛奶、起司、奶油、冰淇淋等。豆漿和橄欖油不含乳糖。"}, {"q": "Nathan Anderson 案中，餐廳被判罰款的原因是？", "opts": ["食物中發現異物", "食物中毒導致多人生病", "提供了含芝麻的食品但未告知，造成顧客死亡", "不提供過敏原資訊給工作人員"], "ans": 2, "exp": "此案是澳洲食品過敏原標示的重要判例，強調過敏原資訊披露是法律義務，違者可面臨嚴重後果。"}, {"q": "顧客突然告知自己對某種食物過敏，即使廚師認為風險很小，服務員應該？", "opts": ["尊重廚師的專業判斷，繼續上菜", "一律當作嚴重的過敏處理，各環節均採取措施", "告訴顧客廚師認為風險小可以忽略", "請顧客簽署免責聲明才能上菜"], "ans": 1, "exp": "無論過敏嚴重程度，一律以最高標準處理是保護顧客和公司的最佳做法。"}]}, {"id": "T04", "title": "廚房與餐廳流程", "questions": [{"q": "HACCP 代表什麼？", "opts": ["Hospitality and Catering Compliance Program", "Hazard Analysis and Critical Control Points（危害分析關鍵控制點）", "Health And Customer Care Program", "Healthy Allergen Control and Compliance Protocol"], "ans": 1, "exp": "HACCP 是全球通用的食品安全管理系統，通過識別和控制食品生產中的危害點來預防食源性疾病。"}, {"q": "「Mise en place」在廚房策略中指的是？", "opts": ["廚師的個人工具", "所有食材和工具就位備用，上菜前一切就緒", "廚師的談判策略", "點單或訂單內容"], "ans": 1, "exp": "Mise en Place（法文：一切就緒）是專業廚房的核心原則，在服務開始前完成所有準備工作。"}, {"q": "服務進行時，下列哪種行為屬於專業服務標準？", "opts": ["將餐具砸在桌上", "從客人左側上菜、從右側收餐，飲料從右側安放", "把所有餐具一次放入桶內清洗", "等顧客主動呼叫再提供服務"], "ans": 1, "exp": "從左側上菜、從右側收餐是西式餐飲服務的標準禮儀，展示專業形象。"}, {"q": "高峰就餐期間，廚師產出結果不符標準，主管應如何處理？", "opts": ["公開批評廚師讓大家知道", "直接解雇廚師", "私下提供具體反饋，要求廚師重做並平和解釋標準", "等客人離開後再處理"], "ans": 2, "exp": "私下建設性的反饋保護員工尊嚴，同時確保服務品質，是有效的管理方式。"}, {"q": "餐廳每天開餐前的準備工作，應該由誰首先確認？", "opts": ["廚房最新進的廚師", "首先進廚房的廚師或廚房負責人", "廚房經驗最豐富的廚師", "當天訂位人數最多時才需確認"], "ans": 1, "exp": "廚房負責人有責任在服務開始前確認所有準備工作到位，確保順暢運作。"}, {"q": "飲料服務中，為客人倒飲料應從哪個方向進行？", "opts": ["從對面", "從上方倒入", "從左側", "從右側，安全不打擾到客人"], "ans": 3, "exp": "從右側服務飲料是國際標準，方便操作且不干擾客人，避免意外潑灑。"}, {"q": "顧客發現菜點錯了（拿到別桌的菜），應如何處理？", "opts": ["告訴顧客這是不可能的錯誤", "誠懇道歉，確認正確點單後立即上送正確餐點或退換", "向顧客解釋點單系統問題", "廚師已做，無法撤回"], "ans": 1, "exp": "誠懇道歉並迅速糾正錯誤是維護顧客關係的最佳方式，不可推卸責任。"}, {"q": "餐廳每天的清潔工作，應按照什麼原則進行？", "opts": ["FIFO 原則", "最近使用過的先清", "按照清潔指引工作表逐項執行，並標記已完成的項目", "先清最明顯的地方"], "ans": 2, "exp": "按照清潔指引工作表確保所有區域都被清潔到，並提供書面記錄以備查核。"}, {"q": "廚師在開工前應先做什麼？", "opts": ["先和同事聊天", "檢查工作區域是否已清潔，確認所需食材和工具完備就位", "立即開始烹飪第一道菜", "先傳送訂單到廚房打印系統"], "ans": 1, "exp": "開工前檢查（Mise en Place）確保工作區域安全、清潔，所有材料就位，提高工作效率。"}, {"q": "發現某道菜的食材已告罄，你應該怎麼做？", "opts": ["自行建立新菜單項目", "忽略直到主管下次上班", "立即將缺貨項目告知主管和廚房", "告訴顧客廚師將調整配方"], "ans": 2, "exp": "立即通知主管和廚房更新菜單，避免繼續接受無法出餐的訂單，保護顧客體驗。"}, {"q": "顧客對菜點不滿意，你應該如何處理？", "opts": ["告訴顧客廚師已經盡力了", "告訴顧客這是招牌菜", "向主管報告，確認後為顧客更換菜點", "當場提供折扣"], "ans": 2, "exp": "食品投訴應通過正式程序處理，主管授權後才可採取補救措施，如更換餐點。"}, {"q": "廚房中的「副廚師長」（Sous Chef）的主要職責是？", "opts": ["負責所有的滷製和炖煮", "參與所有店目的設計工作", "負責廚房器具訂購", "協助主廚管理廚房小組，主廚不在時代理其職務"], "ans": 3, "exp": "Sous Chef 是主廚的副手，負責廚房日常管理，在主廚缺席時全權負責廚房運作。"}, {"q": "廚師在進行魚類和海鮮的處理時應該使用哪種顏色的砧板？", "opts": ["黃色（熟食）", "綠色（蔬菜）", "藍色（魚類與海鮮）", "紅色（生牛肉和羊肉）"], "ans": 2, "exp": "HACCP 色彩編碼系統：藍色=魚類海鮮；紅色=生肉；綠色=蔬菜；黃色=熟食。防止交叉污染。"}, {"q": "有效減少廚房浪費的策略包括？", "opts": ["收集所有額外服務收費", "廚師不必留在廚房進行訓練", "全面採用自動化設備取代廚師", "廚師間互助分工，合理使用食材，減少重複動作"], "ans": 3, "exp": "減少浪費需要團隊合作：合理分配工作、精準備料、利用邊角料，從而控制食材成本。"}, {"q": "點單系統無法建立新項目，廚師應如何處理？", "opts": ["行政自行建立一個新點單", "告知顧客菜品售罄", "小聲請顧客點其他菜", "立即向主管報告並調整菜單內容"], "ans": 3, "exp": "系統問題必須立即向主管報告，由主管決定如何處理，不可自行繞過系統規定。"}]}, {"id": "T05", "title": "安全工作規範 WHS", "questions": [{"q": "根據澳洲 WHS Act 2011，員工對工作場所安全的主要責任是？", "opts": ["只需遵從主管指示即可", "安全是雇主的責任，員工無需操心", "合理照顧自身及可能受其行為影響的他人的安全", "只有在發生事故後才需要負責"], "ans": 2, "exp": "WHS Act 2011 規定員工和雇主共同分擔安全責任，員工必須合理照顧自身及他人。"}, {"q": "PPE 代表什麼？", "opts": ["Personal Procedure Equipment", "Personal Protective Equipment（個人防護裝備）", "Professional Performance Evaluation", "Protective Processing Equipment"], "ans": 1, "exp": "PPE 是防止工作場所傷害的最後防線，包括手套、護目鏡、防滑鞋等。"}, {"q": "你在廚房地板上發現水跡，最正確的做法是？", "opts": ["等清潔工來處理", "在旁邊放警示牌後繼續工作", "立即清理乾淨，並在處理過程中放置濕地警示牌", "通知主管後讓主管處理"], "ans": 2, "exp": "濕地是滑倒事故的主要原因，必須立即處理。警示牌是臨時措施，不是最終解決方案。"}, {"q": "「危害識別」（Hazard Identification）的定義是？", "opts": ["事故發生後的記錄過程", "在傷害發生前識別可能造成傷害的來源", "對已受傷員工的醫療評估", "工作流程的效率分析"], "ans": 1, "exp": "危害識別是主動風險管理的第一步，目的是在事故發生前採取預防措施。"}, {"q": "廚房中發生工傷事故後，必須在多少時間內向主管報告？", "opts": ["48 小時內", "下次上班前", "立即（盡快）報告", "7 個工作天內"], "ans": 2, "exp": "工傷必須立即報告，一方面確保傷者得到及時治療，另一方面符合法規記錄要求。"}, {"q": "以下哪種情況屬於必須上報 SafeWork 的「通報性事件」？", "opts": ["員工因輕微割傷需要貼膠布", "員工因腰部不適請假半天", "員工因工傷住院超過 24 小時", "員工滑倒但未受傷"], "ans": 2, "exp": "住院、失去意識、危及生命的傷害等均屬法定通報事件，必須在 48 小時內通報 SafeWork。"}, {"q": "正確搬運 15 公斤重物的姿勢是？", "opts": ["彎腰、快速提起", "蹲低、背部挺直、用腿部力量提起", "單手提起，另一手撐腰", "先前傾再後仰借力"], "ans": 1, "exp": "正確搬運姿勢保護腰椎，用腿部肌肉而非腰部承受重量，避免背部拉傷。"}, {"q": "廚師在廚房使用油炸機時，以下哪種 PPE 是必須的？", "opts": ["耳塞", "防熱手套和圍裙", "安全帽", "護膝"], "ans": 1, "exp": "油炸機操作的主要危害是燙傷，防熱手套和圍裙是最基本的 PPE 要求。"}, {"q": "風險評估中，風險等級由哪兩個因素決定？", "opts": ["員工數量和工作時長", "事故發生的可能性（Likelihood）和嚴重程度（Consequence）", "事故發生的頻率和報告時間", "員工經驗年數和事故地點"], "ans": 1, "exp": "風險 = 可能性 × 嚴重程度，這兩個維度共同決定風險的優先處理順序。"}, {"q": "在廚房中，哪種行為屬於違反 WHS 規定的「不安全行為」？", "opts": ["搬運重物前先評估重量", "發現地板濕滑時立即清理", "在同事正在使用刀具時從身後突然接近", "使用刀具前先確認刀刃方向"], "ans": 2, "exp": "從身後靠近使用銳器的同事極易造成刺傷，屬於嚴重的不安全行為。"}, {"q": "根據 WHS Act 2011，以下哪項是雇主的法定義務？", "opts": ["為員工購買個人意外保險", "提供安全的工作環境、設備和培訓", "保證員工工作期間絕對不會受傷", "僱用有急救證書的員工擔任每個職位"], "ans": 1, "exp": "雇主有法定義務「盡合理可行」確保工作場所安全，包括提供設備、培訓和安全系統。"}, {"q": "你看到同事搬運過重物品時姿勢不正確，你應該怎麼做？", "opts": ["不干涉，那是他的事", "等事故發生後再報告", "立即提醒同事並提供協助", "拍照記錄後再通知主管"], "ans": 2, "exp": "WHS 法規要求每位員工都有義務維護工作場所安全，適時提醒同事是履行這一義務的體現。"}, {"q": "廚房刀具存放的正確方式是？", "opts": ["浸泡在水槽中方便取用", "散放在工作台上刀刃向上", "存放在刀架或刀鞘中，刀刃遠離人", "放在抽屜最頂層"], "ans": 2, "exp": "刀具應存放在安全的位置，防止意外接觸刀刃造成割傷。"}, {"q": "員工拒絕執行認為不安全的工作，在澳洲法律下有什麼權利？", "opts": ["沒有任何權利，必須服從", "可以拒絕，但可能面臨解雇", "有權拒絕執行不安全的工作，且受 WHS 法律保護", "只有主管才能做此決定"], "ans": 2, "exp": "澳洲 WHS 法律賦予員工拒絕執行不安全工作的權利，且雇主不得因此對員工進行報復。"}, {"q": "工作場所安全委員會（Safety Committee）的主要功能是？", "opts": ["負責員工薪資協商", "記錄員工出勤情況", "識別危害、審查事故記錄，並提出改進建議", "處理顧客投訴"], "ans": 2, "exp": "安全委員會是雇主與員工共同參與、改善工作場所安全的重要機制。"}]}, {"id": "T06", "title": "化學品安全處理", "questions": [{"q": "SDS 代表什麼？", "opts": ["Safety Disposal System", "Safety Data Sheet（安全資料表）", "Standard Dilution Specification", "Substance Disinfection Schedule"], "ans": 1, "exp": "SDS（安全資料表）包含化學品的危害資訊、安全處理方法及緊急處理程序，必須在工作場所隨時可查閱。"}, {"q": "以下哪種化學品組合絕對禁止混合？", "opts": ["洗手液和軟性清潔劑", "漂白水（Bleach）和氨水（Ammonia）", "地板清潔劑和洗碗精", "廚房清潔劑和消毒劑"], "ans": 1, "exp": "漂白水與氨水混合會產生有毒氯胺氣體，可導致嚴重的呼吸道傷害甚至死亡。絕對禁止混合。"}, {"q": "正確稀釋化學品的步驟是？", "opts": ["先倒化學品，再加水到指定容積", "先加水，再添加化學品到指定比例", "目測估計即可", "加入化學品直到水變色"], "ans": 1, "exp": "正確做法是先加水再加化學品（稀釋劑加入濃縮液），防止濺射，確保安全稀釋比例。"}, {"q": "化學品沾到皮膚應立即怎麼做？", "opts": ["用乾布擦乾", "塗上乳霜或皮膚軟化劑", "大量清水沖洗 15 分鐘，如不適就診", "先中和化學品再沖洗"], "ans": 2, "exp": "大量清水沖洗是化學品皮膚接觸的標準急救措施，可稀釋並去除化學品，減少傷害。"}, {"q": "以下哪種是化學品儲存的正確做法？", "opts": ["放入飲料瓶隱藏", "開口放置方便取用", "將多種化學品放在同一層架", "以原廠標籤容器儲存，遠離飲食區，清楚標籤"], "ans": 3, "exp": "化學品必須存放在原廠容器中，清楚標示，遠離食品區，防止誤用和污染。"}, {"q": "大量吸入化學品後應如何處理？", "opts": ["餵大量水稀釋", "讓患者平躺休息", "立即移至通風處，如不適加劇立即撥打 000 或毒物控制中心 13 11 26", "喝牛奶或果汁以中和酸性化學品"], "ans": 2, "exp": "吸入化學品須立即遠離污染區域到新鮮空氣處，症狀嚴重時撥打 000 或毒物控制中心。"}, {"q": "SDS（安全資料表）的存放位置應該？", "opts": ["僅主管知道就夠", "儲存在辦公室電腦中", "所有使用化學品的員工均可即時查閱，通常靠近使用區域", "僅在新人入職時向其展示"], "ans": 2, "exp": "SDS 必須讓所有使用相關化學品的員工隨時可查閱，通常張貼在使用該化學品的區域附近。"}, {"q": "使用漂白水清潔廁所需要配戴的 PPE 最少包括？", "opts": ["僅手套", "化學品耐腐蝕手套 + 護目鏡", "手套 + 圍裙", "全身防護服"], "ans": 1, "exp": "漂白水具腐蝕性，必須戴耐腐蝕手套保護皮膚，護目鏡防止飛濺傷眼。"}, {"q": "以下哪種是正確處理被污染化學品容器的方法？", "opts": ["沖洗後重新填充其他化學品", "只要標籤已更改，重新填充即可", "依照法規棄置，不可重複使用填充其他化學品", "放入消毒劑中活化"], "ans": 2, "exp": "化學品容器不可重複填充用於其他用途，必須依照法規妥善棄置，防止交叉污染。"}, {"q": "廚師發現一個容器標籤對不上，應怎麼做？", "opts": ["假設儲存的內容跟以前相同", "封閉容器直到主管確認成分為止，不可使用", "丟棄後繼續工作", "向其他廚師詢問"], "ans": 1, "exp": "不明化學品是重大安全風險，必須停止使用並報告主管確認，不可猜測或繼續使用。"}, {"q": "進行高風險清潔工作時，以下哪種行為是正確的？", "opts": ["獨自工作，效率更高", "兩人一組，互相監督確保安全", "繼續工作，完成後再通知主管", "觸摸化學品確認其是否就位"], "ans": 1, "exp": "高風險化學品清潔工作應兩人一組，確保緊急情況時有人能立即協助或求救。"}, {"q": "化學品容器標籤問題最終可能導致什麼？", "opts": ["行政上的正常情況", "化學品浪費導致成本增加", "員工可能在不知情況下使用錯誤化學品，導致傷害", "屬於正常現象，無需處理"], "ans": 2, "exp": "錯誤標籤可能導致員工誤用不相容的化學品，造成爆炸、毒氣、或皮膚灼傷等危險。"}, {"q": "化學品濺到眼睛，至少需要沖洗多久？", "opts": ["5 分鐘", "10 分鐘", "15 分鐘", "30 分鐘"], "ans": 2, "exp": "依SDS指引，化學品入眼應以大量清水從內眼角向外沖洗至少 15 分鐘，同時尋求醫療援助。"}, {"q": "漂白水和酸性清潔劑混合會產生？", "opts": ["大量泡沫", "更強的清潔效果", "氯氣（Chlorine Gas），可能導致肺部傷害甚至死亡", "不會有影響，只是清潔效果降低"], "ans": 2, "exp": "漂白水（次氯酸鈉）與酸性清潔劑混合會釋放氯氣，是劇毒氣體，可能造成嚴重肺部傷害。"}, {"q": "根據 WorkSafe 及澳洲法律，以下哪項是雇主的主要義務？", "opts": ["確保全部化學品如新調配", "制定化學品採購清單", "提供訓練、PPE、SDS 資訊及安全工作程序", "配備全身化學品防護小組"], "ans": 2, "exp": "雇主有法定義務提供化學品安全培訓、適當的PPE、SDS查閱途徑，以及書面的安全工作程序。"}]}, {"id": "T07", "title": "急救 First Aid HLTAID011", "questions": [{"q": "急救 DRSABCD 中，第一個步驟「D」代表什麼？", "opts": ["撥打 000 求救", "確認現場安全（Danger）", "檢查傷者呼吸", "取出自動電擊器（AED）"], "ans": 1, "exp": "急救第一步永遠是確認現場安全（Danger），確保施救者自身不受傷害，才能有效協助傷患。"}, {"q": "發現有人失去意識且確認無呼吸，應立即採取哪個行動？", "opts": ["先拍照記錄事故現場", "等候主管指示", "撥打 000 並開始 CPR", "將傷者移至通風處再評估"], "ans": 2, "exp": "無呼吸=心臟驟停，必須立即撥打 000 同時開始 CPR，每延誤 1 分鐘存活率下降約 10%。"}, {"q": "成人心肺復甦（CPR）的正確胸部按壓頻率是？", "opts": ["每分鐘 40–60 次", "每分鐘 80–90 次", "每分鐘 100–120 次", "每分鐘 150 次以上"], "ans": 2, "exp": "澳洲復甦委員會（ARC）指引：按壓頻率 100–120 次/分鐘，深度 5–6 公分，允許胸腔完全回彈。"}, {"q": "大量出血的正確處理方式是？", "opts": ["用水清洗傷口後包紮", "移除傷口異物避免感染", "直接施加持續壓力，勿移除敷料", "抬高出血部位靜置等候"], "ans": 2, "exp": "止血首要原則是持續直接加壓。若敷料滲血，直接疊加新敷料繼續加壓，勿移除，以免破壞凝血。"}, {"q": "傷者出現休克（Shock）症狀，哪個處置是正確的？", "opts": ["讓傷者坐起並喝水補充水分", "讓傷者平躺，抬高雙腳，保持溫暖", "立即給予止痛藥物", "讓傷者自行行走以促進循環"], "ans": 1, "exp": "休克時讓傷者平躺並抬高雙腳（除非頭/脊椎受傷），有助血液回流重要器官，並保持體溫。"}, {"q": "輕微燒燙傷（面積小、未起水泡）的正確急救方法是？", "opts": ["塗抹牙膏或奶油降溫", "立即用冰塊冷敷", "以微涼流水沖洗 20 分鐘", "用保鮮膜緊密包裹傷口"], "ans": 2, "exp": "燙傷急救：流動涼水（非冰水）沖 20 分鐘，緩解疼痛並防止燒傷深入。冰塊會造成凍傷。"}, {"q": "成人發生嚴重噎食（氣道完全阻塞），應立即怎麼做？", "opts": ["讓傷者喝水嘗試沖走異物", "5 次背部拍擊，若無效再 5 次腹部衝擊，交替進行", "只施行腹部衝擊（哈姆立克法）", "立即撥打 000 靜待救援"], "ans": 1, "exp": "成人完全氣道阻塞：先 5 次背部拍擊，若無效再 5 次腹部衝擊，交替進行直到異物排出（HLTAID011 最新指引）。"}, {"q": "懷疑有人發生嚴重過敏反應（Anaphylaxis），現有 EpiPen，應先做什麼？", "opts": ["先口服抗組織胺，觀察 15 分鐘", "等確認症狀是過敏再處置", "立即使用 EpiPen 注射大腿外側，並撥打 000", "讓傷者坐下休息，再決定是否注射"], "ans": 2, "exp": "嚴重過敏反應是緊急狀況：立即使用 EpiPen 注射大腿外側（可穿衣注射），同時撥打 000。"}, {"q": "發現有人可能脊椎受傷（如高處跌落），最重要的原則是？", "opts": ["立即協助傷者站起來確認能否行走", "施加強力按摩促進血液循環", "盡量不移動傷者，固定頭頸部等待急救", "讓傷者保持半坐臥位以利呼吸"], "ans": 2, "exp": "脊椎受傷若不當移動可能造成永久性癱瘓。除非有立即生命危險，否則應保持傷者不動。"}, {"q": "眼睛受到化學品噴濺，正確的急救處置是？", "opts": ["用紙巾輕輕擦拭眼睛", "立即塗抹中和性藥膏", "立即以大量清水沖洗眼睛至少 20 分鐘", "閉眼等待刺痛感消退"], "ans": 2, "exp": "化學品入眼應立即以大量清水從內眼角向外沖洗至少 20 分鐘，同時撥打 000 或毒物中心。"}, {"q": "中暑（Heat Stroke）和熱衰竭（Heat Exhaustion）的關鍵差異是？", "opts": ["中暑時皮膚濕冷，熱衰竭時皮膚乾熱", "中暑體溫超過 40°C 且出現精神混亂，是醫療緊急狀況", "熱衰竭比中暑嚴重，需立即送醫", "兩者症狀相同，處理方式也一致"], "ans": 1, "exp": "中暑（體溫 >40°C、皮膚乾熱、精神混亂）是醫療緊急狀況，須立即降溫並撥打 000。"}, {"q": "哪種情況需要將傷者置於復原姿勢（Recovery Position）？", "opts": ["傷者正在大量出血", "傷者胸部疼痛", "傷者失去意識但仍有呼吸", "傷者骨折無法移動"], "ans": 2, "exp": "復原姿勢（側躺）用於有呼吸但失去意識的傷者，可防止舌頭後墜阻塞氣道，並讓嘔吐物流出。"}, {"q": "急救箱（First Aid Kit）應多久檢查一次補充耗材？", "opts": ["每年一次", "每季度一次", "只在使用後補充即可", "至少每月一次，並在每次使用後立即補充"], "ans": 3, "exp": "依澳洲 WHS 法規，急救箱須至少每月檢查一次確保耗材完整未過期，使用後立即補充。"}, {"q": "礦場偏遠地點遇到嚴重受傷事故，哪個行動應最先執行？", "opts": ["先拍照記錄現場以備事故報告", "立即聯絡公司總部通報", "評估周遭是否還有其他危險", "確認現場安全，並啟動緊急應變程序（含衛星電話/緊急信標）"], "ans": 3, "exp": "偏遠礦場急救：先確認現場安全（DRSABCD 中的 D），使用衛星電話或緊急信標啟動救援，同時開始急救。"}, {"q": "澳洲緊急求救電話是？", "opts": ["112", "911", "133 677", "000"], "ans": 3, "exp": "澳洲緊急服務電話為 000（警察、消防、救護）。112 在手機無訊號時亦可撥通至 000。"}]}, {"id": "T08", "title": "滅火器與緊急應變", "questions": [{"q": "使用手提式滅火器的操作口訣「PASS」，「A」代表什麼？", "opts": ["評估火勢大小（Assess）", "警告周遭人員（Alert）", "瞄準火焰底部（Aim）", "協助疏散（Assist）"], "ans": 2, "exp": "PASS = Pull（拔插銷）→ Aim（瞄準火焰底部）→ Squeeze（壓下把手）→ Sweep（左右掃射）。"}, {"q": "廚房深炸油鍋起火（Class F 火災），應使用哪種滅火器？", "opts": ["二氧化碳滅火器（CO₂）", "乾粉滅火器（ABE Dry Powder）", "水霧滅火器", "濕式化學滅火器（Wet Chemical / Class F）"], "ans": 3, "exp": "烹飪油脂火災（Class F）必須使用濕式化學滅火器。CO₂ 或乾粉施用在油鍋上會造成油脂爆噴，極度危險。"}, {"q": "發現電器設備起火，不應使用哪種滅火器？", "opts": ["CO₂ 滅火器", "ABE 乾粉滅火器", "水滅火器", "以上皆可用於電器火災"], "ans": 2, "exp": "電器火災（Class E）絕對不可使用水，因水導電會造成電擊危險。應使用 CO₂ 或乾粉滅火器。"}, {"q": "廚房油鍋發生小火，以下哪個初步應對是正確的？", "opts": ["立即用水潑熄", "關閉爐火，用鍋蓋蓋住隔絕空氣", "將鍋子移至室外", "往鍋內倒入其他食物壓制火焰"], "ans": 1, "exp": "小型油鍋火：立即關爐火，用鍋蓋或防火毯隔絕氧氣。切勿用水（爆噴危險），切勿移動著火的鍋子。"}, {"q": "澳洲商業場所標準火災應變程序縮寫是？", "opts": ["PASS", "DRSABCD", "STOP-DROP-ROLL", "RACE（Rescue, Alert, Confine, Evacuate）"], "ans": 3, "exp": "RACE = Rescue（救援受困人員）→ Alert（啟動警報）→ Confine（關防火門圍堵）→ Evacuate（疏散）。"}, {"q": "火警警報響起時，員工應採取的第一個行動是什麼？", "opts": ["尋找火源確認是否真的起火", "拿取個人物品後再離開", "等待主管指示再行動", "立即停下工作，按照疏散計劃撤離"], "ans": 3, "exp": "火警警報響起，一律視為真實火災，立即疏散。不得停留等待確認，生命安全優先。"}, {"q": "滅火器上的壓力指示針在哪個區域表示可正常使用？", "opts": ["紅色區域（過低壓）", "黃色區域（警戒）", "綠色區域（正常壓力）", "任何位置都可以使用"], "ans": 2, "exp": "滅火器壓力表的綠色區域表示壓力正常可使用。紅色區域表示壓力不足或過高，需送修。"}, {"q": "依澳洲標準 AS1851，手提滅火器應多久進行一次完整服務檢驗？", "opts": ["每 5 年一次", "每 3 年一次", "每 2 年一次", "每年一次"], "ans": 3, "exp": "依澳洲標準 AS1851，手提滅火器須每 6 個月目視檢查一次，每 12 個月進行一次完整服務檢驗。"}, {"q": "火災疏散時，以下哪項行為是錯誤的？", "opts": ["協助行動不便的同事", "關上身後的門以阻緩火勢蔓延", "返回建築物取回手機或錢包", "前往指定集合點點名報到"], "ans": 2, "exp": "疏散後切勿返回建築物取物，這是造成火災死亡的主要原因之一。人員安全永遠優先於個人財物。"}, {"q": "防火門（Fire Door）的正確使用方式是？", "opts": ["平時固定為開啟狀態，方便人員通行", "只有火災警報時才需關閉", "可用門擋保持開啟，火災時再關閉", "平時保持關閉，不可用任何物品固定為開啟狀態"], "ans": 3, "exp": "防火門可阻緩火焰與濃煙蔓延，應保持關閉。用門擋固定為開啟屬違規，緊急時可能造成嚴重後果。"}, {"q": "員工身上衣物著火時，應立即採取什麼行動？", "opts": ["脫掉著火的衣物", "快速跑動以風吹熄火焰", "停下、趴下、翻滾（Stop, Drop, Roll）", "站立不動，等同事幫忙用滅火器噴灑"], "ans": 2, "exp": "衣物著火時跑動會助長火勢。正確做法：Stop（停下）→ Drop（趴下蓋住臉）→ Roll（翻滾壓熄火焰）。"}, {"q": "礦場廚房抽油煙機清潔不勤，主要火災風險是什麼？", "opts": ["增加電力消耗引發電氣過熱", "阻塞氣流，廚房溫度升高", "油脂積累是廚房火災最常見的起火來源", "減少廚房通風，影響食品品質"], "ans": 2, "exp": "抽油煙機和管道中積累的油脂是廚房火災最主要的起火源之一，應每週清潔過濾網。"}, {"q": "礦場設施的疏散演習應多久進行一次？", "opts": ["每 5 年一次", "每 2 年一次", "每年一次", "每 6 個月一次（依 AS3745）"], "ans": 3, "exp": "依澳洲緊急應變計劃標準 AS3745，大多數場所應每 6 個月進行一次疏散演習並記錄。"}, {"q": "煤氣洩漏且同時有明火，正確處理順序是？", "opts": ["先用滅火器撲滅明火，再關氣源", "先開窗通風，再尋找洩漏點", "先疏散人員，再打電話報修", "若安全可行立即關閉氣源，疏散人員，撥打 000，不要開關電器"], "ans": 3, "exp": "氣體外洩有明火時：關閉氣源→疏散人員→撥打 000→不開關任何電器（可能引爆）。"}, {"q": "員工應在何種情況下放棄滅火嘗試，立即撤離？", "opts": ["只要火焰高度超過 30 公分就撤離", "使用一個滅火器後無效就撤離", "只有在煙霧影響視線時才需撤離", "火勢擴大超過一個滅火器能控制的規模，或濃煙影響視線，或退路受阻"], "ans": 3, "exp": "員工只應嘗試撲滅初期小火。若火勢擴大、濃煙瀰漫、退路受威脅，應立即撤離。"}]}, {"id": "T09", "title": "清潔流程", "questions": [{"q": "清潔（Cleaning）和消毒（Sanitising）的主要差別是什麼？", "opts": ["兩者完全相同，術語可以互換使用", "消毒是清潔的第一步，先殺菌再去除污垢", "清潔去除可見污垢，消毒殺滅微生物，兩步驟缺一不可", "消毒只在食品加工廠需要，一般餐廳只需清潔"], "ans": 2, "exp": "清潔和消毒是兩個獨立步驟。先清潔（去除油脂、食物殘渣），再消毒（殺滅細菌、病毒）。若先消毒未清潔，污垢會保護微生物使消毒失效。"}, {"q": "食品接觸表面（砧板、工作台）每次使用後應如何處理？", "opts": ["用乾抹布擦拭即可", "只需用清水沖洗", "清潔後以批准的消毒劑消毒，自然風乾", "用熱水沖洗後用廚房紙巾擦乾"], "ans": 2, "exp": "食品接觸表面清潔流程：刮除→清潔劑清洗→沖水→消毒（批准濃度）→自然風乾。用布擦乾可能將細菌重新帶到已消毒的表面。"}, {"q": "彩色清潔設備（不同顏色的抹布、拖把）的主要目的是？", "opts": ["美化廚房環境", "幫助員工記憶清潔劑搭配方式", "方便庫存管理", "防止交叉污染（如廁所用設備不得用於食品區域）"], "ans": 3, "exp": "HACCP 色彩編碼系統防止交叉污染。例如：紅色=肉類區、藍色=生食、綠色=蔬果、紫色=廁所。"}, {"q": "廚房清潔時，正確的清潔順序原則是？", "opts": ["地板→工作台→設備→排水溝", "設備→排水溝→工作台→地板", "從高到低、從乾淨到骯髒區域清潔", "從最靠近廚師的地方開始向外清潔"], "ans": 2, "exp": "清潔原則：由高至低（先清高處，避免污垢掉落到已清潔的低處）、由乾淨到骯髒。"}, {"q": "配製清潔劑溶液時，超過建議稀釋比例（過濃）的潛在危險是？", "opts": ["清潔效果更好，越濃越好", "稀釋比例對清潔效果沒有影響", "可能對員工皮膚/呼吸道造成傷害，且浪費清潔劑", "過濃的消毒劑會失去殺菌能力"], "ans": 2, "exp": "清潔劑必須按照 SDS 指定比例稀釋。過濃有化學品風險（灼傷皮膚、刺激呼吸道），過稀則效果不足。"}, {"q": "商業洗碗機進行一般清洗的最低水溫要求是多少？", "opts": ["40°C", "55°C", "60°C 清洗，82°C 終末漂洗", "75°C 清洗，90°C 終末漂洗"], "ans": 2, "exp": "澳洲食品安全標準：商業洗碗機清洗水溫不得低於 60°C，最終漂洗不得低於 82°C（化學消毒型除外）。"}, {"q": "使用拖把清潔地板後，應如何處理拖把頭？", "opts": ["使用完後自然晾乾即可", "每週清洗一次", "每次使用後清洗、消毒，完全風乾後懸掛儲存", "每天更換一次拖把頭"], "ans": 2, "exp": "拖把頭若不充分清潔消毒，會成為細菌（特別是李氏特菌）的溫床。每次使用後立即清潔並完全晾乾。"}, {"q": "廚房排水溝需要每日清潔的主要原因是？", "opts": ["符合衛生局訂定的洗碗頻率要求", "排水溝氣味難聞，影響工作環境", "排水溝是蟲鼠最主要的棲息滋生地，定期清潔是蟲害控制關鍵", "改善廚房地板排水速度"], "ans": 2, "exp": "廚房排水溝積聚食物殘渣和油脂，是蟑螂、蚊蟲的主要滋生地，也是李氏特菌的常見來源。"}, {"q": "發現清潔用品容器標籤脫落，應如何處理？", "opts": ["根據顏色和氣味判斷內容物繼續使用", "詢問同事後繼續使用", "倒掉內容物，重新裝入後繼續用", "立即停止使用，報告主管，依程序重新標示或安全棄置"], "ans": 3, "exp": "無標籤的清潔化學品是重大安全風險。根據 GHS/HAZCHEM 規定，所有化學品容器必須清楚標示。"}, {"q": "清潔劑和食品應如何存放？", "opts": ["可放在同一儲藏間，但放在不同層架", "清潔劑放密封容器後可與食品放同一冰箱", "只要容器密封，放在任何位置都沒問題", "清潔劑必須存放在完全獨立的上鎖區域，與所有食品完全分離"], "ans": 3, "exp": "清潔化學品絕對不能與食品同區存放。澳洲食品安全標準和 WHS 法規均要求危險化學品單獨上鎖存放。"}, {"q": "員工患有腸胃炎（腹瀉、嘔吐），何時才可返回廚房工作？", "opts": ["服藥後症狀改善即可返工", "症狀消失後 24 小時", "症狀完全消失後至少 48 小時，且獲得主管批准", "帶藥上班、全程戴口罩繼續工作"], "ans": 2, "exp": "澳洲食品安全標準明確規定：疑似食源性疾病（包括腹瀉、嘔吐）的食品處理人員，症狀消失後至少 48 小時才能返工。"}, {"q": "ATP 生物發光測試（ATP Swab Test）的用途是？", "opts": ["測量清潔劑的濃度是否正確", "記錄清潔所花費的時間", "確認清潔設備的使用壽命", "快速驗證表面是否已達清潔/消毒標準（偵測殘留有機物）"], "ans": 3, "exp": "ATP 測試是食品安全中常用的快速清潔驗證工具，可在數秒內偵測表面是否殘有有機物。"}, {"q": "清潔記錄（Cleaning Log）的重要性是什麼？", "opts": ["主要是讓清潔員有事做", "只有在食品安全審核時才需要填寫", "記錄供員工查看上次何時清潔", "提供書面合規證明，在食品安全事故或審計時保護公司"], "ans": 3, "exp": "完整的清潔記錄是澳洲食品安全標準要求的書面合規證明。在食品安全審計時，清潔記錄是公司的關鍵證據。"}, {"q": "礦場廚房中，高頻接觸表面（門把、按鈕、水龍頭）應多久消毒一次？", "opts": ["每週一次", "每天下班時", "只有在有人生病時", "至少每班次一次，高峰期更頻繁"], "ans": 3, "exp": "高頻接觸表面是交叉污染和疾病傳播的高風險點，特別是礦場集中居住環境，至少每班次消毒一次。"}, {"q": "清潔水槽和食品製備水槽應如何管理以防止交叉污染？", "opts": ["兩種水槽可以交替使用", "清潔水槽在非清潔時間可用於解凍食材", "只要清洗乾淨後就可以用作任何用途", "清潔水槽和食品製備水槽必須嚴格分開，不可互用"], "ans": 3, "exp": "用於清洗拖把、化學品稀釋的水槽絕不能用於食品製備或洗手。清楚標示每個水槽的專用用途。"}]}, {"id": "T10", "title": "酒牌服務 RSA", "questions": [{"q": "RSA 代表什麼？", "opts": ["Responsible Service Awareness", "Responsible Service of Alcohol（負責任的酒精服務）", "Restaurant Safety Administration", "Regular Staff Assessment"], "ans": 1, "exp": "RSA 是澳洲各州法律要求的強制性認證，適用於所有直接服務或銷售酒精飲料的員工。"}, {"q": "澳洲法定飲酒年齡是幾歲？", "opts": ["16 歲", "17 歲", "18 歲", "21 歲"], "ans": 2, "exp": "澳洲各州及領地的法定飲酒及購買酒精年齡均為 18 歲。"}, {"q": "以下哪種是酒精中毒（intoxication）的明顯跡象？", "opts": ["點單速度較慢", "聲音稍大", "言語不清、失去平衡、眼神呆滯", "心情愉快、多話"], "ans": 2, "exp": "言語不清、平衡感差、眼神失焦是酒精中毒的客觀跡象，必須停止供應酒精。"}, {"q": "一名顧客看起來已有酒意，再次要求點酒，你應該怎麼做？", "opts": ["繼續服務，顧客有權自己決定", "小聲告訴顧客下次少喝點", "有禮貌地拒絕，並提供水或食物", "請顧客去其他地方喝"], "ans": 2, "exp": "繼續向已中毒者提供酒精是違法行為，可導致個人最高 $11,000 罰款（NSW）。"}, {"q": "在昆士蘭（QLD），向未成年人出售酒精的初次違規罰款最高為多少？", "opts": ["$5,000", "$11,000", "$83,450", "$166,900"], "ans": 2, "exp": "QLD 初次違規個人罰款最高 $83,450，再次違規可達 $166,900，屬嚴重刑事責任。"}, {"q": "一個「標準飲品」（Standard Drink）含有多少克純酒精？", "opts": ["5 克", "8 克", "10 克", "15 克"], "ans": 2, "exp": "澳洲一個標準飲品 = 10 克純酒精，例如一瓶 375ml 啤酒（4.8%）≈ 1.4 標準飲品。"}, {"q": "拒絕向顧客提供酒精服務時，以下哪種溝通方式最合適？", "opts": ["你喝太多了，不能再喝", "你看起來已經醉了", "非常抱歉，我今晚無法再為您提供酒精飲料，我可以為您提供水或食物嗎？", "直接忽略顧客的點單"], "ans": 2, "exp": "拒絕服務應保持尊重和私下進行，避免使顧客難堪，降低衝突風險。"}, {"q": "顧客出示學生證作為年齡證明，你應該怎麼做？", "opts": ["接受，只要有照片即可", "拒絕接受，學生證不是澳洲認可的年齡證明文件", "接受，並記錄在系統中", "問顧客是否有其他證件"], "ans": 1, "exp": "澳洲認可的年齡證明文件為：駕照、護照、澳洲版 Proof of Age 卡（政府發放）。學生證不被認可。"}, {"q": "如果場所讓一名已酒醉的顧客離開後，該顧客發生酒後駕車事故，場所可能面臨？", "opts": ["場所沒有任何法律責任", "只有顧客本人需要負責", "場所可能需要承擔民事賠償責任", "只有警方負責處理"], "ans": 2, "exp": "澳洲法院已多次裁定酒吧和餐廳對其服務的顧客負有「謹慎義務（duty of care）」，包括其離場後的安全。"}, {"q": "執法人員要求查看場所的 RSA 合規記錄，你應該怎麼做？", "opts": ["詢問執法人員的身份後拒絕配合", "通知主管並配合提供所有要求的記錄", "立即通知主管，並配合執法人員的合法要求", "說記錄由上級保管，你不知道"], "ans": 2, "exp": "配合執法人員是法律要求，拒絕或阻礙調查可能構成額外違法。"}, {"q": "以下哪種做法可以有效防止「代購」（購買後轉給未成年人）？", "opts": ["相信成年顧客不會這樣做", "觀察顧客是否在購買後立即轉交給明顯未成年的人", "只要顧客本人成年就無需擔心", "記錄所有顧客的購買量"], "ans": 1, "exp": "「代購」是違法的，若店家知道或理應知道購買者是為未成年人代購，同樣可能面臨法律責任。"}, {"q": "場所在什麼情況下可以要求顧客提供年齡證明？", "opts": ["只有當顧客看起來非常年輕時", "只有在晚上 10 點後", "任何時候均可合法要求，若對年齡有合理懷疑", "只有在顧客點酒之後"], "ans": 2, "exp": "只要對年齡有合理懷疑，任何時候要求出示年齡證明都是合法且應該做的。"}, {"q": "服務員被發現連續兩年內有 2 次供酒給未成年人的違規記錄，後果是？", "opts": ["只需支付罰款", "接受強制培訓", "RSA 執照可能被自動暫停", "場所發出警告信即可"], "ans": 2, "exp": "澳洲多州規定在 2 年內 2 次違規，執照可被自動暫停，嚴重影響個人從業資格。"}, {"q": "晚上 11 點，一名顧客進入場所後直接要求烈酒，你注意到他行走時稍微不穩，你應該？", "opts": ["先服務，觀察一會兒再決定", "問他是否坐了很久的車才造成不穩", "評估其狀態後，若確認已有醉意，有禮貌地拒絕服務", "提供較低酒精度的飲料作為折衷"], "ans": 2, "exp": "服務已有醉意的顧客是違法的，不論其如何到達場所。降低酒精度不能免除法律責任。"}, {"q": "以下哪種是場所必須保存的 RSA 合規記錄？", "opts": ["每位顧客的飲酒量記錄", "所有顧客的年齡證明複本", "員工的 RSA 培訓及認證記錄", "每晚的酒精銷售總額"], "ans": 2, "exp": "根據酒牌法規，場所必須能夠證明所有直接服務酒精的員工持有有效 RSA 認證。"}]}, {"id": "T11", "title": "技能應用", "questions": [{"q": "正確的廚師刀握法（Pinch Grip）是什麼？", "opts": ["五指全握刀柄", "拇指與食指捏夾刀背，其餘三指握住刀柄", "所有手指握住刀背最上端", "雙手握刀確保穩定"], "ans": 1, "exp": "Pinch Grip 是廚師刀標準握法，拇指和食指夾住刀背靠近刀柄處，提供最佳控制力，是最安全的刀具操作方式。"}, {"q": "食材庫存管理的「FIFO」原則指什麼？", "opts": ["最常使用的食材放最前面", "先進先出（First In, First Out）——先到貨的先使用", "冷凍食材優先使用", "最常檢查的食材最先使用"], "ans": 1, "exp": "FIFO（先進先出）是食品安全的核心庫存原則，確保舊食材優先使用，減少過期和食物浪費。"}, {"q": "依澳洲食品安全標準，熱食在服務期間應維持在什麼溫度以上？", "opts": ["40°C 以上", "50°C 以上", "60°C 以上", "70°C 以上"], "ans": 2, "exp": "澳洲食品安全標準 3.2.2 規定：熱食在供餐期間必須維持在 60°C 或以上，低於此溫度細菌會快速繁殖。"}, {"q": "冷藏食品（如熟食沙拉、乳製品）應儲存在什麼溫度以下？", "opts": ["10°C 以下", "7°C 以下", "5°C 以下", "3°C 以下"], "ans": 2, "exp": "澳洲食品安全標準要求冷藏食品必須保持在 5°C 或以下，每天應至少記錄冰箱溫度兩次。"}, {"q": "礦場廚房高峰期間，廚師最重要的工作技能之一是什麼？", "opts": ["盡量一次只處理一道菜，確保品質", "等所有食材準備好再開始烹飪", "獨立完成所有工作，不麻煩他人", "有效的多工（Multi-tasking）和排序——同時管理多個工作流程"], "ans": 3, "exp": "礦場廚房需同時為大批員工提供餐點，廚師必須能有效管理多個烹調流程，確保所有餐點同時完成服務。"}, {"q": "「Mise en Place」這個廚房術語的意思是？", "opts": ["菜單上的每日特選", "廚房清潔標準程序", "將一切準備就位——在開始烹飪前完成所有食材準備工作", "食材採購清單"], "ans": 2, "exp": "Mise en Place（法文：一切就緒）是專業廚房的核心原則：在服務開始前，所有食材切好、醬料備好、設備就位。"}, {"q": "前場（服務員）與後場（廚師）之間，哪種溝通方式最能防止出餐錯誤？", "opts": ["靠記憶記住訂單，不需要書寫", "只在出現問題時才通知廚房", "等批量累積後再一次通知廚房", "清晰、即時地傳達特殊需求（如過敏原、烹調要求），並確認理解"], "ans": 3, "exp": "前後場溝通不良是食安事故和服務錯誤的主要原因。特殊飲食需求必須立即、清晰地傳達廚房並由廚師確認。"}, {"q": "餐點擺盤時，哪個考量最重要？", "opts": ["使用盡可能多的裝飾元素讓視覺豐富", "花最少時間擺盤，效率最重要", "跟隨當天的個人創意，每次不同", "一致性——每道同款餐點看起來和份量應該相同"], "ans": 3, "exp": "專業廚房中，擺盤一致性是品質控制的關鍵。同款餐點應每次呈現相同的視覺效果和份量。"}, {"q": "在工作中，若你的技術方法與主廚的要求不同，應如何處理？", "opts": ["堅持自己認為更好的方法", "不說明原因直接遵照主廚要求", "私下與其他廚師討論，形成共識後再提出", "遵照主廚指示，並在適當時機禮貌地提出問題或建議"], "ans": 3, "exp": "專業廚房需要統一的操作標準。先遵照廚房標準執行，再透過正當管道提出建議，這是職業素養的表現。"}, {"q": "份量控制（Portion Control）對礦場廚房的重要性是什麼？", "opts": ["只是為了讓食物看起來更整齊", "只影響客戶滿意度，與成本無關", "只有高級餐廳才需要份量控制", "確保食材成本在預算內，並讓每位用餐者獲得公平的份量"], "ans": 3, "exp": "礦場廚房通常為固定人數提供包膳服務。份量控制確保食材成本符合預算，且所有用餐者獲得公平份量。"}, {"q": "發現自己在高峰服務期間跟不上進度，最佳的應對方式是？", "opts": ["加快速度但忽略食品安全標準", "不聲張，默默處理", "停下來重新計劃，讓其他訂單等待", "立即告知主管/主廚，並請求協助或調整優先順序"], "ans": 3, "exp": "在繁忙的廚房環境中，坦誠溝通比「硬撐」更重要。早期告知讓主廚有時間重新調配人力或調整服務節奏。"}, {"q": "哪個行為可有效防止服務過程中的食品交叉污染？", "opts": ["服務同一桌客人時可以不換手套", "用同一雙手同時處理生食和熟食", "同樣的服務夾可以夾不同的菜餚", "更換不同菜餚時更換手套，或用肥皂水徹底洗手"], "ans": 3, "exp": "在自助服務或分餐服務中，每換一種菜餚前應更換手套或徹底洗手，使用不同的服務夾/湯匙，防止交叉污染。"}, {"q": "當某道菜餚售罄（Out of Stock），應如何通知客戶？", "opts": ["等客人點了之後再告知", "告訴客人需要等待較長時間", "只在菜單上劃掉，不主動告知", "主動且及時地告知客人，並建議替代選項"], "ans": 3, "exp": "主動告知是誠實和優質服務的體現。主動說明並推薦替代方案比讓客人等待後失望要好得多。"}, {"q": "在礦場廚房提供多元文化餐飲服務時，最重要的考量是什麼？", "opts": ["只提供西式食物，符合澳洲文化主流", "所有人提供相同的食物，公平對待", "只有在有足夠員工時才考慮特殊飲食需求", "了解並尊重不同文化的飲食禁忌（如清真、素食、宗教要求），並提供適當選項"], "ans": 3, "exp": "澳洲礦場通常有多元文化背景的員工。優質的餐飲服務需考慮不同的宗教和文化飲食需求。"}, {"q": "廚房「質量控制」（Quality Control）最實際的做法是什麼？", "opts": ["只在接到投訴時才檢查食物品質", "相信資深廚師自然會把關品質", "定期出菜前給主廚品嘗即可", "每道菜出菜前自我檢查：溫度、份量、外觀、口味是否符合標準"], "ans": 3, "exp": "質量控制不僅是主廚的責任，每位廚師都應在出菜前自行核對標準，這是專業廚房的重要素養。"}]}, {"id": "T12", "title": "勞動關係與客服", "questions": [{"q": "澳洲保護員工基本工作條件的主要聯邦立法是？", "opts": ["僱用關係法（Employment Relations Act）", "公平工作法 2009（Fair Work Act 2009）", "國家最低就業標準法（NES Framework Act）", "澳洲勞動法典"], "ans": 1, "exp": "Fair Work Act 2009 是澳洲規範勞動關係的主要法律框架，涵蓋最低工資、帶薪假期、公平解雇程序及一般保護條款。"}, {"q": "依澳洲 Fair Work 法，全職員工每年累積多少週年假（Annual Leave）？", "opts": ["2 週", "3 週", "4 週", "6 週"], "ans": 2, "exp": "澳洲國家就業標準（NES）規定所有全職員工每年享有 4 週帶薪年假。部分輪班工人（如礦場）可能享有 5 週。"}, {"q": "澳洲臨時工（Casual Employee）通常在基本時薪上額外獲得多少臨時工補貼（Casual Loading）？", "opts": ["10%", "15%", "25%", "30%"], "ans": 2, "exp": "澳洲大多數現代頒令（Modern Award）規定臨時工在基本時薪上享有 25% 的臨時工補貼，以補償其沒有帶薪年假、病假等福利。"}, {"q": "全職員工連續工作超過 5 小時，依規定應享有至少多長的不計酬用膳休息時間？", "opts": ["15 分鐘", "20 分鐘", "30 分鐘（不計酬）", "45 分鐘"], "ans": 2, "exp": "依澳洲款待業頒令，員工連續工作超過 5 小時應享有至少 30 分鐘不計酬用膳休息。"}, {"q": "客人投訴餐點溫度不足，使用 LAST 服務模型，第一步是？", "opts": ["立即提供折扣或補償", "專注傾聽，讓客人完整表達不滿", "立即道歉並轉身離開", "通知廚房重新製作，不向客人做任何回應"], "ans": 1, "exp": "LAST = Listen（傾聽）→ Apologise（道歉）→ Solve（解決）→ Thank（感謝）。傾聽是第一步，讓客人感到被重視。"}, {"q": "員工發現工資單疑似有誤（少付），第一個正確步驟是？", "opts": ["在社交媒體上發文投訴公司", "立即聯絡公平工作委員會（Fair Work Commission）", "向直屬主管或人力資源部門提出，先嘗試直接解決", "停止工作直到問題解決"], "ans": 2, "exp": "澳洲勞資糾紛解決流程：先直接與僱主溝通→若無效再向 Fair Work 申訴。直接解決速度最快。"}, {"q": "面對情緒激動、提高聲音的客人，員工最不應該做的是？", "opts": ["保持冷靜，以低沉穩定的語調回應", "表達理解其不滿的情緒", "必要時請主管協助", "提高音量與客人爭辯，表現出防禦態度"], "ans": 3, "exp": "面對激動的客人，提高聲音對抗只會升級衝突。正確做法是保持鎮定、以同理心回應，必要時請主管介入。"}, {"q": "根據澳洲消費者法（Australian Consumer Law），客人在哪種情況下有法定退款權？", "opts": ["只要個人不喜歡就可以退款", "只有購買時保留收據才可申請", "只有在購買當日才可申請", "服務/產品有重大瑕疵，或未達到廣告宣傳描述的品質"], "ans": 3, "exp": "澳洲消費者法賦予消費者在服務有重大問題（如食物不安全、未達宣傳標準）時的法定退款/重新提供服務的權利。"}, {"q": "僱主未經協商大幅修改員工排班，員工的正確回應是？", "opts": ["直接拒絕，繼續按舊班次上班", "不告知任何人，直接缺席新排班", "通過正式管道提出異議，並了解適用頒令對班次通知期的規定", "立即遞辭職信"], "ans": 2, "exp": "澳洲現代頒令通常規定僱主更改班次需提前合理通知。員工有權通過正式申訴管道解決分歧。"}, {"q": "員工提出安全顧慮後，被主管降職或減少班次，這在 Fair Work Act 下屬於哪類違規？", "opts": ["一般工作安排調整，僱主有權決定", "輕微勞資糾紛，需等正式調查", "一般保護條款違規——因員工行使工作場所權利而遭受不利對待", "只有被完全解僱才算違規"], "ans": 2, "exp": "Fair Work Act 一般保護條款禁止僱主對「行使工作場所權利」（如提出安全投訴）的員工採取不利行動。"}, {"q": "客人對帳單有異議，認為多收費，員工應如何處理？", "opts": ["告訴客人帳單肯定正確，不可能有誤", "冷靜地與客人逐一核對帳單，確認並更正任何錯誤", "讓客人等候，自行去確認但不告知需時多久", "立即退還全部餐費，避免衝突"], "ans": 1, "exp": "帳單糾紛需要耐心和透明度。「讓我們一起核對」的態度能化解緊張，若確有錯誤應道歉並更正。"}, {"q": "全職（Full-time）和兼職（Part-time）員工的主要法律區別是什麼？", "opts": ["兼職員工沒有任何帶薪假期", "全職員工不需要書面合約", "兼職員工的時薪比全職員工低", "全職通常每週 38 小時；兼職工時較少但同樣享有按比例計算的假期和福利"], "ans": 3, "exp": "根據 Fair Work Act，全職員工通常每週工作 38 小時；兼職員工同樣按比例享有年假、病假等法定福利。"}, {"q": "員工需要對客人說「不」（無法滿足要求）時，最專業的方式是？", "opts": ["直接說「不行，我們做不到」並走開", "說「那不是我的問題」", "假裝沒有聽到請求", "表達理解，清楚解釋原因，並盡可能提供替代方案"], "ans": 3, "exp": "拒絕客人請求時，「No, but...」的方式比直接說「No」更有效：理解其需求→解釋限制原因→提出替代選項。"}, {"q": "昆士蘭州的工資竊盜（Wage Theft）法律的主要意義是什麼？", "opts": ["員工可以偷取公司財物而不被起訴", "偷取公司物品只算民事問題", "只有盜竊超過 $10,000 才屬刑事罪", "僱主故意少付員工工資在昆士蘭州已屬刑事罪，可面臨監禁"], "ans": 3, "exp": "昆士蘭州 2020 年將故意工資竊盜列為刑事罪，最高可判處 10 年監禁，員工有權要求並保留完整的工資單記錄。"}, {"q": "員工離職時，僱主在多少時間內必須支付所有應得款項？", "opts": ["當天支付", "7 個工作日內", "30 天內", "在離職後的下一個例行發薪日或 7 天內（以較早者為準）"], "ans": 3, "exp": "Fair Work Act 規定，員工離職時僱主必須在下一個例行發薪日或離職後 7 天內（以較早者為準）支付所有應得款項。"}]}, {"id": "T13", "title": "Village Rules 場地規則", "questions": [{"q": "礦場廠區（Village）對酒精飲料的一般購買及持有限制是？", "opts": ["居住區可存放不限量的酒精飲料", "每人每日最多購買 10 標準飲料", "廠區完全禁止任何酒精飲料", "每人每日限購 4 罐標準飲料（或等量），且只能在指定區域飲用"], "ans": 3, "exp": "澳洲大多數礦場廠區執行嚴格的酒精限制政策，通常為每人每日 4 罐標準飲料，並只能在指定區域飲用，確保員工在輪班期間保持最佳狀態。"}, {"q": "在礦場廠區內被發現持有非法藥物，將面臨什麼後果？", "opts": ["僅口頭警告", "扣除工資後可繼續工作", "只需在主管監督下工作", "立即終止合約並驅逐出廠，且可能面臨刑事起訴"], "ans": 3, "exp": "礦場對非法藥物採取零容忍政策。持有、使用或販售非法藥物將導致立即解約，礦場高危工作環境意味著任何藥物影響都可能造成嚴重事故。"}, {"q": "礦場廠區靜默時間（Quiet Hours）的主要目的是什麼？", "opts": ["節省電力", "方便安保人員巡邏", "確保不同班次的員工得到充分休息，維護安全工作狀態", "只有在收到投訴後才適用"], "ans": 2, "exp": "礦場廠區有不同班次的員工。靜默時間（通常晚上 10 點至早上 6 點）確保輪班員工獲得充分睡眠，直接影響工作安全。"}, {"q": "員工若需要訪客在廠區住宿一晚，應如何處理？", "opts": ["讓訪客直接到廠區門衛登記", "私下讓訪客住在自己房間，不告知管理層", "入住前 1 小時通知管理員即可", "提前向廠區管理層申請，獲批准後訪客須在指定地點正式登記"], "ans": 3, "exp": "礦場廠區對訪客實行嚴格管制。擅自帶訪客住宿屬嚴重違規，緊急疏散時需確保所有在場人員的安全。"}, {"q": "礦場廠區嚴格禁止攜帶哪類物品（工作必要物品除外）？", "opts": ["個人電子設備（如手機、平板）", "個人烹飪設備（如電熱水壺）", "大量個人食品存入房間", "任何形式的武器，包括管制刀具、武器類器具等"], "ans": 3, "exp": "礦場廠區為高密度居住環境，禁止攜帶武器。廚房刀具屬工作設備，必須鎖在廚房內，不得攜帶進入居住區。"}, {"q": "依廠區的藥物和酒精政策，隨機測試通常在什麼時候進行？", "opts": ["僅在事故發生後", "僅在入職第一天", "廠區居住期間任何時間，包括非工作時間和週末", "只在每個輪班開始前"], "ans": 2, "exp": "礦場藥物和酒精測試可在廠區居住期間任何時間進行（包括週末、休息日），因廠區員工在場期間都被視為潛在工作狀態的延伸。"}, {"q": "廠區車輛使用規定中，以下哪項陳述是正確的？", "opts": ["員工可自由使用廠區任何閒置車輛", "個人車輛可在廠區任何地點停放", "員工可在廠區內自駕個人車輛，不需授權", "廠區公共車輛需授權才能使用，廠區內有速度限制，個人車輛限於指定停車區"], "ans": 3, "exp": "廠區車輛管理是安全管控的重要組成部分：廠區車輛需持有相應駕照並獲授權使用，廠區內通常有嚴格的車速限制（如 10–20 km/h）。"}, {"q": "員工投訴另一名員工違反廠區規定（如深夜噪音），應如何處理？", "opts": ["直接與對方爭論或對抗", "在廠區公告欄張貼公開投訴", "告訴所有同事此人的行為", "向廠區管理辦公室或值班主管正式投訴，通過官方管道處理"], "ans": 3, "exp": "廠區糾紛應通過正式管道解決，而非直接對抗（可能升級為肢體衝突）。廠區管理層有責任調查並處理違規行為。"}, {"q": "關於廠區提供的互聯網（Wi-Fi）使用，哪項是正確的？", "opts": ["廠區 Wi-Fi 僅限工作用途，不能用於個人通訊", "完全禁止訪問社交媒體", "使用廠區 Wi-Fi 下載電影是個人選擇，廠區無法干預", "不得使用廠區網路下載版權材料或訪問不適當內容，使用情況可能被監控"], "ans": 3, "exp": "廠區提供的互聯網資源是共享的，其使用受合理使用政策約束。用廠區網路進行非法活動違反廠區政策，也可能觸犯法律。"}, {"q": "員工房間內的設施（如空調、熱水器）出現故障，應怎麼做？", "opts": ["自行嘗試修理", "向同事借用設備，不用上報", "只在影響健康安全時才告知管理層", "立即通知廠區管理辦公室並填寫維修申請"], "ans": 3, "exp": "廠區設施問題應通過正式管道報告，而非自行修理（可能使問題惡化或造成安全隱患）。及時報告確保所有居住者的生活品質。"}, {"q": "廠區的吸煙規定通常要求員工在何處吸煙？", "opts": ["在自己的房間內", "在廁所或淋浴房", "任何戶外區域均可吸煙", "僅在廠區指定的吸煙區域（Designated Smoking Area）"], "ans": 3, "exp": "澳洲法律禁止室內吸煙，礦場廠區通常規定只能在指定的戶外吸煙區吸煙。廚房或食品準備區附近的吸煙尤其嚴格禁止。"}, {"q": "員工不小心損壞了廠區財產（如打破鏡子），應怎麼做？", "opts": ["悄悄用其他東西蓋住，避免被發現", "等待清潔人員發現再說", "僅在損壞造成安全隱患時才上報", "立即向廠區管理層誠實報告，說明事發經過，配合評估"], "ans": 3, "exp": "主動報告意外損壞是誠信的體現。誠實報告通常比隱瞞造成的後果輕微得多，大多數廠區對意外損壞採取合理處理。"}, {"q": "礦場廠區的垃圾分類要求，以下哪項是正確的？", "opts": ["廠區垃圾處理完全由清潔工負責，員工無需分類", "只有廚房員工需要遵守垃圾分類規定", "個人垃圾可放在任何地方，清潔人員會處理", "所有員工須遵守垃圾分類規定，將廢物投放至指定回收/垃圾桶"], "ans": 3, "exp": "礦場廠區通常位於偏遠地區，廢棄物管理對環境保護尤為重要。正確的垃圾分類是個人環保責任，也有助於保持廠區整潔。"}, {"q": "以下哪種情況會觸發廠區的強制性酒精測試（非隨機）？", "opts": ["員工被發現在工作時打哈欠", "員工在廠區共用區域較為喧鬧", "員工看起來面色不佳", "工作場所事故、員工表現出醉酒跡象，或發現違反酒精政策的物證"], "ans": 3, "exp": "觸發強制性測試的情況包括：發生工作事故、觀察到明顯醉酒或藥物影響跡象、或發現員工違反酒精限制政策的物證。"}, {"q": "重複嚴重違反廠區規定的最終可能後果是？", "opts": ["只需接受更多培訓", "強制參加輔導課程後繼續工作", "調往不同廠區繼續工作", "終止合約，立即離開廠區，且在公司記錄中留有違規記錄影響未來就業"], "ans": 3, "exp": "廠區規定保護所有居住員工的安全和生活品質。重複嚴重違規通常導致終止合約。礦場行業人際網絡較緊密，違規記錄可能影響未來就業。"}]}, {"id": "T14", "title": "BLS 基本生命支援 HLTAID010", "questions": [{"q": "BLS 代表什麼？", "opts": ["Basic Legal Support", "Basic Life Support（基本生命支援）", "Breathing and Lung Safety", "Body Level Stabilization"], "ans": 1, "exp": "BLS 是指在緊急醫療人員到達前，非醫療專業人員所能提供的基本急救措施，包括 CPR 和 AED 操作。"}, {"q": "DRSABCD 的第一步「D」代表什麼？", "opts": ["Defibrillation（電擊）", "Diagnosis（診斷）", "Danger（評估危險）", "Direction（指引方向）"], "ans": 2, "exp": "D = Danger，必須先確保現場對你、傷者及旁觀者安全，才能進行下一步急救措施。"}, {"q": "心臟驟停後，若無 CPR 介入，每延遲 1 分鐘，存活率下降多少？", "opts": ["2–3%", "4–6%", "7–10%", "15–20%"], "ans": 2, "exp": "研究顯示心臟驟停後每分鐘不施行 CPR，存活率下降 7–10%，強調立即行動的重要性。"}, {"q": "為成年人進行 CPR 時，正確的胸外按壓深度是多少？", "opts": ["1–2 公分", "3–4 公分", "5–6 公分", "8–10 公分"], "ans": 2, "exp": "澳洲復甦委員會（ARC）指引要求成人 CPR 按壓深度為 5–6 公分，才能有效推動血液循環。"}, {"q": "成人 CPR 的按壓速率是每分鐘多少次？", "opts": ["60 次", "100–120 次", "150 次", "依體型調整"], "ans": 1, "exp": "ARC 指引規定成人按壓速率為每分鐘 100–120 次，歌曲《Stayin' Alive》的節奏（103 BPM）是常用記憶法。"}, {"q": "單人施救時，成人 CPR 的按壓與呼吸比例是？", "opts": ["15:2", "5:1", "30:2", "20:2"], "ans": 2, "exp": "ARC 現行指引：30 次按壓 + 2 次人工呼吸，如不願意或不會進行人工呼吸，可只做持續按壓。"}, {"q": "AED 代表什麼？", "opts": ["Advanced Emergency Device", "Automated External Defibrillator（自動體外去顫器）", "Airway Emergency Device", "Acute Emergency Diagnostic"], "ans": 1, "exp": "AED 是一種可自動分析心律並在必要時提供電擊的設備，設計給非醫療專業人員使用。"}, {"q": "使用 AED 時，電極貼片應貼在哪裡？", "opts": ["雙側肋骨", "腹部和背部", "右側鎖骨下方 + 左側腋下（胸側）", "任何位置均可，AED 會自動調整"], "ans": 2, "exp": "正確的 AED 貼片位置確保電流能通過心臟，電擊才有效。AED 上有圖示說明，請按圖示操作。"}, {"q": "AED 在分析心律時，你應該怎麼做？", "opts": ["繼續按壓，不要中斷", "輕輕搖晃傷者確認意識", "停止一切接觸，確保所有人不觸碰傷者", "繼續人工呼吸"], "ans": 2, "exp": "分析過程中任何人接觸傷者都會干擾結果。AED 語音會指示「請所有人離開」。"}, {"q": "傷者恢復正常呼吸後，應將其擺放在哪個姿勢？", "opts": ["平躺，頭部抬高", "坐起", "側臥（復原臥位）", "俯臥"], "ans": 2, "exp": "復原臥位（Recovery Position）可防止無意識的傷者因嘔吐而嗆到，保持氣道暢通。"}, {"q": "根據 SP4.6，Mainline Service 的工作場所在每個班次中必須確保什麼？", "opts": ["每位員工都持有 BLS 認證", "至少有 1 名持有效 BLS 認證的員工在場", "只需在有顧客時才需要", "由主管決定是否需要"], "ans": 1, "exp": "SP4.6 合約條款明確規定，每個班次必須有至少一名 BLS 持證人員在場才可繼續運作。"}, {"q": "DRSABCD 中「S」代表什麼？", "opts": ["Safety（安全）", "Stabilise（穩定）", "Send for help（呼救）", "Support（支撐）"], "ans": 2, "exp": "S = Send for help，即撥打 000 或指定他人去撥打。儘早呼叫急救能大幅提高存活率。"}, {"q": "你一個人，無法同時進行 CPR 並打電話，應如何處理？", "opts": ["先撥 000，等救護人員指示", "先指定旁人撥 000，同時自己開始 CPR", "先廣播通知全場再開始 CPR", "等待其他人來幫忙再行動"], "ans": 1, "exp": "理想情況是同時進行，如果單獨一人，先讓旁人打電話或使用擴音功能，自己立刻開始 CPR。"}, {"q": "BLS 認證（HLTAID010）的有效期是多久？", "opts": ["1 年", "3 年（CPR 部分建議每年更新）", "5 年", "永久有效"], "ans": 1, "exp": "BLS 認證有效期為 3 年，但 CPR 技能建議每年更新一次，確保技術保持熟練。"}, {"q": "傷者沒有呼吸但有脈搏，你應該怎麼做？", "opts": ["只做 CPR 按壓", "等待傷者自行恢復呼吸", "進行人工呼吸（每 5 秒 1 次），並持續監測脈搏", "立即使用 AED"], "ans": 2, "exp": "若有脈搏但無呼吸（呼吸停止），應進行人工呼吸而非全套 CPR。AED 僅用於心律問題。"}]}, {"id": "T15", "title": "人工搬運 Manual Handling", "questions": [{"q": "澳洲 Safe Work Australia 對人工搬運的安全定義是？", "opts": ["任何重量超過 15kg 的物品都屬於不安全", "只要不超過 25kg 都可以單人搬運", "只有使用機械輔助才算安全", "任何需要使用身體力量搬運、推拉、抬起、放下或保持物品的行為"], "ans": 3, "exp": "澳洲 WHS 法規中，「人工搬運」涵蓋所有需要身體力量的動作。不存在絕對安全的最大重量限制，關鍵是進行風險評估。"}, {"q": "對人工搬運行為進行風險評估時，「TILE」模型包括哪四個因素？", "opts": ["時間、影響、負荷、環境", "任務、個人、負荷、環境（Task, Individual, Load, Environment）", "工具、浸入、負荷、電力", "時間、浸入、負荷、裝備"], "ans": 1, "exp": "TILE 是人工搬運風險評估模型：Task（任務性質）、Individual（工人個人狀況）、Load（負荷特性）、Environment（工作環境）。"}, {"q": "正確的手動抬起重物技巧，第一個步驟是？", "opts": ["伸直雙腿，彎腰抬起物品", "評估負荷和路線，確保降落點並有足夠空間", "快速抬起物品以減少持物時間", "把物品盡量往遠處推離"], "ans": 1, "exp": "搬運前的評估是防止傷害的關鍵：檢查負荷重量、形狀、穩定性；確認雙腳穩固；清除路徑障礙。"}, {"q": "為什麼在搬運重物時不應扭腰（Twisting）？", "opts": ["扭腰會使物品容易掉落", "扭腰會使肌肉積累不穩", "扭腰會使肝臟不適", "扭腰是腰椎間盤傷害（如椎盤突出）最主要的危險動作"], "ans": 3, "exp": "腰椎在負重狀態下扭腰，會對椎間盤造成極大壓力，是導致椎間盤突出（Disc Herniation）的主要原因。"}, {"q": "在礦場廚房內，下列哪種行為屬於重複性勞損（RSI）的主要風險因素？", "opts": ["偏遠地點的不良照明", "廚房溫度過高", "食材重量這一項因素就夠", "長時間重複相同動作（如切割、攜帶食材、清掃），特別是不良姿勢下的動作"], "ans": 3, "exp": "RSI（重複勞損）常見於廚房工作者：長時間切割、大量攜帶食材、反覆清潔動作。預防：定期休息、交替不同工作。"}, {"q": "雙人共同搬運重物時，最重要的原則是？", "opts": ["身體較大的人負責大部分的重量", "動作指令由較矮的人發出", "兩人升降就行了，不需要溝通", "事先溝通好由誰指揮，行動同步，確保共同抬到相同高度"], "ans": 3, "exp": "共同搬運的關鍵是協調：指定一人發出指令（如「準備好…抬…！」），確保兩人同步動作。"}, {"q": "廚房中常用的搬運輔助工具包括？", "opts": ["廚師刀和架子", "挨手輪和搬運車", "花車和鶴嘴購道", "手推車、小型平台車、搬運推車等機械輔助工具"], "ans": 3, "exp": "澳洲 WHS 法規要求僱主優先提供機械輔助工具（如手推車、平台車）以減少手動搬運的風險。"}, {"q": "廚房工作者在工作期間應如何預防長時間站立造成的下肢疲勞？", "opts": ["盡量常常移動，即使不安全也好", "穿著舒適底鞋就夠了", "堅持長時間工作以訓練體力", "穿著防滑安全鞋、按人機工程原則調整工作台高度，並在工作間隙伸展"], "ans": 3, "exp": "廚房人機工程法則：工作台高度應調整為腰部高度（自然工作，不需彎腰），穿防滑安全鞋，工作間隙做適當伸展。"}, {"q": "廚房員工在工作期間感到肩臂疼痛，應如何處理？", "opts": ["忍耐等下班後再處理", "調低工作進度就行，不需要報告", "要求同事協助完成剩餘工作就行", "立即向主管報告，填寫危險報告表，尋求急救護理及調整工作安排"], "ans": 3, "exp": "廚房搬運傷害往往是漸進式的——種小病痛可能是更大傷害的前兆。不記錄傷害可能影響工傷賠償申請。"}, {"q": "WHS 法規下，誰對工作場所中搬運傷害的預防控制負有責任？", "opts": ["對工作最常用到工具的員工", "只有安全管查員才有責任", "傷害是工作的一部分，沒有誰有責任", "僱主負有確保安全搬運系統的最高責任，員工有責任對自己的安全行為負責"], "ans": 3, "exp": "WHS 主要責任在於僱主：提供安全搬運系統、培訓、定期風險評估。員工責任：遵照正確操作程序、報告風險。"}, {"q": "搬運冷庫內的食材時，需要注意哪些額外安全問題？", "opts": ["小心滑倒，穿止滑底安全鞋", "使用機械輔助工具，注意保溫後再單人操作", "寬鬆衣服方便靈活操作", "低溫使肌肉彈性下降，需在進入冷庫前做適當熱身，並縮短在冷庫內的工作時間"], "ans": 3, "exp": "冷庫內搬運的額外風險：低溫使肌肉彈性下降、地面可能濕滑、手指麻木使感覺下降。需熱身並注意冷庫地面狀況。"}, {"q": "在搬運風險管理上，員工如何可以降低個人受傷風險？", "opts": ["請主管分配工作時的第一優先", "定期上報可能造成傷害的工作流程，要求進行正式風險評估", "將任務分成兩部分分批完成", "當設備不足時，盡量選擇手動完成"], "ans": 1, "exp": "主動上報可能造成傷害的工作流程，要求正式風險評估，是員工保護自己和同事的最有效方式。"}, {"q": "以下哪個是搬運風險控制層級中第一優先級？", "opts": ["將工作者隔離在風險源旁邊", "提供個人防護裝備（PPE）", "提供行政支持和培訓", "完全消除風險來源（如用機械輔助或重新設計工作過程以替代手動搬運）"], "ans": 3, "exp": "依 WHS 風險控制層級式：消除 > 替代 > 工程控制 > 行政控制 > PPE。最佳方案是完全消除風險（如使用機械輔助）。"}, {"q": "廚房員工如何有效減少腰部受傷風險？", "opts": ["專注於小型和快速的搬運動作", "在搬運時保持背部彎曲，利用慣性", "調整工作安排讓腰部承擔更多重量", "調整工作台高度符合人機工程設計，並使用輔助工具避免不必要的彎腰"], "ans": 3, "exp": "人機工程設計的工作台高度加上機械輔助工具，可大幅減少腰部受傷風險，是最有效的預防方法。"}, {"q": "如果使用機械輔助工具可以完成搬運任務，廚房員工應該怎麼做？", "opts": ["只有在負荷超過 20kg 才使用輔助工具", "盡量用手動完成，以訓練肌肉", "若員工已適應大負荷就不需要工具", "優先使用機械輔助（手推車等），減少不必要的手動搬運風險"], "ans": 3, "exp": "WHS 風險控制層級：機械輔助工具每次可行時必須優先使用。手工搬運只在空間限制導致工具不可用時才考慮。"}]}, {"id": "T16", "title": "反歧視與平等機會", "questions": [{"q": "澳洲保護工作場所免受種族歧視的主要聯邦立法是？", "opts": ["種族和諧法", "種族歧視法 1975（Racial Discrimination Act 1975）", "平等機會法（Equal Opportunity Act 2010）", "人權保護法"], "ans": 1, "exp": "澳洲反歧視立法框架包括種族歧視法 1975、性別歧視法 1984、殘疾歧視法 1992、年齡歧視法 2004。所有在澳洲工作的員工均受保護。"}, {"q": "「直接歧視」（Direct Discrimination）的定義是？", "opts": ["一項政策以同樣方式影響所有人，但對某些群體造成更大的不利影響", "因某人具有受保護的特徵（如種族、性別、年齡），而對其作出較差的對待", "僱主對某人特徵的誤解導致不公平對待", "只有在僱用過程中才會發生的歧視"], "ans": 1, "exp": "直接歧視 = 因受保護屬性而明確地、不公平地對待某人（例如「我們不僱用 40 歲以上的人」）。"}, {"q": "「間接歧視」（Indirect Discrimination）的定義是？", "opts": ["有人直接以受保護的特徵侮辱他人", "只有高層管理人員受到某政策影響", "一項表面上中立的政策，實際上對具有受保護特徵的人造成不成比例的不利影響", "僱用過程中發生的歧視"], "ans": 2, "exp": "間接歧視例子：要求所有員工在週五晚上工作（可能不成比例地影響某些宗教群體）。"}, {"q": "以下哪項不是澳洲反歧視法律下的受保護屬性？", "opts": ["年齡", "宗教信仰", "殘疾", "個性類型（Personality Type）"], "ans": 3, "exp": "澳洲聯邦反歧視法律的受保護屬性包括：種族、性別、年齡、殘疾、懷孕、性取向、婚姻狀況、宗教信仰等。「個性類型」不屬於受保護屬性。"}, {"q": "對於殘疾員工的「合理調整」（Reasonable Adjustment）是指？", "opts": ["支付殘疾員工較低的工資", "修改工作環境或任務，使殘疾人士能夠履行工作職責", "永久減少殘疾員工的工作量", "另聘他人完成較困難的部分"], "ans": 1, "exp": "合理調整可包括：調整工作時間、提供輔助技術、調整工作場所設施、修改工作程序等。"}, {"q": "58 歲的員工被拒絕晉升，被告知「我們希望找到可以長期成長的人」，這可能構成什麼？", "opts": ["基於長期規劃的合理商業決定", "年齡歧視（Age Discrimination Act 2004 下的違規）", "合法的職業要求", "標準的人力資源做法"], "ans": 1, "exp": "以年齡為理由拒絕晉升機會是年齡歧視的典型案例。澳洲人權委員會（AHRC）每年處理大量此類投訴。"}, {"q": "職場性騷擾（Sexual Harassment）包括哪種行為？", "opts": ["邀請同事集體共進午餐", "主管對工作表現提供建設性批評", "不受歡迎的性挑逗、要求性好處，或具有性質的不當行為", "告知同事其烹飪技術需要改善"], "ans": 2, "exp": "性騷擾不僅限於身體接觸，也包括言語、書面或網絡形式的不受歡迎的性質行為（如黃色笑話、不雅圖片）。"}, {"q": "若在工作中遭受歧視，可向哪個機構正式投訴？", "opts": ["只能向公平工作委員會", "澳洲人權委員會（AHRC）或相關州/領地的平等機會委員會", "澳洲稅務局", "Centrelink"], "ans": 1, "exp": "聯邦級別歧視投訴→澳洲人權委員會（AHRC）；州/領地級別→相關平等機會委員會。內部投訴流程通常是第一步。"}, {"q": "「連帶責任」（Vicarious Liability）對僱主意味著什麼？", "opts": ["僱主只在歧視員工後才負有責任", "僱主對員工在工作中的歧視行為負有法律責任，除非能證明已採取一切合理措施預防", "下班後發生的歧視行為僱主不負責", "只有僱主知情時才需負責"], "ans": 1, "exp": "連帶責任意味著公司可因員工的歧視或騷擾行為而被起訴。培訓、投訴程序、即時調查是降低風險的關鍵。"}, {"q": "一名穆斯林員工要求在週五調整上班時間以便祈禱，哪種僱主回應不構成歧視？", "opts": ["拒絕所有宗教方面的調整請求", "告訴員工如果宗教重要就去找別的工作", "以提出請求為由警告員工", "考慮合理的調整，如調整班次或允許靈活工時"], "ans": 3, "exp": "澳洲反歧視法要求僱主對宗教信仰給予合理調整（除非造成「不合理的困難」）。拒絕提供任何合理調整可能構成宗教歧視。"}, {"q": "2022 年澳洲修訂《性別歧視法》引入「積極責任」（Positive Duty），意思是？", "opts": ["僱主必須僱用最低 50% 的女性", "僱主必須主動採取合理措施預防性騷擾，而不是等到投訴後才處理", "員工必須舉報他們目睹的所有性騷擾", "僱主必須每年向女性員工加薪"], "ans": 1, "exp": "2022 年「積極責任」修訂要求僱主從被動（等待投訴）轉為主動（預防）的立場，使本培訓成為法律要求而非最佳實踐。"}, {"q": "「無意識偏見」（Unconscious Bias）的正確定義是？", "opts": ["故意基於受保護屬性不公平對待他人", "在不自覺的情況下，根據受保護屬性對他人作出刻板印象或假設", "只在睡眠狀態下產生的偏見", "只影響未接受多元培訓的人"], "ans": 1, "exp": "無意識偏見存在於每個人，源自大腦的快速分類機制。識別並主動抵消它是建立包容工作場所的第一步。"}, {"q": "廚房主管只給特定族裔背景的員工分配最基礎的清潔工作，而非技術工作，這屬於什麼？", "opts": ["合理的技能匹配", "正常的工作分配，不涉及歧視", "只有在書面上才算歧視", "基於種族的直接歧視，違反種族歧視法"], "ans": 3, "exp": "因種族而系統性地分配不利工作任務是直接種族歧視的典型案例，在多元文化的礦場廚房環境中需特別警惕。"}, {"q": "「騷擾」和「欺凌」在澳洲職場法律的主要區別是？", "opts": ["欺凌比騷擾更嚴重，處罰更重", "騷擾與受保護屬性（如種族、性別）相關；欺凌是重複性不合理行為，不一定與保護屬性有關", "兩者在澳洲法律下完全相同", "騷擾只涉及性行為"], "ans": 1, "exp": "職場騷擾（Harassment）= 基於受保護屬性的不受歡迎行為；職場欺凌（Bullying）= 重複不合理行為，無需與保護屬性相關。"}, {"q": "若員工在廠區遭受同事歧視，正確的處理程序是？", "opts": ["保持沉默，以免被視為「麻煩製造者」", "僅告訴其他同事，讓大家知情", "立即向澳洲人權委員會投訴，跳過內部程序", "記錄事件（日期、時間、證人），向主管或 HR 報告，必要時啟動外部投訴"], "ans": 3, "exp": "正確流程：記錄 → 內部投訴 → （若未解決）外部機構投訴。詳細記錄是成功投訴的關鍵，員工投訴後受法律保護不得遭受報復。"}]}, {"id": "T17", "title": "職場欺凌預防", "questions": [{"q": "根據澳洲法律，「職場欺凌」（Workplace Bullying）的法律定義是？", "opts": ["任何讓員工感到不舒服的言行", "主管對員工提出的任何批評", "反覆、不合理的行為，對員工健康與安全造成風險", "員工之間的任何爭執"], "ans": 2, "exp": "根據 Fair Work Act 及 WHS Act，欺凌必須同時具備「反覆性」和「不合理性」兩個要素。"}, {"q": "以下哪種行為屬於職場欺凌？", "opts": ["主管要求員工重做不符標準的工作", "主管持續在眾人面前羞辱和嘲笑某員工", "績效改善計劃（PIP）", "給予員工建設性的負面反饋"], "ans": 1, "exp": "主管有權管理和批評員工績效，但公開羞辱是欺凌行為，超出合理管理範疇。"}, {"q": "「騷擾」和「欺凌」的主要區別是？", "opts": ["騷擾更嚴重，欺凌較輕微", "欺凌是法律術語，騷擾不是", "騷擾基於種族、性別等受保護屬性；欺凌不需要特定原因", "兩者完全相同，只是說法不同"], "ans": 2, "exp": "騷擾涉及歧視受保護屬性；欺凌只需「反覆不合理」即可，無需特定原因。"}, {"q": "你目睹同事遭受欺凌，你應該怎麼做？", "opts": ["不干涉，這不是你的事", "加入，以免自己成為目標", "在安全情況下支持受害者，並鼓勵其向主管回報", "等事情嚴重後再回報"], "ans": 2, "exp": "WHS 法規要求每位員工維護工作場所安全，包括心理安全。旁觀者的行動或不行動都有影響。"}, {"q": "員工遭受欺凌後，外部申訴的正確機構是？", "opts": ["澳洲警察局", "澳洲稅務局", "Fair Work Commission（公平工作委員會）", "澳洲競爭及消費者委員會（ACCC）"], "ans": 2, "exp": "Fair Work Commission 負責受理「停止欺凌申請」，可命令雇主停止欺凌行為。"}, {"q": "員工應如何記錄欺凌事件以備日後申訴？", "opts": ["只需記在腦子裡", "只記錄最嚴重的那一次即可", "記錄每次事件的日期、時間、地點、言行內容及在場證人", "先拍下直接照片或影片才算有效"], "ans": 2, "exp": "詳細的書面記錄是申訴欺凌的關鍵證據，越詳細越有利。每次事件都應記錄，不只是最嚴重的一次。"}, {"q": "以下哪種情況不屬於職場欺凌？", "opts": ["主管每天對員工說負面評語", "故意排擠某位同事不讓其參與團隊活動", "主管要求員工遵守公司出勤紀律", "以解雇相威脅"], "ans": 2, "exp": "合理的管理行為（如紀律管理、出勤要求）不屬於欺凌，即使員工感到不舒服。"}, {"q": "如果你的直屬主管正是欺凌的加害者，你應該向誰回報？", "opts": ["忍受，不要向任何人報告", "直接向媒體投訴", "越過直屬主管，向更高層主管或 HR 回報", "直接向 Fair Work Commission 申請"], "ans": 2, "exp": "若直接主管是加害者，應向上一級主管或 HR 部門報告，也可直接聯繫 Fair Work Commission。"}, {"q": "雇主對已知的職場欺凌情況置之不理，可能面臨什麼後果？", "opts": ["無任何法律後果，因為加害者才是被告", "只需給受害員工額外假期補償", "雇主可能需要承擔賠償責任，金額可達數百萬澳元", "接受 SafeWork 的書面警告"], "ans": 2, "exp": "根據真實案例，雇主因未處理欺凌被判賠償 $225 萬 AUD。雇主有直接法律責任，不可置之不理。"}, {"q": "根據澳洲統計，餐飲業員工中曾遭受騷擾或欺凌的比例約為多少？", "opts": ["20%", "40%", "65%", "86%"], "ans": 3, "exp": "行業調查顯示高達 86% 的澳洲餐飲業員工表示曾遭受某種形式的騷擾或欺凌，是高風險行業。"}, {"q": "「網路霸凌」（透過社群媒體進行的欺凌）在澳洲法律下屬於？", "opts": ["私人事務，不屬於職場欺凌", "只有在工作時間發生才算", "若與工作相關，即算職場欺凌，不論時間或地點", "不受任何法律管轄"], "ans": 2, "exp": "澳洲 Fair Work Act 明確將網路欺凌納入職場欺凌範疇，只要內容與工作環境相關即可適用。"}, {"q": "員工在提交欺凌申訴後，雇主對其進行降職或減少工時作為報復，這屬於？", "opts": ["合法的管理決策", "非法的報復行為，受 Fair Work Act 保護", "屬於正常的工作調整", "只有在申訴成立後才算非法"], "ans": 1, "exp": "澳洲法律明確保護申訴員工不受報復，報復行為本身構成獨立的違法行為。"}, {"q": "主管批評員工在某次服務中表現不佳，這屬於欺凌嗎？", "opts": ["是的，任何批評都是欺凌", "不是，這是合理的管理反饋（前提是以尊重的方式進行）", "取決於批評的嚴厲程度", "如果員工感到不舒服，就是欺凌"], "ans": 1, "exp": "合理、建設性的績效反饋是主管的正當管理行為，不屬於欺凌。感受主觀，法律定義客觀。"}, {"q": "澳洲每年因職場欺凌造成的經濟損失估計為？", "opts": ["$1 億", "$10 億", "$60 億", "$100 億"], "ans": 2, "exp": "Safe Work Australia 估計職場欺凌（含曠工、人員流動、生產力損失）每年造成約 $60 億 AUD 損失。"}, {"q": "員工被長期安排「不合理的工作班次」作為孤立手段，這屬於？", "opts": ["這是主管的正當排班權", "只有身體攻擊才算欺凌", "若帶有針對性且反覆發生，屬於欺凌行為", "只要沒有言語攻擊就不算欺凌"], "ans": 2, "exp": "昆士蘭礦業營地案例中，帶有針對性的排班已被 FWC 認定為欺凌，裁定賠償 $237,770。"}]}, {"id": "T18", "title": "個人衛生與制服標準", "questions": [{"q": "依澳洲食品安全標準，食品處理人員在哪些情況下必須洗手？", "opts": ["只在開始工作前洗一次手即可", "每隔 1 小時固定洗手一次", "只在接觸生肉後才需要洗手", "處理生食後、如廁後、觸摸面部/頭髮後、接觸不潔物品後，以及轉換不同食物類型時"], "ans": 3, "exp": "澳洲食品安全標準 3.2.2 規定食品處理人員必須在特定情況下洗手。洗手步驟：用皂液搓洗至少 20 秒→清水沖洗→乾淨紙巾擦乾。"}, {"q": "廚房工作人員佩戴首飾的規定是？", "opts": ["所有首飾均可佩戴，只要保持清潔", "只有耳釘（不懸垂的耳環）是允許的", "婚戒是唯一被允許的首飾", "食品準備區域禁止佩戴首飾（結婚戒指通常例外），因為可能成為食品污染物"], "ans": 3, "exp": "澳洲食品安全標準要求食品處理人員盡量減少佩戴首飾，因首飾可能藏匿細菌、脫落成為食品異物，或造成安全隱患。"}, {"q": "廚房工作人員的頭髮管理要求是？", "opts": ["頭髮整齊即可，長度不受限制", "短髮員工不需要任何頭髮防護措施", "只有在製作沙拉時才需要戴髮網", "所有接觸食品的員工必須使用髮網、廚師帽或其他有效束髮工具，確保頭髮完全束起"], "ans": 3, "exp": "頭髮異物是食品投訴中最常見的類型之一。所有食品處理人員（不論頭髮長短）都應用髮網或廚師帽束起頭髮。"}, {"q": "食品處理人員患有哪種疾病時，必須立即通知主管並停止工作？", "opts": ["輕微頭痛", "花粉症（過敏性鼻炎）", "輕微肌肉酸痛", "腹瀉、嘔吐、黃疸、喉嚨痛伴發燒，或任何疑似食源性疾病的症狀"], "ans": 3, "exp": "澳洲食品安全標準 3.2.2 規定：出現上述症狀的食品處理人員必須立即停止工作。症狀消失後至少 48 小時才可返回廚房崗位。"}, {"q": "廚房工作人員對指甲的要求是？", "opts": ["只要定期清潔即可，長度無限制", "假指甲可以佩戴，只要塗上指甲油保護", "有色指甲油是允許的，只要不剝落", "指甲必須修剪整齊（短），不得佩戴假指甲，不得塗指甲油"], "ans": 3, "exp": "長指甲和假指甲會藏匿細菌，也可能脫落成為食品異物；指甲油剝落可能混入食物。澳洲食品安全標準要求保持短而整潔的指甲。"}, {"q": "工作制服（廚師服/工作服）應多久清洗一次？", "opts": ["每週一次即可", "只要沒有明顯污漬就不需要洗", "每三天一次", "每天更換和清洗，若工作中弄髒則立即更換"], "ans": 3, "exp": "廚師服每天更換是食品安全的基本要求，因為制服上的食物殘渣是細菌的溫床。礦場廠區通常提供洗衣服務。"}, {"q": "廚房員工發現手部有傷口（割傷）時，正確的做法是？", "opts": ["繼續工作，小傷口不影響食品安全", "用個人自備的膠布包紮後繼續工作", "等下班後再處理", "立即報告主管，用防水藍色膠布（或金屬可探測膠布）包紮，並戴上一次性手套"], "ans": 3, "exp": "廚房使用藍色或金屬可探測膠布，是因為如果膠布脫落入食物中，可以被發現或被食品安全檢測設備偵測。"}, {"q": "廚房人員在哪些情況下不得在工作區域飲食？", "opts": ["只要是員工自己的食物就可以在任何地方吃", "礦場廚房沒有此類限制", "只在食品準備區域禁止", "在整個食品準備和服務區域均禁止飲食（品嚐食物須使用乾淨餐具，不得用手指）"], "ans": 3, "exp": "在食品區域飲食會引入唾液（含細菌）到工作環境。品嚐食物必須使用乾淨的試味勺（用後棄置），不可直接舔手指。"}, {"q": "關於廚房人員的制服穿著，哪項陳述是正確的？", "opts": ["在廁所後可以穿著廚師服返回廚房，不需要更換", "穿廚師服可以到廠區商店或宿舍區", "個人便服可穿在廚師服下，無論多厚", "廚師服應只在食品工作區域穿著，不應穿至廁所、宿舍或廠區外部"], "ans": 3, "exp": "廚師服在廠區其他區域（廁所、宿舍、商店等）穿著會攜帶外部病原體回到廚房。廚師服只在廚房穿著。"}, {"q": "以下哪種個人衛生行為可能對廚房食品安全構成風險？", "opts": ["使用止汗劑", "在工作前刷牙", "工作中喝自己水瓶的水", "在廚房工作時打噴嚏或咳嗽沒有遮蓋，或遮蓋後未洗手"], "ans": 3, "exp": "打噴嚏可將數千個微液滴（含病毒和細菌）噴射至食品和工作台面。正確做法：轉身離開食品→用紙巾或手肘遮蓋→洗手。"}, {"q": "礦場廚房員工的安全鞋（廚房鞋）要求通常包括？", "opts": ["任何密頭鞋均可，舒適即好", "只有廚師需要穿防滑鞋，服務員不需要", "涼鞋是可以的，只要防滑", "防滑底（SOLE 認證）、防水、密頭保護腳趾（鋼頭或複合材料頭）"], "ans": 3, "exp": "廚房地板常有油水，滑倒是廚房最常見的工傷之一。安全鞋的防滑底可顯著降低滑倒風險；密頭保護防止重物砸傷腳趾。"}, {"q": "廚房員工因服用某些藥物而出現嗜睡或反應遲鈍時，應如何處理？", "opts": ["不需要告知任何人，藥物是個人私事", "只有當藥物影響工作表現時才告知主管", "服用需要處方的藥物才需要告知", "告知主管自己正在服用可能影響工作能力的藥物，以便安全安排工作任務"], "ans": 3, "exp": "某些藥物（如抗組織胺、鎮靜劑）可能影響反應能力，在使用刀具、熱油或重型廚房設備時增加受傷風險。主動告知是負責任的做法。"}, {"q": "剛染色或燙髮後的員工，為什麼可能需要特別注意食品安全？", "opts": ["染髮化學品會讓頭髮更容易掉落進食物", "燙髮後頭髮更脆弱，更難用髮網固定", "澳洲法律禁止染髮後三天內處理食品", "染燙髮的化學品殘留可能通過頭皮污染食品，且應確保頭髮完全束起"], "ans": 3, "exp": "染燙髮後幾天仍可能有化學品殘留在頭髮和頭皮上。確保頭髮完全束起，並在處理食品前充分洗頭以去除殘留化學品。"}, {"q": "食品處理人員患有無法治癒的皮膚病（如牛皮癬）影響手部，在什麼情況下可以繼續工作？", "opts": ["皮膚病患者不可以在食品行業工作", "只要定期用藥控制，可以正常工作無需任何措施", "必須辭職，這屬於食品安全風險", "在醫生建議下，使用防水膠布包紮患處並佩戴手套，可繼續工作（應諮詢主管）"], "ans": 3, "exp": "澳洲食品安全標準不要求患有某些皮膚病的人完全禁止工作，但要求採取措施防止污染，如包紮和佩戴手套。"}, {"q": "食品處理人員的制服上有破洞或缺損，應如何處理？", "opts": ["繼續使用，制服外觀不影響食品安全", "用別針或釘書針臨時修補", "只在洗滌後破洞變大時才更換", "立即向主管申請更換，破損制服可能藏匿污垢，縫線脫落可能成為食品異物"], "ans": 3, "exp": "破損制服的縫線、線頭、布料碎片可能脫落進入食品，成為食品異物投訴的來源。礦場廠區通常備有制服更換程序。"}]}, {"id": "T19", "title": "現金處理程序", "questions": [{"q": "在餐飲服務環境中，遵守現金處理程序最主要的目的是什麼？", "opts": ["使主管的工作更輕鬆", "保護公司免受財務損失、竊盜及欺詐", "幫助員工記住工作職責", "確保客人獲得良好服務"], "ans": 1, "exp": "現金處理程序旨在保護公司、員工和客人免受財務損失及欺詐活動的侵害。所有員工均有責任妥善執行。"}, {"q": "向顧客找零時，正確的方法是：", "opts": ["直接將零錢放入顧客手中並說出總額", "默默數好零錢後一次性交出", "從購買金額起大聲逐張點算零錢，直至顧客付款金額", "請同事再次確認零錢金額"], "ans": 2, "exp": "大聲點算零錢（從消費金額數回付款金額）可有效減少錯誤和糾紛，是行業標準做法。"}, {"q": "班次開始時，你的收銀機備用金為 $200，這筆備用金屬於：", "opts": ["如果班次結束時收銀機有多餘，你可以保留", "公司資金，你在班次期間負有保管責任", "員工共享的小費池", "僅用於退款和作廢交易"], "ans": 1, "exp": "備用金屬於公司財產。你在班次期間受託保管，並對其負完全責任，不可挪作私用。"}, {"q": "班次結束時你發現收銀機短少 $15，你應該：", "opts": ["自掏腰包補足差額", "忽略它——小額差異是可以接受的", "立即向主管報告差異並填寫事故報告", "請同事幫你補上差額"], "ans": 2, "exp": "無論差異大小，都必須向主管報告並記錄在案。切勿用個人資金填補短缺，否則可能產生個人法律責任。"}, {"q": "根據澳洲法律（AUSTRAC 要求），達到或超過哪個金額的現金交易必須申報？", "opts": ["$5,000", "$8,000", "$10,000", "$15,000"], "ans": 2, "exp": "根據《2006 年反洗錢及反恐融資法》（AML/CTF Act 2006），企業必須向 AUSTRAC 申報 $10,000 或以上的現金交易（CTR）。"}, {"q": "你收到一張疑似偽造的 $50 紙幣，你應該：", "opts": ["將其還給顧客並拒絕交易", "為避免衝突而接受", "保留紙幣、禮貌拒絕、通知主管並記錄事件", "在紙幣上寫「偽幣」後還給顧客"], "ans": 2, "exp": "切勿歸還疑似偽幣。保留紙幣，通知主管，並按公司偽幣處理程序操作。如有需要，聯絡警方。"}, {"q": "以下哪些情況在處理前必須獲得主管授權？", "opts": ["任何超過 $20 的現金銷售", "退款、作廢交易及價格覆蓋", "信用卡交易", "為客人分帳"], "ans": 1, "exp": "退款、作廢和價格覆蓋須獲主管批准，以防止欺詐並保護員工和公司。"}, {"q": "收銀機必須在何時進行對帳？", "opts": ["每週一次", "你認為有需要時", "每個班次開始和結束時", "僅在每天營業結束時"], "ans": 2, "exp": "每班次首尾均進行對帳可確保差異能被追溯至特定班次和員工，提升問責制度。"}, {"q": "以下哪項行為在現金處理中被嚴格禁止？", "opts": ["在班次開始時點算備用金", "每筆交易均出具收據", "從收銀機借錢供個人使用", "交易之間保持收銀機關閉"], "ans": 2, "exp": "以任何形式（即使「暫時」）挪用收銀機資金均屬盜竊，可能導致即時解僱及刑事起訴。"}, {"q": "顧客對收到的找零提出異議，你應該：", "opts": ["立即給予更多金錢以避免衝突", "堅持自己的計算是正確的", "保持冷靜，召喚主管，必要時在顧客面前點算收銀機", "拒絕討論，等到班次結束的對帳"], "ans": 2, "exp": "保持冷靜並讓主管介入可同時保護顧客和員工。有見證人在場的收銀機點算能以專業方式解決大多數糾紛。"}, {"q": "關於現金安全，以下哪項說法是正確的？", "opts": ["大量現金應留在收銀機以便快速取用", "現金應定期從收銀機取出並存入保險箱", "員工應隨身攜帶多餘現金以保管", "收銀機可在不使用時保持打開以加快服務速度"], "ans": 1, "exp": "定期將多餘現金轉移至保險箱可降低盜竊風險，並減少任何時候處於風險中的現金數量。"}, {"q": "「撇帳」（Skimming）是指：", "opts": ["閱讀財務報告的表面內容", "在廚房中去除牛奶的奶皮", "在現金記錄入系統前竊取", "意外多找零錢"], "ans": 2, "exp": "撇帳是一種內部盜竊形式，指在交易記錄入收銀機前截取現金。屬刑事罪行，後果嚴重。"}, {"q": "如果主管要求你處理現金，但你未接受過現金處理培訓，你應該：", "opts": ["盡力而為，自行摸索", "完全拒絕任務", "告知主管你尚未接受現金處理培訓，並請求指導", "觀察同事並模仿其做法"], "ans": 2, "exp": "只有受過培訓的員工才應處理現金。向主管反映培訓缺口是正確的專業做法，同時保護你免承擔責任。"}, {"q": "處理 EFTPOS/刷卡交易時，你必須：", "opts": ["始終讓顧客在收據上簽名", "在顧客拍卡或插卡前確保輸入金額正確", "儲存顧客卡片資料以供日後使用", "由於不涉及現金，可提供折扣"], "ans": 1, "exp": "顧客付款前確認金額正確可防止多收或少收。儲存持卡人資料違反 PCI DSS 合規要求，屬違法行為。"}, {"q": "每日結算文件應如何處理？", "opts": ["口頭完成並由見證人確認", "只在收銀機有短缺時才填寫", "由收銀員和主管共同簽署，準確填寫後安全存檔", "以電郵發送給管理層後刪除"], "ans": 2, "exp": "妥善記錄每日結算可確保問責制，支持審計工作，並在發生糾紛或調查時提供書面證據。"}]}, {"id": "T20", "title": "能源培訓", "questions": [{"q": "在偏遠礦場營地，能源管理為何特別重要？", "opts": ["以符合市場推廣要求", "降低運營成本、減少環境影響，並減少對昂貴偏遠地區燃料供應的依賴", "提升營地的網絡速度", "滿足住客對現代設施的偏好"], "ans": 1, "exp": "偏遠礦場營地主要依賴柴油發電機，能源成本高昂且環境影響顯著。高效使用能源可直接降低成本和排放。"}, {"q": "降低空調能耗最有效的方法是：", "opts": ["隨時以最大製冷功率運行", "將溫控器設定在 20°C 或以下", "將溫控器設定在建議範圍（24–26°C），並保持門窗關閉", "在工作時間完全關閉空調"], "ans": 2, "exp": "24–26°C 的推薦溫度範圍在舒適與效率之間取得平衡。保持門窗關閉可防止冷氣散逸，大幅降低能耗。"}, {"q": "「待機電力」或「幽靈負載」（phantom load）是指：", "opts": ["高峰時段使用的電力", "電器關閉但仍插著電源時所消耗的電力", "備用發電機儲存的電力", "空置房間照明所消耗的能源"], "ans": 1, "exp": "待機電力可佔總能耗高達 10%。在電源插座處關閉電器（而非使用遙控器關機）可完全消除這種浪費。"}, {"q": "離開一個即將無人使用的房間時，你應該：", "opts": ["為了安全目的保留照明", "關閉所有燈具和電器", "開著電視以防盜竊", "保持空調運行以維持溫度"], "ans": 1, "exp": "關閉空置房間的燈具和電器是節約能源最簡單也最有效的方法之一，每位員工都能立即實踐。"}, {"q": "澳洲大多數偏遠礦場營地的主要發電來源是：", "opts": ["風力渦輪機", "太陽能電池板", "柴油發電機", "水力發電"], "ans": 2, "exp": "大多數偏遠礦場營地依賴柴油發電機作為主要電力來源。柴油運輸成本高昂且會產生溫室氣體排放，使節能尤為關鍵。"}, {"q": "發現能源浪費問題（例如熱水龍頭未關、空調洩漏），你應如何處理？", "opts": ["無論你的職責如何，自行修復", "忽視它——維修不是你的責任", "向主管報告或透過營地維修申請系統提交", "等待他人發現並採取行動"], "ans": 2, "exp": "透過適當渠道報告能源浪費可確保問題被記錄、優先處理並解決。所有員工共同承擔能源管理責任。"}, {"q": "以下哪種廚房做法最能節省能源？", "opts": ["使用前一小時預熱烤箱", "保持冰箱和冷凍庫門開啟以便快速取用", "根據鍋具大小選擇合適的爐頭，並使用鍋蓋保持熱量", "以半滿負載運行洗碗機以節省時間"], "ans": 2, "exp": "鍋具與爐頭大小匹配，並使用鍋蓋減少熱量散失，可縮短烹飪時間並降低能耗。半滿負載洗碗機同時浪費水和能源。"}, {"q": "為防止軍團菌（Legionella）生長，熱水系統的儲存溫度最低應設定為多少？", "opts": ["45°C", "55°C", "60°C", "70°C"], "ans": 2, "exp": "澳洲標準（AS/NZS 3500.4）要求熱水儲存溫度最低維持在 60°C，以消除軍團菌（退伍軍人病）的滋生風險。"}, {"q": "能源審計（energy audit）包含哪些內容？", "opts": ["審查員工加班的出勤記錄", "系統性地檢查和分析能源使用情況，以找出浪費並發現節省機會", "測試備用發電機容量", "僅審查營地的歷史水電費單"], "ans": 1, "exp": "能源審計評估設施各處的能源使用方式，識別低效環節，並提出具成本效益的改善建議。"}, {"q": "在洗衣房，哪種做法最能降低能耗？", "opts": ["所有衣物均使用最高溫度清洗", "在適當情況下使用冷水或溫水清洗，並在滿載時才運行", "無論天氣如何，所有衣物均使用烘乾機", "清洗前用熱水預浸衣物"], "ans": 1, "exp": "冷水或溫水清洗比熱水清洗消耗的能量少得多。在滿載時才運行洗衣機可將每次洗滌的效率最大化。"}, {"q": "ISO 50001 是哪個領域的國際標準？", "opts": ["食品安全管理系統", "職業健康與安全", "能源管理系統", "環境管理系統"], "ans": 2, "exp": "ISO 50001 為組織提供系統性管理和提升能源績效、效率、使用及消耗的框架，是全球公認的能源管理標準。"}, {"q": "哪種照明技術對營地使用最節能？", "opts": ["鹵素燈泡", "白熾燈泡", "LED（發光二極管）燈泡", "螢光燈管"], "ans": 2, "exp": "LED 燈泡比白熾燈泡少消耗高達 80% 的能源，使用壽命也更長，是最節能且最具成本效益的照明選擇。"}, {"q": "礦場營地的太陽能電池板最有效的用途是：", "opts": ["在夜間為所有營地設備供電", "在白天補充柴油發電機的電力輸出，從而減少燃料消耗", "僅為個人手機充電", "僅為住宿區域提供電力"], "ans": 1, "exp": "太陽能電池板可在白天顯著抵消柴油發電機的使用量。夜間或陰天時，發電機或電池儲能系統提供備用電力。"}, {"q": "員工在營地能源管理計畫中的職責包括：", "opts": ["設計新的可再生能源基礎設施", "在日常工作中遵循節能做法並舉報浪費行為", "批准能源預算", "採購節能設備"], "ans": 1, "exp": "每位員工都通過日常行為為能源管理做出貢獻——關閉設備、舉報浪費、遵循既定程序。能源節約是全員責任。"}, {"q": "減少偏遠礦場營地能源消耗有何環境效益？", "opts": ["為採礦公司帶來更高利潤", "減少柴油發電機使用所產生的二氧化碳和其他溫室氣體排放", "為車輛保留更多燃料", "改善營地的網絡速度"], "ans": 1, "exp": "柴油發電機會產生大量二氧化碳排放。減少能源消耗直接降低營地的碳足跡，並有助於履行澳洲法律下的環境義務。"}]}];

function init() {
  const grid = document.getElementById('moduleGrid');
  quizData.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'mod-card';
    card.innerHTML = `<div class="mod-id">${m.id}</div><div class="mod-name">${m.title}</div><div class="mod-count">15 題 · 通過 ≥13</div>`;
    card.onclick = () => startQuiz(i);
    grid.appendChild(card);
  });
}

function startQuiz(idx) {
  currentModule = idx;
  answers = {};
  score = 0;
  answered = 0;
  document.getElementById('home').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('quizTitle').textContent = quizData[idx].id + ' ' + quizData[idx].title;
  document.getElementById('scoreNow').textContent = '0';
  document.getElementById('scoreOf').textContent = '15';
  document.getElementById('answeredCount').textContent = '0';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('submitBtn').style.display = 'none';
  buildQuestions(idx);
  window.scrollTo(0,0);
}

function buildQuestions(idx) {
  const m = quizData[idx];
  const list = document.getElementById('questionList');
  list.innerHTML = '';
  m.questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qcard' + qi;
    let optsHtml = q.opts.map((o, oi) => {
      const letter = ['A','B','C','D'][oi];
      return `<button class="opt-btn" id="opt_${qi}_${oi}" onclick="answer(${qi},${oi})">${letter}) ${escHtml(o)}</button>`;
    }).join('');
    card.innerHTML = `
      <div class="q-num">第 ${qi+1} 題 / Q${qi+1}</div>
      <div class="q-text">${escHtml(q.q)}</div>
      <div class="opts">${optsHtml}</div>
      <div class="explanation" id="exp${qi}">💡 <strong>解析：</strong>${escHtml(q.exp)}</div>`;
    list.appendChild(card);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function answer(qi, selected) {
  if (answers[qi] !== undefined) return;
  const m = quizData[currentModule];
  const correct = m.questions[qi].ans;
  answers[qi] = selected;
  answered++;
  const isCorrect = selected === correct;
  if (isCorrect) score++;

  // disable all buttons for this question
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`opt_${qi}_${i}`);
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === selected && !isCorrect) btn.classList.add('wrong');
  }

  // show explanation
  document.getElementById('exp' + qi).classList.add('show');

  // update score display
  document.getElementById('scoreNow').textContent = score;
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('progressBar').style.width = (answered / 15 * 100) + '%';

  if (answered === 15) {
    document.getElementById('submitBtn').style.display = 'inline-block';
    document.getElementById('submitBtn').scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const pass = score >= PASS;
  document.getElementById('resultIcon').textContent = pass ? '🎉' : '📚';
  document.getElementById('resultTitle').textContent = pass ? '恭喜通過！Congratulations!' : '未達通過標準 Not Yet Passed';
  document.getElementById('resultScore').innerHTML = `<span class="${pass ? 'result-pass' : 'result-fail'}">${score} / 15</span>`;
  document.getElementById('resultMsg').innerHTML = pass
    ? `得分 ${score}/15（${Math.round(score/15*100)}%）— 已達通過標準 13/15（87%）。<br>請通知主管記錄您的培訓完成狀況。`
    : `得分 ${score}/15（${Math.round(score/15*100)}%）— 尚未達到通過標準 13/15（87%）。<br>請重新複習培訓材料後再次作答。`;
  window.scrollTo(0,0);
}

function retryQuiz() {
  startQuiz(currentModule);
}

function goHome() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  window.scrollTo(0,0);
}

init();
</script>
</body>
</html>
